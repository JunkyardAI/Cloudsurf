<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudstax - Quick Access</title>
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Load Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Simple scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #4b5563; /* gray-600 */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280; /* gray-500 */
    }
    ::-webkit-scrollbar-track {
      background: #1f2937; /* gray-800 */
    }
    /* Custom checkbox style */
    .form-checkbox {
      appearance: none;
      background-color: #374151; /* gray-700 */
      border: 1px solid #4b5563; /* gray-600 */
      padding: 0;
      -webkit-print-color-adjust: exact;
      color-adjust: exact;
      display: inline-block;
      vertical-align: middle;
      background-origin: border-box;
      user-select: none;
      flex-shrink: 0;
      height: 1.25rem; /* h-5 */
      width: 1.25rem; /* w-5 */
      border-radius: 0.375rem; /* rounded */
    }
    .form-checkbox:checked {
      background-color: #3b82f6; /* blue-500 */
      border-color: #3b82f6;
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 0 1 0 1.414l-5 5a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L6.5 9.086l4.293-4.293a1 1 0 0 1 1.414 0z'/%3e%3c/svg%3e");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }
    .form-checkbox:focus {
      outline: 2px solid transparent;
      outline-offset: 2px;
      --tw-ring-color: #3b82f6; /* ring-blue-500 */
      --tw-ring-offset-shadow: 0 0 #0000;
      --tw-ring-shadow: 0 0 #0000;
      box-shadow: 0 0 0 2px var(--tw-ring-color);
    }
    /* Styles for log viewer */
     #logContainer {
        max-height: 40vh;
        overflow-y: auto;
        background-color: #1f2937; /* gray-800 */
        border-radius: 0.375rem; /* rounded-md */
        padding: 0.75rem; /* p-3 */
     }
     .log-entry {
        font-family: monospace;
        font-size: 0.75rem; /* text-xs */
        color: #d1d5db; /* gray-300 */
        border-bottom: 1px solid #374151; /* gray-700 */
        padding-bottom: 0.5rem; /* pb-2 */
        margin-bottom: 0.5rem; /* mb-2 */
     }
     .log-entry:last-child {
        border-bottom: none;
        margin-bottom: 0;
     }
     .log-time {
        color: #6b7280; /* gray-500 */
        margin-right: 0.5rem; /* mr-2 */
     }
     .log-context {
        color: #60a5fa; /* blue-400 */
        font-weight: bold;
     }
     .log-message {
        color: #f87171; /* red-400 */
        display: block;
        white-space: pre-wrap; /* Wrap long error messages */
     }
     /* Styles for drag and drop */
     .bookmark-item[draggable="true"] {
        cursor: move;
     }
     .drag-handle {
        cursor: move;
        color: #6b7280; /* gray-500 */
     }
     .drag-handle:hover {
        color: #9ca3af; /* gray-400 */
     }
     .dragging {
        opacity: 0.5;
        background: #374151; /* gray-700 */
     }
     .drag-over {
        border-top: 2px solid #3b82f6; /* blue-500 */
     }
     /* Styles for pagination */
     #paginationControls {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0.75rem; /* p-3 */
        border-top: 1px solid #374151; /* gray-700 */
     }
     .page-btn {
        background-color: #374151; /* gray-700 */
        color: #d1d5db; /* gray-300 */
        padding: 0.25rem 0.75rem;
        margin: 0 0.25rem;
        border-radius: 0.375rem; /* rounded-md */
        font-size: 0.875rem; /* text-sm */
        font-weight: 500;
        transition: background-color: 0.15s;
     }
     .page-btn:hover:not(:disabled) {
        background-color: #4b5563; /* gray-600 */
     }
     .page-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
     }
     .page-btn.active {
        background-color: #3b82f6; /* blue-500 */
        color: #ffffff;
     }
     #pageInfo {
        font-size: 0.875rem; /* text-sm */
        color: #9ca3af; /* gray-400 */
        margin: 0 0.75rem;
     }
     #logo-canvas {
         display: block;
     }
     /* Settings Modal Section */
    .settings-section-title {
        font-weight: 600;
        color: #d1d5db; /* gray-300 */
        margin-bottom: 0.75rem;
        width: 100%;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 1rem;
        border-top: 1px solid #4b5563; /* gray-600 */
        cursor: pointer;
    }
    .settings-section:first-child .settings-section-title {
        border-top: none;
        padding-top: 0;
    }
    .settings-section-title:hover {
        color: #fff;
    }
    .settings-chevron {
        transition: transform 0.2s;
    }
    .settings-section-content {
        padding-bottom: 0.5rem;
    }
    .settings-chevron.rotated {
        transform: rotate(90deg);
    }
    .settings-section-desc {
        font-size: 0.875rem; /* text-sm */
        color: #9ca3af; /* gray-400 */
        margin-bottom: 0.75rem;
    }
    #stackIconList {
        max-height: 20vh;
        overflow-y: auto;
    }
    .stack-icon-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
    }
    .stack-icon-item label {
        color: #d1d5db; /* gray-300 */
        font-size: 0.875rem; /* text-sm */
    }
    .stack-icon-select {
        width: 6rem; /* w-24 */
        font-size: 1rem; /* text-lg */
        background: #374151; /* gray-700 */
        border: 1px solid #4b5563; /* gray-600 */
        color: #f3f4f6; /* gray-100 */
        border-radius: 0.375rem; /* rounded-md */
        padding: 0.25rem 0.5rem;
    }
    /* Stack Creator Modal Styles */
    #stackCreatorInput {
        width: 100%;
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #4b5563; /* gray-600 */
        background: #1f2937; /* gray-800 */
        color: #f3f4f6; /* gray-100 */
        font-size: 0.875rem; /* text-sm */
    }
    #stackCreatorList {
        margin: 12px 0 0 0;
        padding: 0;
        list-style: none;
        max-height: 25vh;
        overflow-y: auto;
        border: 1px solid #374151; /* gray-700 */
        border-radius: 8px;
        padding: 0.5rem;
    }
    #stackCreatorList li {
        padding: 8px;
        border-radius: 8px;
        background: #374151; /* gray-700 */
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
    }
    #stackCreatorList li:last-child {
        margin-bottom: 0;
    }
    #stackCreatorList .creator-anchor {
        color: #f3f4f6; /* gray-100 */
        text-decoration: none;
        font-size: 0.875rem; /* text-sm */
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    #stackCreatorList .creator-meta {
        color: #9ca3af; /* gray-400 */
        font-size: 0.75rem; /* text-xs */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
    }
    #stackCreatorList .creator-actions button {
        padding: 4px 6px;
        border-radius: 6px;
        border: none;
        background: #4b5563; /* gray-600 */
        color: white;
        cursor: pointer;
        font-size: 0.75rem; /* text-xs */
    }
    #stackCreatorList .creator-actions button:hover {
        background: #6b7280; /* gray-500 */
    }
    #stackCreatorList .creator-actions .creator-delete {
        background: #ef4444; /* red-500 */
    }
    #stackCreatorList .creator-actions .creator-delete:hover {
        background: #dc2626; /* red-600 */
    }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 md:flex md:items-center md:justify-center md:p-4">

  <!-- Wrapper for window control -->
  <div class="w-full h-full">

    <!-- Main Application Panel -->
    <div id="mainAppPanel" class="w-full h-full md:w-full md:max-w-2xl md:h-[750px] md:max-h-[90vh] bg-gray-900 md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden md:border md:border-gray-800">
      
      <!-- Header -->
      <header class="flex items-center gap-3 p-4 border-b border-gray-800 select-none flex-shrink-0">
        <!-- Icon -->
        <canvas id="logo-canvas" class="w-10 h-10 rounded-lg"></canvas>
        <div class="flex-1">
          <h1 class="text-base font-semibold">Cloudstax</h1>
          <p class="text-xs text-gray-400">Create Your Own Sites Stacks!</p>
        </div>
        <!-- Standby Button -->
        <button id="standbyBtn" class="p-2 text-gray-400 hover:text-white transition" title="Enter Standby Mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-minimize-2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/></svg>
        </button>
      </header>

      <!-- Add Bookmark Form -->
      <div class="p-4 border-b border-gray-800 flex-shrink-0">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <input id="nameIn" placeholder="Name (e.g., Google)" class="md:col-span-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <input id="urlIn" placeholder="URL (e.g., google.com)" class="md:col-span-2 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
          <input id="stackIn" placeholder="Stack (e.g., Tools)" class="md:col-span-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <div class="md:col-span-1 flex items-center justify-center md:justify-start gap-4 pl-1">
             <div class="flex items-center">
                <input id="openExternalIn" type="checkbox" class="form-checkbox">
                <label for="openExternalIn" class="ml-2 text-sm text-gray-300 select-none">External</label>
             </div>
             <div class="flex items-center">
                <input id="isFavoriteIn" type="checkbox" class="form-checkbox">
                <label for="isFavoriteIn" class="ml-2 text-sm text-gray-300 select-none">Favorite</label>
             </div>
          </div>
          <button id="addBtn" class="md:col-span-1 w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Add
          </button>
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="flex gap-3 p-4 border-b border-gray-800 flex-shrink-0">
        <div class="relative flex-1">
          <input id="searchIn" placeholder="Search..." class="w-full text-sm bg-gray-800 rounded-md pl-10 pr-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <select id="stackFilter" class="text-sm bg-gray-800 text-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All Stacks</option>
          <!-- Stacks will be populated by JS -->
        </select>
      </div>

      <!-- Bookmarks List -->
      <div id="bookmarksView" class="flex-1 overflow-y-auto p-3">
        <div id="bookmarksList" class="space-y-2">
          <!-- Bookmarks will be populated by JS -->
          <p id="loadingIndicator" class="text-center text-gray-400 p-4">Loading bookmarks...</p>
        </div>
      </div>
      
      <!-- Pagination Controls -->
      <div id="paginationControls" class="flex-shrink-0 hidden">
          <!-- Pagination will be populated by JS -->
      </div>

      <!-- Multi-select Footer -->
      <div id="multiSelectFooter" class="hidden p-3 bg-gray-800 border-t border-gray-700 flex justify-between items-center flex-shrink-0">
        <span id="selectedCount" class="text-sm text-gray-300">0 selected</span>
        <button id="launchSelectedBtn" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-md text-sm font-medium transition flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rocket"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.3.09-3.21l-1.07-1.07a3 3 0 0 0-3.21.09z"/><path d="M12 15.5 3.5 7.3c-.07-.1-.1-.23-.1-.34a.5.5 0 0 1 .5-.5h.34c.11 0 .24.03.34.1l8.2 8.2"/><path d="M15.5 12 7.3 3.5c-.1-.07-.23-.1-.34-.1a.5.5 0 0 0-.5.5v.34c0 .11.03.24.1.34l8.2 8.2"/><path d="M7 21a6.5 6.5 0 0 0 6.5-6.5.5.5 0 0 0-.5-.5H12c-.28 0-.5.22-.5.5A6.5 6.5 0 0 0 21 7"/><path d="M21 3v4h-4"/></svg>
          Launch Selected
        </button>
      </div>
      
      <!-- Footer Buttons -->
      <div id="footerButtons" class="p-3 bg-gray-900 border-t border-gray-800 flex gap-3 justify-end flex-wrap flex-shrink-0">
        <button id="settingsBtn" class="relative px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Settings
            <span id="errorCountBadge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full px-1.5 py-0.5 leading-none">0</span>
        </button>
        
        <button id="reorderBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2" title="Toggle Drag-and-Drop Reordering (All Stacks Only)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-move-vertical"><polyline points="8 18 12 22 16 18"/><polyline points="8 6 12 2 16 6"/><line x1="12" x2="12" y1="2" y2="22"/></svg>
          Reorder
        </button>
        
        <button id="quickGrabBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2" title="Grab first link from clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hand"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 9V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M18 11a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2v0a2 2 0 0 1-2-2v-4"/><path d="M14 10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2v0a2 2 0 0 1-2-2v-6"/><path d="M10 9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2v0a2 2 0 0 1-2-2v-8"/></svg>
          Quick Grab
        </button>
      </div>
    </div>
    
    <!-- Standby Panel -->
    <div id="standbyPanel" class="hidden w-full h-full md:w-full md:max-w-xs md:h-auto md:max-h-[450px] bg-gray-900 md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden md:border md:border-gray-800 p-6">
        <div class="flex flex-col items-center">
            <canvas id="standby-logo-canvas" class="w-48 h-48 rounded-lg"></canvas>
            <h2 class="text-lg font-semibold text-white mt-4">Cloudstax</h2>
            <p class="text-sm text-gray-400">Standby Mode</p>
            
            <div class="w-full mt-6">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Recent Links</h3>
                <div id="recentLinksList" class="space-y-2">
                    <!-- Recent links will be populated here -->
                </div>
            </div>
            
            <button id="openAppBtn" class="w-full mt-6 px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">
                Open App
            </button>
        </div>
    </div>

  </div>

  <!-- Generic Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-gray-700">
      <div class="p-5 border-b border-gray-700 flex justify-between items-center">
        <h2 id="modalTitle" class="text-lg font-semibold">Modal Title</h2>
        <button id="modalClose" class="text-gray-400 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="modalBody" class="p-5 overflow-y-auto" style="max-height: 70vh;">
        <!-- Modal content goes here -->
      </div>
      <div id="modalFooter" class="p-4 bg-gray-900/50 border-t border-gray-700 flex gap-3 justify-end">
        <!-- Modal buttons go here -->
      </div>
    </div>
  </div>
  
  <!-- Notification Area -->
  <div id="notification" class="hidden fixed bottom-5 right-5 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50">
    Notification message
  </div>


  <!-- App Logic -->
  <script type="module">
    // --- IndexedDB Configuration ---
    const DB_NAME = 'cloudstax_db';
    const DB_VERSION = 1; 
    const STORE_NAME = 'bookmarks';
    const STACK_ICONS_KEY = 'cloudstax_stack_icons';

    // --- Global State ---
    let db; // IndexedDB instance
    let allBookmarks = []; // Local cache of all bookmarks
    let selectedBookmarks = new Set(); // Set of bookmark IDs for multi-select
    let errorLog = []; 
    let isReorderMode = false; // Toggle for Drag/Drop Reordering
    let currentPage = 1; // For pagination
    const itemsPerPage = 8; // Items per page
    let dragSrcEl = null; // For drag/drop
    let recentLaunches = []; // For Standby Mode
    let stackIcons = new Map(); // For Stack Icons
    let hasStandbyBeenInitialized = false; // For standby animation performance
    let searchDebounceTimer; // For debouncing search input
    
    // --- Stack Creator State ---
    const CREATOR_KEY = 'cloudstax_creator_links_v1';
    
    // --- Emoji List for Stack Icons ---
    const STACK_ICON_LIST = [
        "", "🚀", "🛠️", "✨", "💡", "📚", "💼", "🎵", "🎮", "🎨", 
        "📰", "🛒", "☁️", "💰", "🏠", "❤️", "⭐", "🔗", "📁", "⚙️", "📈"
    ];
    
    // --- DOM Elements ---
    const $ = document.getElementById.bind(document);
    const elements = {
      nameIn: $('nameIn'),
      urlIn: $('urlIn'),
      stackIn: $('stackIn'),
      openExternalIn: $('openExternalIn'),
      isFavoriteIn: $('isFavoriteIn'),
      addBtn: $('addBtn'),
      searchIn: $('searchIn'),
      stackFilter: $('stackFilter'),
      bookmarksList: $('bookmarksList'),
      loadingIndicator: $('loadingIndicator'),
      modal: $('modal'),
      modalTitle: $('modalTitle'),
      modalBody: $('modalBody'),
      modalFooter: $('modalFooter'),
      modalClose: $('modalClose'),
      notification: $('notification'),
      multiSelectFooter: $('multiSelectFooter'),
      selectedCount: $('selectedCount'),
      launchSelectedBtn: $('launchSelectedBtn'),
      quickGrabBtn: $('quickGrabBtn'), 
      settingsBtn: $('settingsBtn'),
      errorCountBadge: $('errorCountBadge'),
      reorderBtn: $('reorderBtn'), 
      paginationControls: $('paginationControls'), 
      // Standby Mode Elements
      mainAppPanel: $('mainAppPanel'),

    /**
     * Debounce function to limit how often a function can run.
     * @param {Function} func - The function to debounce.
     * @param {number} delay - The delay in milliseconds.
     */
    function debounce(func, delay) {
        return function(...args) {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                func.apply(this, args);
            }, delay);
        };
    }

    /**
     * Normalizes a URL. Adds https:// if no protocol is present.
     * @param {string} input - The URL string from the user.
     * @returns {string} A normalized URL.
     */
    function normalizeUrl(input) {
      let s = String(input || '').trim();
      if (!s) throw new Error('URL cannot be empty.');
      
      if (s.startsWith('about:') || s.startsWith('chrome:') || s.startsWith('file:')) {
        return s;
      }
      
      if (/^localhost(:\d+)?$/.test(s) || /^\d{1,3}(\.\d{1,3}){3}(:\d+)?$/.test(s)) {
        if (!/^http(s)?:\/\//.test(s)) {
          s = 'http://' + s;
        }
      } 
      else if (!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(s)) {
        if (s.includes('.') || s.includes('/')) {
            s = 'https://' + s;
        } else {
            s = 'https://www.google.com/search?q=' + encodeURIComponent(s);
        }
      }
      
      try {
        new URL(s);
        return s;
      } catch (e) {
        console.error("Invalid URL construction:", e);
        return 'https://www.google.com/search?q=' + encodeURIComponent(input);
      }
    }

    /**
     * Extracts a sensible name from a URL if no name is provided.
     * @param {string} url - The normalized URL.
     * @param {string} name - The user-provided name.
     * @returns {string} The best available name.
     */
    function extractNameFromUrl(url, name) {
      if (name?.trim()) return name.trim();
      try {
        const host = new URL(url).hostname.replace(/^www\./i, '');
        const candidate = host.split('.')[0];
        if(candidate.length > 0) {
            return candidate.charAt(0).toUpperCase() + candidate.slice(1);
        }
        const urlParams = new URLSearchParams(new URL(url).search);
        if(urlParams.has('q')) {
            return `Search: ${urlParams.get('q')}`;
        }
      } catch {
        if(url.includes('search?q=')) {
            try {
                const query = url.split('search?q=')[1].split('&')[0];
                return `Search: ${decodeURIComponent(query)}`;
            } catch {}
        }
      }
      return "Untitled";
    }
    
    /**
     * Attempts to open a URL in the default external browser.
     * @param {string} url - The URL to open.
     */
    function openLinkExternally(url) {
      try {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } catch (error) {
          logError(error, 'openLinkExternally');
      }
    }

    /**
     * Gets a favicon URL from Google's service.
     * @param {string} url - The normalized URL.
     * @returns {string} The favicon image URL.
     */
    function getFavicon(url) {
      try {
        const host = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
      } catch {
        return 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-globe%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><path d=%22M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20%22/><path d=%22M2 12h20%22/></svg>';
      }
    }

    /**
     * Sanitizes HTML string to prevent XSS.
     * @param {string} str - The string to sanitize.
     * @returns {string} A sanitized string.
     */
    function sanitize(str) {
      if (str === null || str === undefined) return '';
      const temp = document.createElement('div');
      temp.textContent = str;
      return temp.innerHTML;
    }
    
    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escapeAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

    // --- IndexedDB Functions ---

    /**
     * Initializes the IndexedDB database.
     */
    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            store.createIndex('orderIndex', 'orderIndex', { unique: false });
          }
        };

        request.onsuccess = (event) => {
          db = event.target.result;
          console.log("Database initialized successfully");
          resolve(db);
        };

        request.onerror = (event) => {
          console.error("IndexedDB error:", event.target.error);
          logError(event.target.error, 'initDB: onerror');
          elements.loadingIndicator.textContent = "Error: Could not open local database.";
          reject(event.target.error);
        };
      });
    }

    /**
     * Helper to get an object store.
     * @param {string} mode - 'readonly' or 'readwrite'
     */
    function getObjectStore(mode) {
      const transaction = db.transaction([STORE_NAME], mode);
      return transaction.objectStore(STORE_NAME);
    }

    /**
     * Fetches all bookmarks from IndexedDB.
     */
    function getAllBookmarksFromDB() {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readonly');
        const request = store.getAll();

        request.onsuccess = (event) => {
          resolve(event.target.result);
        };

        request.onerror = (event) => {
          logError(event.target.error, 'getAllBookmarksFromDB');
          reject(event.target.error);
        };
      });
    }

    /**
     * Adds a single bookmark to IndexedDB.
     * @param {object} bookmark - The bookmark object to add.
     */
    function addBookmarkToDB(bookmark) {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readwrite');
        const request = store.add(bookmark);

        request.onsuccess = resolve;
        request.onerror = (event) => {
            logError(event.target.error, 'addBookmarkToDB');
            reject(event.target.error);
        };
      });
    }

    /**
     * Updates a single bookmark in IndexedDB.
     * @param {object} bookmark - The bookmark object to update.
     */
    function updateBookmarkInDB(bookmark) {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readwrite');
        const request = store.put(bookmark);

        request.onsuccess = resolve;
        request.onerror = (event) => {
            logError(event.target.error, 'updateBookmarkInDB');
            reject(event.target.error);
        };
      });
    }

    /**
     * Deletes a single bookmark from IndexedDB by its ID.
     * @param {string} id - The ID of the bookmark to delete.
     */
    function deleteBookmarkFromDB(id) {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readwrite');
        const request = store.delete(id);

        request.onsuccess = resolve;
        request.onerror = (event) => {
            logError(event.target.error, 'deleteBookmarkFromDB');
            reject(event.target.error);
        };
      });
    }

    /**
     * Batch imports an array of bookmarks into IndexedDB.
     * @param {Array} bookmarks - Array of bookmark objects.
     */
    function batchImportToDB(bookmarks) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const currentCount = allBookmarks.length;

        let importCount = 0;
        bookmarks.forEach(bookmark => {
          if (!bookmark.id) {
            bookmark.id = crypto.randomUUID();
          }
          if (bookmark.orderIndex === undefined) {
             // Place imported items at the end
            bookmark.orderIndex = currentCount + importCount;
          }
          store.add(bookmark);
          importCount++;
        });

        transaction.oncomplete = () => {
          resolve(importCount);
        };

        transaction.onerror = (event) => {
          logError(event.target.error, 'batchImportToDB');
          reject(event.target.error);
        };
      });
    }

    /**

    function loadStackIcons() {
        try {

            stackIcons = new Map(Object.entries(data));
        } catch (error) {
            logError(error, 'loadStackIcons');
            stackIcons = new Map();
        }
    }
    
    /**
     * Saves the global stack icons map to localStorage.
     */
    function saveStackIcons(newIconMap) {
        try {
            localStorage.setItem(STACK_ICONS_KEY, JSON.stringify(Object.fromEntries(newIconMap)));
            stackIcons = newIconMap; // Update global state
        } catch (error) {
            logError(error, 'saveStackIcons');
        }
    }

            bookmark.name.toLowerCase().includes(searchTerm) ||
            (bookmark.url && bookmark.url.toLowerCase().includes(searchTerm)) ||
            stack.toLowerCase().includes(searchTerm);

    /**

     */
    function renderPagination(totalItems) {

        elements.paginationControls.innerHTML = ''; // Clear existing controls
        
        if (totalPages <= 1) {
            elements.paginationControls.classList.add('hidden');
            return;
        }

        elements.paginationControls.classList.remove('hidden');

        // Previous Button
        const prevBtn = document.createElement('button');
        prevBtn.textContent = 'Prev';

    /**
     * Saves the new order of bookmarks to IndexedDB.
     */
    async function saveNewOrder() {
        try {
            const items = elements.bookmarksList.querySelectorAll('.bookmark-item');
            const updatePromises = [];
            
            items.forEach((item, index) => {
                const bookmarkId = item.dataset.bookmarkId;
                const bookmark = allBookmarks.find(b => b.id === bookmarkId);
                
                if (bookmark && bookmark.orderIndex !== index) {
                    bookmark.orderIndex = index;
                    updatePromises.push(updateBookmarkInDB(bookmark));
                }
            });
            
            if (updatePromises.length > 0) {
                await Promise.all(updatePromises);
                showNotification("Order saved!");
            }
            
            // Full reload is safest here to guarantee sorted order
            await loadAllBookmarks(); 
        
        } catch (error) {
            logError(error, 'saveNewOrder');
        }
    }
    
    // --- Drag & Drop Event Handlers ---
    
    function handleDragStart(e) {
        dragSrcEl = this;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/html', this.innerHTML); 
        this.classList.add('dragging');
    }
    
    function handleDragOver(e) {
        if (e.preventDefault) {
            e.preventDefault(); 
        }
        this.classList.add('drag-over');
        e.dataTransfer.dropEffect = 'move';
        return false;
    }

    function handleDragLeave(e) {
        this.classList.remove('drag-over');
    }
    
    function handleDrop(e) {
        if (e.stopPropagation) {
            e.stopPropagation(); 
        }
        
        if (dragSrcEl !== this) {
            elements.bookmarksList.insertBefore(dragSrcEl, this);
        }
        
        this.classList.remove('drag-over');
        return false;
    }
    
    function handleDragEnd(e) {
        this.classList.remove('dragging');
        elements.bookmarksList.querySelectorAll('.bookmark-item').forEach(item => {
            item.classList.remove('drag-over');
        });
        dragSrcEl = null;
    }
    
    /**
     * Adds or removes drag/drop listeners based on reorder mode.
     */
    function updateDragDropListeners() {
        const items = elements.bookmarksList.querySelectorAll('.bookmark-item');
        items.forEach(item => {
            if (isReorderMode) {
                item.addEventListener('dragstart', handleDragStart, false);
                item.addEventListener('dragover', handleDragOver, false);
                item.addEventListener('dragleave', handleDragLeave, false);
                item.addEventListener('drop', handleDrop, false);
                item.addEventListener('dragend', handleDragEnd, false);
            } else {
                item.removeEventListener('dragstart', handleDragStart, false);
                item.removeEventListener('dragover', handleDragOver, false);
                item.removeEventListener('dragleave', handleDragLeave, false);
                item.removeEventListener('drop', handleDrop, false);
                item.removeEventListener('dragend', handleDragEnd, false);
            }
        });
    }

    /**
     * Parses an HTML page to find all <a> tags and extract their hrefs.
     * @param {string} htmlString - The string content of the HTML page.
     * @param {string} stackName - The name of the stack to assign.
     * @param {string} [baseUrl] - The base URL for resolving relative links.
     * @returns {Array} An array of bookmark objects.
     */
    function parseLinksFromHtml(htmlString, stackName, baseUrl) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');
      const links = doc.querySelectorAll('a');
      const bookmarks = [];
      const base = baseUrl; // This is now correct, it's either the remote URL or undefined
      const currentCount = allBookmarks.length;
      
      links.forEach((link, index) => {
        const url = link.getAttribute('href');
        const name = link.textContent.trim();
        
        if (url && url !== '#' && !url.startsWith('javascript:')) {
          try {
            // If base is provided, resolve relative URLs. If not, use the URL as-is.
            const absoluteUrl = base ? new URL(url, base).href : url;
            const normalizedUrl = normalizeUrl(absoluteUrl);
            
            bookmarks.push({
              name: extractNameFromUrl(normalizedUrl, name || absoluteUrl),
              url: normalizedUrl,
              stack: stackName,
              icon: getFavicon(normalizedUrl),
              openExternal: false,
              isFavorite: false,
              createdAt: new Date().toISOString(),
              id: crypto.randomUUID(),
              orderIndex: currentCount + index // Add orderIndex to the end
            });
          } catch (e) {
            logError(e, `parseLinksFromHtml (Skipped URL: ${url})`);
          }
        }
      });
      
      return bookmarks;
    }

    /**
     * Helper function to process a single-link grab
     * @param {string} text - The string from the clipboard
     * @param {string} [stackName="Quick Stack"] - The stack to add links to
     * @returns {boolean} - True if successful, false if not
     */
     async function processQuickGrabPaste(text, stackName = "Quick Stack") {
        if (!text || !text.trim()) {
            return false;
        }

        const lines = text.split('\n').filter(line => line.trim().length > 0);
        if (lines.length === 0) {
            return false;
        }

        let addedCount = 0;
        let failedCount = 0;
        
        // Only process the first valid link found.
        const lineToProcess = lines[0];

        let normalizedUrl;
        try {
            normalizedUrl = normalizeUrl(lineToProcess);
        } catch (e) {
            logError(e, `processQuickGrab (Skipped: ${lineToProcess})`);
            failedCount++;
            return false; // Failed
        }

        const name = extractNameFromUrl(normalizedUrl, '');
        const stack = stackName; // Use the parameter
        const icon = getFavicon(normalizedUrl);
        
        const newBookmark = {
            id: crypto.randomUUID(),
            name,
            url: normalizedUrl,
            stack,
            icon,
            openExternal: false,
            isFavorite: false,
            createdAt: new Date().toISOString(),
            orderIndex: allBookmarks.length // Add to the end
        };

        try {
            await addBookmarkToDB(newBookmark);
            addedCount++;
        } catch (error) {
            logError(error, `processQuickGrab (Failed to add: ${lineToProcess})`);
            failedCount++;
        }

        if (addedCount > 0) {
            showNotification(`Added 1 bookmark to ${stackName}.`);
            // --- OPTIMIZATION ---
            allBookmarks.push(newBookmark);
            refreshUI();
            // --- END OPTIMIZATION ---
        }
        if (failedCount > 0) {
            showNotification(`Link failed to import. Check log.`, true);
        }
        
        return addedCount > 0;
    }

      // Show confirmation modal first
      const body = `
        <p class="text-sm text-gray-300">This will install the default Cloudstax tools from:</p>

      `;

    // --- Stack Creator Functions (adapted from CLL.html) ---
    
    function stackCreator_load() {
        try { return JSON.parse(localStorage.getItem(CREATOR_KEY)) || []; } catch(e) { return []; }
    }
    function stackCreator_save(arr) {
        localStorage.setItem(CREATOR_KEY, JSON.stringify(arr));
        stackCreator_render();
    }
    function stackCreator_inferName(url) {
        try {
            const u = new URL(url);
            return u.hostname.replace(/^www\./,'');
        } catch(e) { return url; }
    }
    function stackCreator_parseInput(text) {
        text = (text||'').trim();
        if(!text) return null;
        const parts = text.split(/\s*-\s*/);
        if(parts.length === 1){
            const maybeUrl = parts[0];
            const url = maybeUrl.match(/^https?:\/\//i) ? maybeUrl : 'https://' + maybeUrl;
            return {name: stackCreator_inferName(url), href: url};
        } else {
            const name = parts.slice(0, -1).join(' - ') || parts[0];
            let href = parts[parts.length-1];
            href = href.match(/^https?:\/\//i) ? href : 'https://' + href;
            return {name: name.trim() || stackCreator_inferName(href), href: href.trim()};
        }
    }
    function stackCreator_addFromInput(str) {
        const entry = stackCreator_parseInput(str);
        if(!entry) return;
        const arr = stackCreator_load();
        arr.push(entry);
        stackCreator_save(arr);
    }
    function stackCreator_removeIndex(i) {
        const arr = stackCreator_load();
        arr.splice(i,1);
        stackCreator_save(arr);
    }
    function stackCreator_moveUp(i) {
        if(i<=0) return;
        const arr = stackCreator_load();
        const a = arr.splice(i,1)[0];
        arr.splice(i-1,0,a);
        stackCreator_save(arr);
    }
    function stackCreator_moveDown(i) {
        const arr = stackCreator_load();
        if(i>=arr.length-1) return;
        const a = arr.splice(i,1)[0];
        arr.splice(i+1,0,a);
        stackCreator_save(arr);
    }
    function stackCreator_render() {
        const listEl = $('stackCreatorList');
        if (!listEl) return; // Modal not open
        
        const arr = stackCreator_load();
        listEl.innerHTML = '';
        arr.forEach((it, idx) => {
            const li = document.createElement('li');
            const left = document.createElement('div');
            left.style.minWidth = '0';
            left.innerHTML = `<div class="creator-anchor" title="${escapeAttr(it.name)}">${escapeHtml(it.name)}</div> <div class="creator-meta" title="${escapeAttr(it.href)}">${escapeHtml(it.href)}</div>`;
            li.appendChild(left);
            
            const actions = document.createElement('div');
            actions.className = 'creator-actions';
            actions.style.display = 'flex';
            actions.style.gap = '6px';
            actions.style.flexShrink = '0';
            const up = document.createElement('button'); up.textContent = '↑'; up.onclick = () => stackCreator_moveUp(idx);
            const down = document.createElement('button'); down.textContent = '↓'; down.onclick = () => stackCreator_moveDown(idx);
            const del = document.createElement('button'); del.textContent = '✕'; del.className = 'creator-delete'; del.onclick = () => stackCreator_removeIndex(idx);
            actions.appendChild(up); actions.appendChild(down); actions.appendChild(del);
            li.appendChild(actions);
            listEl.appendChild(li);
        });
        if(arr.length===0){
            listEl.innerHTML = '<li class="creator-meta" style="background:transparent;">No links yet. Paste a link and press Enter.</li>';
        }
    }
    function stackCreator_handleExport() {
        const arr = stackCreator_load();
        const html = ['<!doctype html>','<html>','  <head>','    <meta charset="utf-8" />','    <title>Cloudstax-Links</title>','  </head>','  <body>']
          .concat(arr.map(it => `    <a href="${escapeAttr(it.href)}">${escapeHtml(it.name)}</a>`))
          .concat(['  </body>','</html>']).join('\n');
        const blob = new Blob([html], {type:'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'Cloudstax-Links.html';
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }

        if (stackCreator_load().length === 0) {

    function stackCreator_handlePaste(e) {
        const text = (e.clipboardData || window.clipboardData).getData('text');
        if(text && /\r|\n/.test(text)){
            e.preventDefault();
            const lines = text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
            lines.forEach(l => stackCreator_addFromInput(l));
            e.target.value = '';
        }
    }
    function stackCreator_handleKeydown(e) {
        if(e.key === 'Enter'){
            e.preventDefault();
            const input = e.target;
            const v = input.value.trim();
            if(!v) return;
            stackCreator_addFromInput(v);
            input.value = '';
        }
    }

    /**
     * Handles all clicks inside the modal for event delegation.
     * @param {Event} e - The click event.
     */
    function handleModalClicks(e) {
        const target = e.target;
        
        // Accordion Toggle
        const accordionToggle = target.closest('.settings-section-title');
        if (accordionToggle) {
            const targetId = accordionToggle.dataset.target;
            const targetContent = $(targetId);
            const chevron = accordionToggle.querySelector('.settings-chevron');
            if (targetContent) {
                targetContent.classList.toggle('hidden');
                chevron.classList.toggle('rotated');
            }
            return;
        }

        // Button Clicks
        const button = target.closest('button');
        if (!button) return;

        switch(button.id) {
            case 'closeSettings':
                hideModal();
                break;
            case 'modalInstallTools':
                hideModal();
                handleInstallTools();
                break;
            case 'modalImportStack':
                hideModal();
                handleImportStackPreset();
                break;
            case 'modalCreateStack':
                hideModal();
                handleShowStackCreator();
                break;
            case 'modalViewLog':
                hideModal();
                handleViewLog();
                break;
            case 'modalExportData':
                exportBookmarks();
                break;
            case 'modalSaveIcons':
                const newIconMap = new Map();
                document.querySelectorAll('.stack-icon-select').forEach(select => {
                    const stackName = select.dataset.stackName;
                    const icon = select.value;
                    if (stackName) { 
                        newIconMap.set(stackName, icon);
                    }
                });
                saveStackIcons(newIconMap);
                showNotification("Stack icons saved!");
                refreshUI();
                break;
        }
    }


    // --- Initialization ---

    async function initialize() {
      try {
        // 1. Initialize the 3D Logos
        initThreeJSAnimation();
        // Standby animation is now lazy-loaded
          
        // 2. Initialize the local database
        await initDB();
        
        // 3. Load recent launches
        recentLaunches = JSON.parse(localStorage.getItem('cloudstax_recent')) || [];
        
        // 4. Load stack icons
        loadStackIcons();
        
        // 5. Load all bookmarks from the DB
        await loadAllBookmarks(); // This now calls refreshUI()
 
      } catch (error) {
        logError(error, "initialize");
        elements.loadingIndicator.textContent = "Error: Application failed to initialize. Check log.";
        return;
      }

      // 6. Add DOM Event Listeners
      elements.addBtn.addEventListener('click', addBookmark);
      elements.urlIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.nameIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.stackIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      
      // Debounced search input
      elements.searchIn.addEventListener('input', debounce(() => { 
        currentPage = 1; 
        renderBookmarks(); 
      }, 250));
      
      elements.stackFilter.addEventListener('change', () => { 
        currentPage = 1;
        // If in reorder mode, toggle it off when changing filter
        if (isReorderMode) {
            handleReorderToggle(); // This will also call renderBookmarks
        } else {
            renderBookmarks();
        }
      });
      
      elements.launchSelectedBtn.addEventListener('click', launchSelected);
      elements.quickGrabBtn.addEventListener('click', handleQuickGrabModal); 
      elements.settingsBtn.addEventListener('click', handleShowSettings);
      elements.reorderBtn.addEventListener('click', handleReorderToggle); 
      
      // Standby listeners
      elements.standbyBtn.addEventListener('click', () => toggleStandbyMode(true));
      elements.openAppBtn.addEventListener('click', () => toggleStandbyMode(false));
      
      // Modal event delegation
      elements.modalBody.addEventListener('click', handleModalClicks);
      elements.modalFooter.addEventListener('click', handleModalClicks); // <-- FIX: Listen for clicks in the footer too
    }
    
    // --- Global Error Handlers ---
    window.onerror = function(message, source, lineno, colno, error) {
      logError(error || { message: message }, `Global Uncaught\nSource: ${source} @ ${lineno}:${colno}`);
      return true; // Prevents the default browser error console
    };

    window.onunhandledrejection = function(event) {
      logError(event.reason || { message: 'Unhandled promise rejection' }, 'Global Unhandled Rejection');
    };

    document.addEventListener('DOMContentLoaded', initialize);

  </script>
</body>
</html>
