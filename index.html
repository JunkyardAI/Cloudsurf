<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudstax - Quick Access</title>
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Simple scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #4b5563; /* gray-600 */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280; /* gray-500 */
    }
    ::-webkit-scrollbar-track {
      background: #1f2937; /* gray-800 */
    }
    /* Custom checkbox style */
    .form-checkbox {
      appearance: none;
      background-color: #374151; /* gray-700 */
      border: 1px solid #4b5563; /* gray-600 */
      padding: 0;
      -webkit-print-color-adjust: exact;
      color-adjust: exact;
      display: inline-block;
      vertical-align: middle;
      background-origin: border-box;
      user-select: none;
      flex-shrink: 0;
      height: 1.25rem; /* h-5 */
      width: 1.25rem; /* w-5 */
      border-radius: 0.375rem; /* rounded */
    }
    .form-checkbox:checked {
      background-color: #3b82f6; /* blue-500 */
      border-color: #3b82f6;
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 0 1 0 1.414l-5 5a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L6.5 9.086l4.293-4.293a1 1 0 0 1 1.414 0z'/%3e%3c/svg%3e");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }
    .form-checkbox:focus {
      outline: 2px solid transparent;
      outline-offset: 2px;
      --tw-ring-color: #3b82f6; /* ring-blue-500 */
      --tw-ring-offset-shadow: 0 0 #0000;
      --tw-ring-shadow: 0 0 #0000;
      box-shadow: 0 0 0 2px var(--tw-ring-color);
    }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 md:flex md:items-center md:justify-center md:p-4">

  <!-- Main Application Panel -->
  <!--
    Mobile-first: Full width/height by default.
    md: breakpoint (desktop/electron): Applies max-width, max-height, rounding, shadow, and border.
  -->
  <div class="w-full h-full md:w-full md:max-w-2xl md:h-[750px] md:max-h-[90vh] bg-gray-900 md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden md:border md:border-gray-800">
    
    <!-- Header -->
    <header class="flex items-center gap-3 p-4 border-b border-gray-800 select-none flex-shrink-0">
      <!-- Icon -->
      <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layers"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </div>
      <div>
        <h1 class="text-base font-semibold">Cloudstax</h1>
        <p class="text-xs text-gray-400">Your quick-access bookmark stacks</p>
      </div>
    </header>

    <!-- Add Bookmark Form -->
    <div class="p-4 border-b border-gray-800 flex-shrink-0">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <input id="nameIn" placeholder="Name (e.g., Google)" class="md:col-span-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <input id="urlIn" placeholder="URL (e.g., google.com)" class="md:col-span-2 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
        <input id="stackIn" placeholder="Stack (e.g., Tools)" class="md:col-span-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="addBtn" class="md:col-span-2 w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          Add Bookmark
        </button>
      </div>
    </div>

    <!-- Search & Filter -->
    <div class="flex gap-3 p-4 border-b border-gray-800 flex-shrink-0">
      <div class="relative flex-1">
        <input id="searchIn" placeholder="Search..." class="w-full text-sm bg-gray-800 rounded-md pl-10 pr-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
      <select id="stackFilter" class="text-sm bg-gray-800 text-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">All Stacks</option>
        <!-- Stacks will be populated by JS -->
      </select>
    </div>

    <!-- Bookmarks List -->
    <div id="bookmarksView" class="flex-1 overflow-y-auto p-3">
      <div id="bookmarksList" class="space-y-2">
        <!-- Bookmarks will be populated by JS -->
        <p id="loadingIndicator" class="text-center text-gray-400 p-4">Loading bookmarks...</p>
      </div>
    </div>

    <!-- Multi-select Footer -->
    <div id="multiSelectFooter" class="hidden p-3 bg-gray-800 border-t border-gray-700 flex justify-between items-center flex-shrink-0">
      <span id="selectedCount" class="text-sm text-gray-300">0 selected</span>
      <button id="launchSelectedBtn" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-md text-sm font-medium transition flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rocket"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.3.09-3.21l-1.07-1.07a3 3 0 0 0-3.21.09z"/><path d="M12 15.5 3.5 7.3c-.07-.1-.1-.23-.1-.34a.5.5 0 0 1 .5-.5h.34c.11 0 .24.03.34.1l8.2 8.2"/><path d="M15.5 12 7.3 3.5c-.1-.07-.23-.1-.34-.1a.5.5 0 0 0-.5.5v.34c0 .11.03.24.1.34l8.2 8.2"/><path d="M7 21a6.5 6.5 0 0 0 6.5-6.5.5.5 0 0 0-.5-.5H12c-.28 0-.5.22-.5.5A6.5 6.5 0 0 0 21 7"/><path d="M21 3v4h-4"/></svg>
        Launch Selected
      </button>
    </div>
    
    <!-- Import/Export Footer -->
    <div id="importExportFooter" class="p-3 bg-gray-900 border-t border-gray-800 flex gap-3 justify-end flex-shrink-0">
      <button id="importBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-input"><path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M2 15h10"/><path d="m5 12-3 3 3 3"/></svg>
        Import
      </button>
      <button id="exportBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-output"><path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M22 15h-10"/><path d="m19 12-3 3 3 3"/></svg>
        Export
      </button>
    </div>
  </div>

  <!-- Generic Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-gray-700">
      <div class="p-5 border-b border-gray-700 flex justify-between items-center">
        <h2 id="modalTitle" class="text-lg font-semibold">Modal Title</h2>
        <button id="modalClose" class="text-gray-400 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="modalBody" class="p-5">
        <!-- Modal content goes here -->
      </div>
      <div id="modalFooter" class="p-4 bg-gray-900/50 border-t border-gray-700 flex gap-3 justify-end">
        <!-- Modal buttons go here -->
      </div>
    </div>
  </div>
  
  <!-- Notification Area -->
  <div id="notification" class="hidden fixed bottom-5 right-5 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50">
    Notification message
  </div>


  <!-- Firebase and App Logic -->
  <script type="module">
    // --- IndexedDB Configuration ---
    const DB_NAME = 'cloudstax_db';
    const DB_VERSION = 1;
    const STORE_NAME = 'bookmarks';

    // --- Global State ---
    let db; // IndexedDB instance
    let allBookmarks = []; // Local cache of all bookmarks
    let selectedBookmarks = new Set(); // Set of bookmark IDs for multi-select
    
    // --- DOM Elements ---
    const $ = document.getElementById.bind(document);
    const elements = {
      nameIn: $('nameIn'),
      urlIn: $('urlIn'),
      stackIn: $('stackIn'),
      addBtn: $('addBtn'),
      searchIn: $('searchIn'),
      stackFilter: $('stackFilter'),
      bookmarksList: $('bookmarksList'),
      loadingIndicator: $('loadingIndicator'),
      userIdDisplay: $('userIdDisplay'), // This element no longer exists, but we'll leave the ref just in case to avoid script errors if not all HTML is updated.
      modal: $('modal'),
      modalTitle: $('modalTitle'),
      modalBody: $('modalBody'),
      modalFooter: $('modalFooter'),
      modalClose: $('modalClose'),
      notification: $('notification'),
      multiSelectFooter: $('multiSelectFooter'),
      selectedCount: $('selectedCount'),
      launchSelectedBtn: $('launchSelectedBtn'),
      importBtn: $('importBtn'),
      exportBtn: $('exportBtn'),
    };

    // --- Utility Functions ---

    /**
     * Normalizes a URL. Adds https:// if no protocol is present.
     * @param {string} input - The URL string from the user.
     * @returns {string} A normalized URL.
     */
    function normalizeUrl(input) {
      let s = String(input || '').trim();
      if (!s) throw new Error('URL cannot be empty.');
      
      if (/^localhost(:\d+)?$/.test(s) || /^\d{1,3}(\.\d{1,3}){3}(:\d+)?$/.test(s)) {
        if (!/^http(s)?:\/\//.test(s)) {
          s = 'http://' + s;
        }
      } 
      else if (!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(s)) {
        if (s.includes('.') || s.includes('/')) {
            s = 'https://' + s;
        } else {
            s = 'https://www.google.com/search?q=' + encodeURIComponent(s);
        }
      }
      
      try {
        new URL(s);
        return s;
      } catch (e) {
        console.error("Invalid URL construction:", e);
        throw new Error('Invalid URL format.');
      }
    }

    /**
     * Extracts a sensible name from a URL if no name is provided.
     * @param {string} url - The normalized URL.
     * @param {string} name - The user-provided name.
     * @returns {string} The best available name.
     */
    function extractNameFromUrl(url, name) {
      if (name?.trim()) return name.trim();
      try {
        const host = new URL(url).hostname.replace(/^www\./i, '');
        const candidate = host.split('.')[0];
        return candidate.charAt(0).toUpperCase() + candidate.slice(1);
      } catch {
        return "Untitled";
      }
    }

    /**
     * Gets a favicon URL from Google's service.
     * @param {string} url - The normalized URL.
     * @returns {string} The favicon image URL.
     */
    function getFavicon(url) {
      try {
        const host = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
      } catch {
        return 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-globe%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><path d=%22M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20%22/><path d=%22M2 12h20%22/></svg>';
      }
    }

    /**
     * Sanitizes HTML string to prevent XSS.
     * @param {string} str - The string to sanitize.
     * @returns {string} A sanitized string.
     */
    function sanitize(str) {
      if (str === null || str === undefined) return '';
      const temp = document.createElement('div');
      temp.textContent = str;
      return temp.innerHTML;
    }

    /**
     * Shows a notification message.
     * @param {string} message - The message to display.
     * @param {boolean} [isError=false] - Whether this is an error message.
     */
    function showNotification(message, isError = false) {
      elements.notification.textContent = message;
      elements.notification.classList.remove('hidden', 'bg-green-600', 'bg-red-600');
      elements.notification.classList.add(isError ? 'bg-red-600' : 'bg-green-600');
      
      setTimeout(() => {
        elements.notification.classList.add('hidden');
      }, 3000);
    }

    // --- Modal Functions ---

    function showModal(title, bodyHtml, footerHtml) {
      elements.modalTitle.textContent = title;
      elements.modalBody.innerHTML = bodyHtml;
      elements.modalFooter.innerHTML = footerHtml;
      elements.modal.classList.remove('hidden');
    }

    function hideModal() {
      elements.modal.classList.add('hidden');
      elements.modalTitle.textContent = '';
      elements.modalBody.innerHTML = '';
      elements.modalFooter.innerHTML = '';
    }
    
    elements.modalClose.addEventListener('click', hideModal);

    // --- IndexedDB Functions ---

    /**
     * Initializes the IndexedDB database.
     */
    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };

        request.onsuccess = (event) => {
          db = event.target.result;
          console.log("Database initialized successfully");
          resolve(db);
        };

        request.onerror = (event) => {
          console.error("IndexedDB error:", event.target.error);
          elements.loadingIndicator.textContent = "Error: Could not open local database.";
          reject(event.target.error);
        };
      });
    }

    /**
     * Helper to get an object store.
     * @param {string} mode - 'readonly' or 'readwrite'
     */
    function getObjectStore(mode) {
      const transaction = db.transaction([STORE_NAME], mode);
      return transaction.objectStore(STORE_NAME);
    }

    /**
     * Fetches all bookmarks from IndexedDB.
     */
    function getAllBookmarksFromDB() {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readonly');
        const request = store.getAll();

        request.onsuccess = (event) => {
          resolve(event.target.result);
        };

        request.onerror = (event) => {
          console.error("Error fetching bookmarks:", event.target.error);
          reject(event.target.error);
        };
      });
    }

    /**
     * Adds a single bookmark to IndexedDB.
     * @param {object} bookmark - The bookmark object to add.
     */
    function addBookmarkToDB(bookmark) {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readwrite');
        const request = store.add(bookmark);

        request.onsuccess = resolve;
        request.onerror = reject;
      });
    }

    /**
     * Updates a single bookmark in IndexedDB.
     * @param {object} bookmark - The bookmark object to update.
     */
    function updateBookmarkInDB(bookmark) {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readwrite');
        const request = store.put(bookmark);

        request.onsuccess = resolve;
        request.onerror = reject;
      });
    }

    /**
     * Deletes a single bookmark from IndexedDB by its ID.
     * @param {string} id - The ID of the bookmark to delete.
     */
    function deleteBookmarkFromDB(id) {
      return new Promise((resolve, reject) => {
        const store = getObjectStore('readwrite');
        const request = store.delete(id);

        request.onsuccess = resolve;
        request.onerror = reject;
      });
    }

    /**
     * Batch imports an array of bookmarks into IndexedDB.
     * @param {Array} bookmarks - Array of bookmark objects.
     */
    function batchImportToDB(bookmarks) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);

        let importCount = 0;
        bookmarks.forEach(bookmark => {
          // Add a UUID if the imported item doesn't have one
          if (!bookmark.id) {
            bookmark.id = crypto.randomUUID();
          }
          store.add(bookmark);
          importCount++;
        });

        transaction.oncomplete = () => {
          resolve(importCount);
        };

        transaction.onerror = (event) => {
          reject(event.target.error);
        };
      });
    }


    // --- Rendering Functions ---

    /**
     * Renders the list of bookmarks based on current filters.
     */
    function renderBookmarks() {
      const searchTerm = elements.searchIn.value.toLowerCase();
      const stackFilter = elements.stackFilter.value;

      const filteredBookmarks = allBookmarks.filter(bookmark => {
        const stack = bookmark.stack || bookmark.category || "General";
        const matchesSearch = 
          bookmark.name.toLowerCase().includes(searchTerm) ||
          bookmark.url.toLowerCase().includes(searchTerm) ||
          stack.toLowerCase().includes(searchTerm);
        
        const matchesStack = 
          !stackFilter || stack === stackFilter;
          
        return matchesSearch && matchesStack;
      });

      elements.bookmarksList.innerHTML = '';

      if (filteredBookmarks.length === 0 && allBookmarks.length > 0) {
        elements.loadingIndicator.textContent = 'No bookmarks found. Try adjusting your search.';
        elements.bookmarksList.appendChild(elements.loadingIndicator);
      } else if (allBookmarks.length === 0) {
        elements.loadingIndicator.textContent = 'No bookmarks yet. Add one above!';
        elements.bookmarksList.appendChild(elements.loadingIndicator);
      }

      filteredBookmarks.forEach(bookmark => {
        const stack = bookmark.stack || bookmark.category || "General";
        const isChecked = selectedBookmarks.has(bookmark.id) ? 'checked' : '';
        
        const item = document.createElement('div');
        // Use items-start to align checkbox with the top of the text content
        item.className = 'flex items-start gap-3 p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition';
        
        item.innerHTML = `
          <input type="checkbox" class="bookmark-checkbox form-checkbox mt-1" data-id="${bookmark.id}" ${isChecked}>
          <img src="${sanitize(bookmark.icon)}"
               class="w-8 h-8 rounded-md flex-shrink-0" 
               alt=""
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-globe%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><path d=%22M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20%22/><path d=%22M2 12h20%22/></svg>'">
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium truncate text-gray-100" title="${sanitize(bookmark.name)}">
              ${sanitize(bookmark.name)}
            </p>
            <p class="text-xs text-gray-400 truncate" title="${sanitize(bookmark.url)}">${sanitize(bookmark.url)}</p>
          </div>
          <!-- This container stacks vertically on mobile (default) and becomes a row on sm screens -->
          <div class="flex flex-col items-end gap-2 sm:flex-row sm:items-center sm:gap-3 flex-shrink-0 ml-0 sm:ml-auto">
            <span class="text-xs bg-gray-600 text-gray-300 px-2 py-0.5 rounded-full whitespace-nowrap">${sanitize(stack)}</span>
            <div class="flex gap-1">
              <button class="launch-btn p-1 text-gray-400 hover:text-green-400" data-url="${sanitize(bookmark.url)}" title="Launch">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
              </button>
              <button class="edit-btn p-1 text-gray-400 hover:text-blue-400" data-id="${bookmark.id}" title="Edit">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><line x1="18" x2="22" y1="2" y2="6"/><path d="M7.5 20.5 19 9l-4-4L3.5 16.5 2 22z"/></svg>
              </button>
              <button class="delete-btn p-1 text-gray-400 hover:text-red-400" data-id="${bookmark.id}" title="Delete">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trash-2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
              </button>
            </div>
          </div>
        `;
        elements.bookmarksList.appendChild(item);
      });
      
      // Add event listeners to new elements
      document.querySelectorAll('.launch-btn').forEach(btn => {
        btn.addEventListener('click', () => window.open(btn.dataset.url, '_blank', 'noopener'));
      });
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => handleEditClick(btn.dataset.id));
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => handleDeleteClick(btn.dataset.id));
      });
      document.querySelectorAll('.bookmark-checkbox').forEach(cb => {
        cb.addEventListener('change', () => handleCheckboxChange(cb.dataset.id, cb.checked));
      });
      
      updateMultiSelectFooter();
    }

    /**
     * Updates the stack filter dropdown with unique stacks.
     */
    function renderStacks() {
      const stacks = [...new Set(allBookmarks.map(b => b.stack || b.category || "General"))].sort();
      
      const currentFilter = elements.stackFilter.value;
      
      elements.stackFilter.innerHTML = '<option value="">All Stacks</option>';
      stacks.forEach(stack => {
        const option = document.createElement('option');
        option.value = stack;
        option.textContent = stack;
        elements.stackFilter.appendChild(option);
      });
      
      elements.stackFilter.value = currentFilter;
    }
    
    /**
     * Updates the multi-select footer visibility and count.
     */
    function updateMultiSelectFooter() {
      const count = selectedBookmarks.size;
      if (count > 0) {
        elements.multiSelectFooter.classList.remove('hidden');
        elements.selectedCount.textContent = `${count} selected`;
      } else {
        elements.multiSelectFooter.classList.add('hidden');
      }
    }
    
    /**
     * Handles checkbox state changes for multi-select.
     * @param {string} id - The bookmark ID.
     * @param {boolean} isChecked - The new checked state.
     */
    function handleCheckboxChange(id, isChecked) {
      if (isChecked) {
        selectedBookmarks.add(id);
      } else {
        selectedBookmarks.delete(id);
      }
      updateMultiSelectFooter();
    }

    // --- Data Logic Functions ---

    /**
     * Loads all bookmarks from DB, updates state, and re-renders.
     */
    async function loadAllBookmarks() {
      try {
        allBookmarks = await getAllBookmarksFromDB();
        allBookmarks.sort((a, b) => {
          const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
          const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
          return dateB - dateA; // Sort by newest first
        });
        
        renderStacks();
        renderBookmarks();
      } catch (error) {
        console.error("Failed to load bookmarks:", error);
        showNotification("Could not load bookmarks.", true);
      }
    }

    /**
     * Adds a new bookmark.
     */
    async function addBookmark() {
      const rawName = elements.nameIn.value;
      const rawUrl = elements.urlIn.value;
      let rawStack = elements.stackIn.value.trim();

      if (!rawUrl) {
        showNotification("URL is required.", true);
        return;
      }
      
      let normalizedUrl;
      try {
        normalizedUrl = normalizeUrl(rawUrl);
      } catch (e) {
        showNotification(e.message, true);
        return;
      }

      const name = extractNameFromUrl(normalizedUrl, rawName);
      const stack = rawStack.length > 0 ? (rawStack.charAt(0).toUpperCase() + rawStack.slice(1)) : "General";
      const icon = getFavicon(normalizedUrl);
      
      const newBookmark = {
        id: crypto.randomUUID(), // Generate a unique ID
        name,
        url: normalizedUrl,
        stack,
        icon,
        createdAt: new Date().toISOString() // Store as ISO string
      };
      
      elements.addBtn.disabled = true;
      elements.addBtn.textContent = 'Adding...';

      try {
        await addBookmarkToDB(newBookmark);
        showNotification("Bookmark added!");
        
        // Clear inputs
        elements.nameIn.value = '';
        elements.urlIn.value = '';
        elements.stackIn.value = '';

        await loadAllBookmarks(); // Reload and re-render
      } catch (error) {
        console.error("Error adding document: ", error);
        showNotification("Failed to add bookmark.", true);
      } finally {
        elements.addBtn.disabled = false;
        elements.addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg> Add Bookmark`;
      }
    }
    
    function handleDeleteClick(id) {
      const bookmark = allBookmarks.find(b => b.id === id);
      if (!bookmark) return;

      const body = `<p>Are you sure you want to delete this bookmark?</p>
                    <p class="font-medium text-gray-100 mt-2">${sanitize(bookmark.name)}</p>`;
      
      const footer = `
        <button id="cancelDelete" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Cancel</button>
        <button id="confirmDelete" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-md text-sm font-medium transition">Delete</button>
      `;
      
      showModal("Delete Bookmark", body, footer);
      
      $('cancelDelete').addEventListener('click', hideModal);
      $('confirmDelete').addEventListener('click', async () => {
        try {
          await deleteBookmarkFromDB(id);
          selectedBookmarks.delete(id); // Remove from selection if it was selected
          updateMultiSelectFooter();
          showNotification("Bookmark deleted.");
          
          await loadAllBookmarks(); // Reload and re-render
        } catch (error) {
          console.error("Error deleting document: ", error);
          showNotification("Failed to delete bookmark.", true);
        } finally {
          hideModal();
        }
      });
    }

    function handleEditClick(id) {
      const bookmark = allBookmarks.find(b => b.id === id);
      if (!bookmark) return;
      
      const stack = bookmark.stack || bookmark.category || "General";

      const body = `
        <div class="space-y-3">
          <div>
            <label class="text-xs text-gray-400">Name</label>
            <input id="editNameIn" value="${sanitize(bookmark.name)}" class="w-full text-sm bg-gray-700 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="text-xs text-gray-400">URL</label>
            <input id="editUrlIn" value="${sanitize(bookmark.url)}" class="w-full text-sm bg-gray-700 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="text-xs text-gray-400">Stack</label>
            <input id="editStackIn" value="${sanitize(stack)}" class="w-full text-sm bg-gray-700 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
      `;
      
      const footer = `
        <button id="cancelUpdate" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Cancel</button>
        <button id="confirmUpdate" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition" data-id="${id}">Save Changes</button>
      `;

      showModal("Edit Bookmark", body, footer);
      
      $('cancelUpdate').addEventListener('click', hideModal);
      $('confirmUpdate').addEventListener('click', (e) => updateBookmark(e.target.dataset.id));
    }
    
    async function updateBookmark(id) {
      const rawName = $('editNameIn').value;
      const rawUrl = $('editUrlIn').value;
      let rawStack = $('editStackIn').value.trim();
      
      let normalizedUrl;
      try {
        normalizedUrl = normalizeUrl(rawUrl);
      } catch (e) {
        showNotification(e.message, true);
        return;
      }
      
      const name = extractNameFromUrl(normalizedUrl, rawName);
      const stack = rawStack.length > 0 ? (rawStack.charAt(0).toUpperCase() + rawStack.slice(1)) : "General";
      const icon = getFavicon(normalizedUrl);
      
      const updatedData = {
        ...bookmark, // Preserve ID and createdAt
        name,
        url: normalizedUrl,
        stack,
        icon
      };
      
      try {
        await updateBookmarkInDB(updatedData);
        showNotification("Bookmark updated!");
        await loadAllBookmarks(); // Reload and re-render
      } catch (error) {
        console.error("Error updating document: ", error);
        showNotification("Failed to update bookmark.", true);
      } finally {
        hideModal();
      }
    }
    
    /**
     * Handles launching all selected bookmarks.
     */
    function launchSelected() {
      if (selectedBookmarks.size === 0) return;
      
      let launchedCount = 0;
      selectedBookmarks.forEach(id => {
        const bookmark = allBookmarks.find(b => b.id === id);
        if (bookmark) {
          window.open(bookmark.url, '_blank', 'noopener');
          launchedCount++;
        }
      });
      
      showNotification(`Launched ${launchedCount} bookmarks.`);
      
      // Clear selection
      selectedBookmarks.clear();
      document.querySelectorAll('.bookmark-checkbox:checked').forEach(cb => cb.checked = false);
      updateMultiSelectFooter();
    }
    
    /**
     * Handles exporting bookmarks to a JSON file.
     */
    function exportBookmarks() {
      if (allBookmarks.length === 0) {
        showNotification("No bookmarks to export.", true);
        return;
      }
      
      // Create a cleaner export format
      const exportData = allBookmarks.map(b => ({
        name: b.name,
        url: b.url,
        stack: b.stack || b.category || "General",
        createdAt: b.createdAt?.toDate ? b.createdAt.toDate().toISOString() : new Date().toISOString()
      }));
      
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `cloudstax_export_${new Date().toISOString().split('T')[0]}.json`);
      document.body.appendChild(downloadAnchor); // required for firefox
      downloadAnchor.click();
      downloadAnchor.remove();
      
      showNotification("Bookmarks exported.");
    }

    /**
     * Handles importing bookmarks from a JSON file.
     */
    function importBookmarks() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json,application/json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (!Array.isArray(importedData)) {
              throw new Error("Invalid format. Expected a JSON array.");
            }
            
            const validBookmarks = importedData.filter(b => b.name && b.url).map(b => ({
              name: b.name,
              url: normalizeUrl(b.url), // Normalize URL on import
              stack: b.stack || b.category || "General",
              icon: getFavicon(normalizeUrl(b.url)),
              createdAt: b.createdAt ? new Date(b.createdAt).toISOString() : new Date().toISOString(),
              id: crypto.randomUUID() // Assign a new ID on import
            }));

            if (validBookmarks.length === 0) {
              showNotification("No valid bookmarks found in file.", true);
              return;
            }

            confirmImport(validBookmarks);
            
          } catch (error) {
            console.error("Import error:", error);
            showNotification(`Import failed: ${error.message}`, true);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }
    
    /**
     * Shows a confirmation modal before batch-importing bookmarks.
     * @param {Array} bookmarks - The array of validated bookmark objects to import.
     */
    function confirmImport(bookmarks) {
      const body = `<p>Are you sure you want to import ${bookmarks.length} bookmarks? This will add them to your existing collection.</p>`;
      
      const footer = `
        <button id="cancelImport" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Cancel</button>
        <button id="confirmImport" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">Import</button>
      `;
      
      showModal(`Import ${bookmarks.length} Bookmarks`, body, footer);
      
      $('cancelImport').addEventListener('click', hideModal);
      $('confirmImport').addEventListener('click', async () => {
        try {
          const importCount = await batchImportToDB(bookmarks);
          showNotification(`Successfully imported ${importCount} bookmarks.`);
          await loadAllBookmarks(); // Reload and re-render
        } catch (error) {
          console.error("Error batch writing documents: ", error);
          showNotification("Failed to import bookmarks.", true);
        } finally {
          hideModal();
        }
      });
    }

    // --- Initialization ---

    async function initialize() {
      try {
        // 1. Initialize the local database
        await initDB();
        
        // 2. Load all bookmarks from the DB
        await loadAllBookmarks();

      } catch (error) {
        console.error("Initialization failed:", error);
        elements.loadingIndicator.textContent = "Error: Application failed to initialize.";
        return;
      }

      // 3. Add DOM Event Listeners
      elements.addBtn.addEventListener('click', addBookmark);
      elements.urlIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.nameIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.stackIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      
      elements.searchIn.addEventListener('input', renderBookmarks);
      elements.stackFilter.addEventListener('change', renderBookmarks);
      
      elements.launchSelectedBtn.addEventListener('click', launchSelected);
      elements.importBtn.addEventListener('click', importBookmarks);
      elements.exportBtn.addEventListener('click', exportBookmarks);
    }

    document.addEventListener('DOMContentLoaded', initialize);

  </script>
</body>
</html>
