<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cloudstax OS</title>
  <!-- Dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <!-- Google Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  
  <!-- CodeMirror (Editor) Dependencies -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display.swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #000; }
    
    /* UI Utils */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
    
    /* Forms */
    .form-checkbox { appearance: none; background: #374151; border: 1px solid #4b5563; display: inline-block; vertical-align: middle; height: 1.1rem; width: 1.1rem; border-radius: 0.25rem; flex-shrink: 0; }
    .form-checkbox:checked { background-color: #3b82f6; border-color: #3b82f6; background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 0 1 0 1.414l-5 5a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L6.5 9.086l4.293-4.293a1 1 0 0 1 1.414 0z'/%3e%3c/svg%3e"); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
    
    /* CodeMirror */
    .CodeMirror { height: 100%; font-family: 'JetBrains Mono', monospace; font-size: 13px; background: transparent !important; }
    .cm-s-dracula.CodeMirror { background: rgba(17, 24, 39, 0.5) !important; }

    /* Window System */
    .os-window { position: absolute; display: flex; flex-direction: column; background: #111827; border: 1px solid #374151; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: opacity 0.2s, transform 0.2s; animation: popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1); min-width: 300px; min-height: 200px; }
    .os-window.minimized { opacity: 0; pointer-events: none; transform: scale(0.9) translateY(20px); transition: all 0.3s; }
    .os-window.maximized { border-radius: 0; border: none; }
    
    .window-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #1f2937; border-bottom: 1px solid #374151; user-select: none; cursor: grab; }
    .window-header:active { cursor: grabbing; }
    .window-content { flex: 1; position: relative; overflow: hidden; background: #000; }
    .window-iframe { width: 100%; height: 100%; border: none; background: #fff; }
    
    /* Resize Handle */
    .window-resize-handle { position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; cursor: se-resize; z-index: 50; display: flex; align-items: flex-end; justify-content: flex-end; padding: 2px; }
    .window-resize-handle::after { content: ''; width: 8px; height: 8px; border-right: 2px solid #6b7280; border-bottom: 2px solid #6b7280; margin: 4px; }
    .os-window.maximized .window-resize-handle { display: none; }

    /* Desktop Icons */
    .desktop-icon { width: 80px; display: flex; flex-direction: column; align-items: center; padding: 8px; border-radius: 8px; cursor: pointer; transition: background 0.2s; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    .desktop-icon:hover, .desktop-icon.selected { background: rgba(255, 255, 255, 0.1); }
    .desktop-icon-img { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 4px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: white; }
    .desktop-icon-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    
    /* Resizer Splitter */
    .resizer { width: 4px; background: #1f2937; cursor: col-resize; transition: background 0.2s; z-index: 50; }
    .resizer:hover, .resizer.resizing { background: #3b82f6; }

    /* Animations */
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    
    /* Untitled.stream visual style for lists */
    .mono-list-item { font-family: 'JetBrains Mono', monospace; border-left: 1px solid #374151; padding-left: 12px; position: relative; }
    .mono-list-item::before { content: ''; position: absolute; left: 0; top: 50%; width: 0; height: 0; border: 1px solid transparent; transition: all 0.2s; }
    .mono-list-item:hover { border-left-color: #60a5fa; color: #fff; background: linear-gradient(90deg, rgba(59,130,246,0.1), transparent); }
    
    /* Settings Tabs */
    .settings-tab { cursor: pointer; padding: 8px 12px; border-bottom: 2px solid transparent; color: #9ca3af; font-size: 0.8rem; font-weight: 500; }
    .settings-tab.active { border-bottom-color: #3b82f6; color: white; }

    /* Icon Picker Grid */
    .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; max-height: 200px; overflow-y: auto; padding: 4px; }
    .icon-option { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; background: #374151; color: #9ca3af; }
    .icon-option:hover { background: #3b82f6; color: white; }
    
    /* Context Menu */
    #contextMenu { position: absolute; z-index: 9999; background: #1f2937; border: 1px solid #374151; border-radius: 6px; padding: 4px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); min-width: 150px; }
    .ctx-item { padding: 6px 12px; font-size: 13px; color: #e5e7eb; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
    .ctx-item:hover { background: #3b82f6; color: white; }
    .ctx-sep { height: 1px; background: #374151; margin: 4px 0; }
  </style>
</head>
<body class="h-full bg-black text-gray-100 overflow-hidden select-none" oncontextmenu="return false;">

  <!-- WALLPAPER / DESKTOP -->
  <div id="desktop" class="absolute inset-0 z-0 overflow-hidden">
      <!-- ThreeJS Background Canvas -->
      <canvas id="bg-canvas" class="absolute inset-0 w-full h-full opacity-40"></canvas>
      
      <!-- Desktop Grid -->
      <div id="desktop-grid" class="absolute inset-0 p-6 grid grid-cols-[repeat(auto-fill,80px)] grid-rows-[repeat(auto-fill,100px)] gap-4 content-start z-10 pointer-events-none">
          <!-- Icons injected by JS -->
      </div>
  </div>

  <!-- WINDOWS CONTAINER -->
  <div id="windows-area" class="absolute inset-0 z-20 pointer-events-none">
     <!-- Windows injected here -->
  </div>

  <!-- CONTEXT MENU -->
  <div id="contextMenu" class="hidden"></div>

  <!-- SETTINGS APP (Window) -->
  <div id="settings-app" class="os-window hidden w-[500px] h-[400px] bg-gray-900 border border-gray-700 z-40 flex flex-col">
       <div class="window-header justify-between">
           <span class="text-xs font-bold pl-2">System Settings</span>
           <button onclick="$('settings-app').classList.add('hidden')" class="text-gray-400 hover:text-white">✕</button>
       </div>
       <div class="flex border-b border-gray-700 bg-gray-800/50 px-2">
           <div class="settings-tab active" onclick="switchSettingsTab('data')">Data & Backup</div>
           <div class="settings-tab" onclick="switchSettingsTab('icons')">Stack Icons</div>
       </div>
       <div class="flex-1 p-4 overflow-y-auto" id="settings-content-data">
           <div class="space-y-4">
               <div class="bg-gray-800 p-3 rounded border border-gray-700">
                   <h3 class="font-bold text-sm mb-2">Export Data</h3>
                   <p class="text-xs text-gray-400 mb-2">Download a backup of all your apps and settings.</p>
                   <button id="btnExport" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-xs">Download Backup.json</button>
               </div>
               <div class="bg-gray-800 p-3 rounded border border-gray-700">
                   <h3 class="font-bold text-sm mb-2">Import Data</h3>
                   <p class="text-xs text-gray-400 mb-2">Restore from a JSON file. Existing IDs will be skipped.</p>
                   <input type="file" id="fileImport" class="text-xs text-gray-400 file:bg-gray-700 file:text-white file:border-0 file:px-2 file:py-1 file:rounded mb-2">
                   <button id="btnImport" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded text-xs">Restore Backup</button>
               </div>
               <div class="bg-gray-800 p-3 rounded border border-gray-700">
                   <h3 class="font-bold text-sm mb-2">Default Tools</h3>
                   <button id="btnTools" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-xs">Install Default Toolset</button>
               </div>
           </div>
       </div>
       <div class="flex-1 p-4 overflow-y-auto hidden" id="settings-content-icons">
           <div id="stackIconList" class="space-y-2"></div>
           <button id="btnSaveIcons" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded text-xs">Save Icon Mappings</button>
       </div>
  </div>

  <!-- ICON PICKER MODAL (Fixed Z-Index) -->
  <div id="iconPickerModal" class="hidden fixed inset-0 z-[10000] bg-black/60 flex items-center justify-center p-4">
      <div class="bg-gray-800 w-80 rounded-lg shadow-2xl border border-gray-700 flex flex-col">
          <div class="p-3 border-b border-gray-700 flex justify-between items-center">
              <span class="text-sm font-bold">Select Icon</span>
              <button onclick="$('iconPickerModal').classList.add('hidden')" class="text-gray-400 hover:text-white">✕</button>
          </div>
          <div class="p-2">
              <input id="iconSearchInput" placeholder="Filter icons..." class="w-full bg-gray-900 border border-gray-700 rounded px-2 py-1 text-xs text-white mb-2 outline-none">
              <div id="iconGrid" class="icon-grid custom-scrollbar"></div>
          </div>
      </div>
  </div>

  <!-- EDITOR APP (Full Screen Mode) -->
  <div id="editor-app" class="os-window hidden w-full h-full rounded-none border-none z-30 bg-gray-900 flex flex-col">
      <!-- Mac-style Traffic Lights Header -->
      <header class="h-10 flex items-center justify-between px-4 bg-gray-900 border-b border-gray-800 shrink-0">
          <div class="flex items-center gap-4">
              <div class="flex gap-2 group">
                  <button onclick="closeApp('editor')" class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-600 transition flex items-center justify-center text-[8px] text-black opacity-80 group-hover:opacity-100">✕</button>
                  <button class="w-3 h-3 rounded-full bg-yellow-500 hover:bg-yellow-600 transition"></button>
                  <button onclick="toggleFullScreen('editor-app')" class="w-3 h-3 rounded-full bg-green-500 hover:bg-green-600 transition"></button>
              </div>
              <span class="text-xs font-mono text-gray-400">Cloudstax Code Manager</span>
          </div>
          <div class="flex items-center gap-3">
              <button id="saveBtn" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded shadow-lg shadow-blue-900/20 font-medium tracking-wide">SAVE APP</button>
          </div>
      </header>

      <!-- Resizable Content -->
      <div class="flex-1 flex overflow-hidden">
          <!-- Left Panel -->
          <div id="editorLeft" class="w-[500px] flex flex-col bg-gray-900 border-r border-gray-800 relative shrink-0 min-w-[300px]">
              
              <!-- Editor Toolbar -->
              <div class="p-2 border-b border-gray-800 flex justify-between items-center bg-gray-800/30">
                  <input id="inName" class="bg-transparent text-sm font-bold text-white outline-none w-1/3" placeholder="Untitled App">
                  
                  <!-- MISSING FEATURE 1: Local File Import & Clear -->
                  <div class="flex items-center gap-2">
                      <label class="cursor-pointer text-gray-400 hover:text-white" title="Import File">
                          <span class="material-symbols-outlined text-sm">upload_file</span>
                          <input type="file" id="editorFileImport" class="hidden">
                      </label>
                      <button id="editorClearBtn" class="text-gray-400 hover:text-red-400" title="Clear Code">
                          <span class="material-symbols-outlined text-sm">delete_sweep</span>
                      </button>
                      <div class="w-[1px] h-4 bg-gray-700"></div>
                      <select id="libInj" class="bg-gray-800 text-[10px] text-gray-400 border border-gray-700 rounded px-1 outline-none hover:border-gray-500 cursor-pointer w-24">
                          <option value="">+ Lib</option>
                          <option value='<script src="https://cdn.tailwindcss.com"></script>'>Tailwind</option>
                          <option value='<script src="https://unpkg.com/react@18/umd/react.development.js"></script><script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>'>React</option>
                          <option value='<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>'>Vue 3</option>
                          <option value='<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>'>ThreeJS</option>
                      </select>
                  </div>
              </div>

              <!-- CodeMirror -->
              <div id="editorContainer" class="flex-1 relative text-sm"></div>

              <!-- Metadata Footer -->
              <div class="p-2 bg-gray-900 border-t border-gray-800 text-[10px] text-gray-500 flex gap-2 font-mono items-center">
                  <span>Stack:</span>
                  <input id="inStack" class="bg-transparent border-b border-gray-700 text-gray-300 w-16 outline-none focus:border-blue-500" list="dlStacks" placeholder="General">
                  <datalist id="dlStacks"></datalist>
                  
                  <span class="ml-2 border-l border-gray-700 pl-2">Icon:</span>
                  <div class="flex-1 flex items-center relative z-20">
                      <input id="inIcon" class="w-full bg-transparent border-b border-gray-700 text-blue-400 outline-none focus:border-blue-500 truncate pr-6" placeholder="URL / Emoji / Name">
                      <button id="btnOpenIconPicker" class="absolute right-0 text-gray-400 hover:text-white px-1 cursor-pointer">☺</button>
                  </div>

                  <label class="flex items-center gap-1 ml-2 cursor-pointer hover:text-white" title="Show on Desktop">
                      <input id="chkDesk" type="checkbox" class="form-checkbox w-3 h-3"> Pin
                  </label>
                  
                  <label class="flex items-center gap-1 ml-2 cursor-pointer hover:text-white">
                      <input id="chkFav" type="checkbox" class="form-checkbox w-3 h-3"> Fav
                  </label>
              </div>
          </div>

          <!-- Resizer Handle -->
          <div id="mainResizer" class="resizer w-1 hover:w-2 bg-gray-800 hover:bg-blue-500 cursor-col-resize z-40 transition-all"></div>

          <!-- Right Panel (Preview) -->
          <div id="editorRight" class="flex-1 bg-gray-950 flex flex-col min-w-[300px] relative">
               <div class="h-8 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-2">
                   <span class="text-[10px] font-mono text-gray-500 tracking-widest">LIVE PREVIEW</span>
                   <div class="flex gap-2">
                       <button id="refreshPreview" class="text-gray-400 hover:text-white text-xs px-1" title="Reload Frame">⟳</button>
                       <button id="popOutPreview" class="text-gray-400 hover:text-white text-xs px-1" title="Open in New Tab">↗</button>
                   </div>
               </div>
               <iframe id="editorPreviewFrame" class="flex-1 w-full border-none bg-white" sandbox="allow-scripts allow-modals allow-same-origin allow-forms"></iframe>
               <!-- Console Overlay -->
               <div id="editorConsole" class="absolute bottom-0 left-0 right-0 h-48 bg-gray-900/95 border-t border-gray-800 transform translate-y-full transition-transform duration-300 font-mono text-[10px] p-2 overflow-y-auto text-gray-300 z-20"></div>
               <button id="toggleConsole" class="absolute bottom-4 right-4 text-[10px] bg-blue-600/90 hover:bg-blue-600 text-white px-3 py-1 rounded shadow-lg z-30 font-bold tracking-wider">CONSOLE</button>
          </div>
      </div>
  </div>

  <!-- TASKBAR / DOCK -->
  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-50 glass px-4 py-2 rounded-2xl flex items-center gap-4 shadow-2xl transition-all hover:scale-105">
      <!-- Show Desktop / Minimize All -->
      <button onclick="WindowManager.minimizeAll()" class="p-2 rounded-xl hover:bg-white/10 transition" title="Show Desktop">
          <div class="w-8 h-8 border-2 border-gray-400 rounded-lg bg-transparent"></div>
      </button>

      <button onclick="WindowManager.toggleLauncher()" class="p-2 rounded-xl hover:bg-white/10 transition tooltip-trigger" title="App Launcher">
        <div class="w-8 h-8 bg-gray-200 rounded-lg grid grid-cols-2 gap-0.5 p-1.5 overflow-hidden">
            <div class="bg-gray-800 rounded-sm"></div><div class="bg-gray-800 rounded-sm"></div>
            <div class="bg-gray-800 rounded-sm"></div><div class="bg-blue-500 rounded-sm"></div>
        </div>
      </button>
      <div class="w-[1px] h-8 bg-gray-700 mx-1"></div>
      <div id="dock-apps" class="flex gap-3"></div>
      <div class="w-[1px] h-8 bg-gray-700 mx-1"></div>
      <button onclick="openSettings()" class="p-2 rounded-xl hover:bg-white/10 transition" title="System Settings">
          <div class="w-8 h-8 bg-gray-700 rounded-lg flex items-center justify-center text-lg">⚙️</div>
      </button>
      
      <!-- MISSING FEATURE 4: CLOCK -->
      <div class="w-[1px] h-8 bg-gray-700 mx-1"></div>
      <div id="sys-clock" class="text-xs font-mono text-gray-400 px-2">00:00</div>
  </div>

  <!-- APP LAUNCHER / FINDER -->
  <div id="appLauncher" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[500px] glass rounded-xl shadow-2xl z-40 flex flex-col overflow-hidden animate-popIn">
      <div class="h-10 border-b border-gray-700 flex items-center px-4 justify-between bg-gray-900/50">
          <div class="flex gap-2">
             <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
             <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
             <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
          </div>
          <input id="finderSearch" placeholder="Search Files..." class="bg-transparent text-center text-sm text-gray-300 outline-none w-1/3 placeholder-gray-600 font-mono">
          <div class="w-10"></div>
      </div>
      <div class="flex-1 flex">
          <!-- Sidebar (Stacks) -->
          <div class="w-48 border-r border-gray-700/50 bg-gray-900/30 flex flex-col p-2 space-y-1 overflow-y-auto" id="finderSidebar">
              <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-2 mb-2 mt-2">Stacks</div>
              <!-- Stacks injected here -->
          </div>
          <!-- Main View (Files) -->
          <div class="flex-1 bg-black/40 p-4 overflow-y-auto" id="finderMain">
              <!-- Files injected here -->
          </div>
      </div>
      <div class="h-8 border-t border-gray-700/50 bg-gray-900/50 flex items-center px-4 text-[10px] text-gray-500 font-mono justify-between">
          <span id="finderStatus">0 items</span>
          <button id="createNewAppBtn" class="text-blue-400 hover:text-white">+ New App</button>
      </div>
  </div>

  <!-- Notification -->
  <div id="notification" class="hidden fixed top-6 right-6 px-4 py-3 rounded-lg shadow-xl text-sm font-medium z-[100] text-white animate-slideIn"></div>

  <!-- LOGIC -->
  <script>
    // --- CORE CONSTANTS & STATE ---
    const DB_N='cloudstax_v2', DB_V=1, ST='apps';
    let db, all=[], editorCM=null, currentAppId=null, sIcons=new Map();
    const GOOGLE_ICONS = [
        "search","home","settings","close","menu","check","favorite","add","delete","edit","arrow_back","arrow_forward","refresh","download","upload","cloud","folder","image","description","content_copy","save","lock","person","dashboard","terminal","code","bug_report","extension","language","help","info","warning","error","check_circle","schedule","calendar_today","chat","mail","call","notifications","share","link","public","rocket","bolt","build","palette","brush","music_note","videocam","photo_camera","monitor","smartphone","mouse","keyboard","wifi","bluetooth","battery_full","light_mode","dark_mode","grid_view","list","sort","filter_list","login","logout","history","visibility","visibility_off","play_arrow","pause","stop","volume_up","mic","camera","map","location_on","shopping_cart","attach_money","credit_card","receipt","account_balance","work","group","school","science","emoji_events","star","face","thumb_up"
    ];

    // --- UTILS ---
    const $ = id => document.getElementById(id);
    const esc = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const notify = (msg, isErr) => {
        const n = $('notification'); n.textContent = msg; n.className = `fixed top-6 right-6 px-4 py-3 rounded-lg shadow-xl text-sm font-medium z-[100] text-white transition-all transform translate-y-0 opacity-100 ${isErr?'bg-red-600':'bg-blue-600'}`;
        n.classList.remove('hidden'); setTimeout(()=>n.classList.add('hidden'), 3000);
    };
    
    // --- ICON HELPER ---
    function renderIconHtml(val, sizeClass="text-2xl") {
        if(!val) return `<div class="${sizeClass}">⚡</div>`;
        if(val.includes('/') || val.includes('.')) return `<img src="${esc(val)}" class="w-full h-full object-cover rounded" onerror="this.style.display='none'">`;
        if(/^[a-z0-9_]+$/i.test(val) && val.length < 25) return `<span class="material-symbols-outlined ${sizeClass}">${val}</span>`;
        return `<span class="${sizeClass}">${esc(val)}</span>`;
    }

    // --- DB LAYER ---
    async function initDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB_N,DB_V);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(ST)){d.createObjectStore(ST,{keyPath:'id'});}};q.onsuccess=e=>{db=e.target.result;r(db);};q.onerror=j;});}
    async function dbOp(op,val){return new Promise((r,j)=>{const tx=db.transaction([ST],'readwrite'),s=tx.objectStore(ST),q=op==='get'?s.getAll():op==='put'?s.put(val):s.delete(val);q.onsuccess=e=>r(e.target.result);q.onerror=j;});}

    // --- WINDOW MANAGER ---
    const WindowManager = {
        zIndex: 100,
        windows: new Map(), // id -> element
        
        openApp: function(app) {
            if(this.windows.has(app.id)) { this.focusWindow(app.id); return; }

            const win = document.createElement('div');
            win.className = 'os-window pointer-events-auto flex flex-col';
            win.style.width = '400px'; win.style.height = '600px';
            win.style.left = (100 + (this.windows.size * 30)) + 'px';
            win.style.top = (50 + (this.windows.size * 30)) + 'px';
            win.style.zIndex = ++this.zIndex;
            win.dataset.id = app.id;

            // Header
            const header = document.createElement('div');
            header.className = 'window-header';
            header.innerHTML = `
                <div class="flex gap-2">
                    <button class="w-3 h-3 rounded-full bg-red-500 hover:bg-red-600 text-[8px] flex items-center justify-center text-black opacity-60 hover:opacity-100" onclick="WindowManager.closeWindow('${app.id}')">✕</button>
                    <button class="w-3 h-3 rounded-full bg-yellow-500" onclick="WindowManager.minimize('${app.id}')"></button>
                    <button class="w-3 h-3 rounded-full bg-green-500" onclick="WindowManager.maximize('${app.id}')"></button>
                </div>
                <div class="flex items-center gap-2">
                    ${renderIconHtml(app.iconUrl, "text-sm")}
                    <div class="text-xs font-medium text-gray-300 truncate max-w-[200px]">${esc(app.name)}</div>
                </div>
                <div class="w-10"></div>
            `;
            
            // Content
            const content = document.createElement('div');
            content.className = 'window-content';
            let src = app.url;
            if(app.type === 'html') {
                 const blob = new Blob([app.html], {type: 'text/html'});
                 src = URL.createObjectURL(blob);
            }
            content.innerHTML = `<iframe src="${src}" class="window-iframe" sandbox="allow-scripts allow-modals allow-same-origin allow-forms"></iframe>`;
            
            // Resize Handle
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'window-resize-handle';
            
            // Overlay for dragging
            const overlay = document.createElement('div');
            overlay.className = 'absolute inset-0 bg-transparent hidden';
            content.appendChild(overlay);

            win.appendChild(header);
            win.appendChild(content);
            win.appendChild(resizeHandle);
            $('windows-area').appendChild(win);
            
            this.windows.set(app.id, win);
            this.makeDraggable(win, header, overlay);
            this.makeResizable(win, resizeHandle, overlay);
            this.addToDock(app);
        },

        closeWindow: function(id) {
            const win = this.windows.get(id);
            if(win) {
                win.style.opacity = '0';
                win.style.transform = 'scale(0.9)';
                setTimeout(() => win.remove(), 200);
                this.windows.delete(id);
                this.removeFromDock(id);
            }
        },

        focusWindow: function(id) {
            const win = this.windows.get(id);
            if(win) {
                win.style.zIndex = ++this.zIndex;
                win.classList.remove('minimized');
                // Ensure overlay is hidden so iframe is interactive
                win.querySelector('.window-content > div.absolute').classList.add('hidden');
            }
        },
        
        minimize: function(id) {
            const win = this.windows.get(id);
            if(win) win.classList.add('minimized');
        },
        
        minimizeAll: function() {
            this.windows.forEach(win => win.classList.add('minimized'));
            $('settings-app').classList.add('hidden');
            $('appLauncher').classList.add('hidden');
            closeApp('editor');
        },

        maximize: function(id) {
            const win = this.windows.get(id);
            if(win.classList.contains('maximized')) {
                // Restore
                win.classList.remove('maximized');
                win.style.width = win.dataset.prevW || '400px';
                win.style.height = win.dataset.prevH || '600px';
                win.style.left = win.dataset.prevL || '100px';
                win.style.top = win.dataset.prevT || '100px';
                win.style.borderRadius = '12px';
            } else {
                // Maximize
                win.dataset.prevW = win.style.width;
                win.dataset.prevH = win.style.height;
                win.dataset.prevL = win.style.left;
                win.dataset.prevT = win.style.top;
                
                win.classList.add('maximized');
                win.style.width = '100%'; 
                win.style.height = '100%';
                win.style.top = '0'; 
                win.style.left = '0';
            }
            this.focusWindow(id);
        },

        makeDraggable: function(win, handle, overlay) {
            let isDragging = false, startX, startY, initLeft, initTop;
            
            const start = (cx, cy) => {
                if(win.classList.contains('maximized')) return;
                isDragging = true;
                this.focusWindow(win.dataset.id);
                overlay.classList.remove('hidden'); 
                startX = cx; startY = cy;
                initLeft = win.offsetLeft; initTop = win.offsetTop;
            };
            const move = (cx, cy) => {
                if(!isDragging) return;
                win.style.left = `${initLeft + cx - startX}px`;
                win.style.top = `${initTop + cy - startY}px`;
            };
            const end = () => { isDragging = false; overlay.classList.add('hidden'); };

            // Mouse
            handle.addEventListener('mousedown', e => { start(e.clientX, e.clientY); document.addEventListener('mousemove', onMM); document.addEventListener('mouseup', onMU); });
            const onMM = e => move(e.clientX, e.clientY);
            const onMU = () => { end(); document.removeEventListener('mousemove', onMM); document.removeEventListener('mouseup', onMU); };
            
            // Touch (MISSING FEATURE 3)
            handle.addEventListener('touchstart', e => { start(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            handle.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            handle.addEventListener('touchend', end);
        },
        
        makeResizable: function(win, handle, overlay) {
            let isResizing = false, startX, startY, initW, initH;
            
            const start = (cx, cy) => {
                if(win.classList.contains('maximized')) return;
                isResizing = true;
                this.focusWindow(win.dataset.id);
                overlay.classList.remove('hidden');
                startX = cx; startY = cy;
                initW = parseInt(win.style.width); initH = parseInt(win.style.height);
            };
            const move = (cx, cy) => {
                if(!isResizing) return;
                win.style.width = `${Math.max(300, initW + cx - startX)}px`;
                win.style.height = `${Math.max(200, initH + cy - startY)}px`;
            };
            const end = () => { isResizing = false; overlay.classList.add('hidden'); };

            // Mouse
            handle.addEventListener('mousedown', e => { e.stopPropagation(); start(e.clientX, e.clientY); document.addEventListener('mousemove', onMM); document.addEventListener('mouseup', onMU); });
            const onMM = e => move(e.clientX, e.clientY);
            const onMU = () => { end(); document.removeEventListener('mousemove', onMM); document.removeEventListener('mouseup', onMU); };
            
            // Touch
            handle.addEventListener('touchstart', e => { e.stopPropagation(); start(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            handle.addEventListener('touchmove', e => { e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
            handle.addEventListener('touchend', end);
        },

        addToDock: function(app) {
            if($(`dock-icon-${app.id}`)) return;
            const btn = document.createElement('button');
            btn.id = `dock-icon-${app.id}`;
            btn.className = 'w-10 h-10 rounded-xl bg-gray-800 flex items-center justify-center hover:bg-gray-700 transition relative group border border-gray-700 overflow-hidden';
            btn.innerHTML = `<div class="text-white flex items-center justify-center w-full h-full">${renderIconHtml(app.iconUrl, "text-xl")}</div><div class="absolute -bottom-1 w-1 h-1 bg-white rounded-full"></div>`;
            btn.onclick = () => {
                const win = this.windows.get(app.id);
                if(win && win.classList.contains('minimized')) this.focusWindow(app.id);
                else if(win && parseInt(win.style.zIndex) === this.zIndex) this.minimize(app.id);
                else this.focusWindow(app.id);
            };
            $('dock-apps').appendChild(btn);
        },
        
        removeFromDock: function(id) {
            const el = $(`dock-icon-${id}`);
            if(el) el.remove();
        },

        toggleLauncher: function() {
            const l = $('appLauncher');
            l.classList.toggle('hidden');
            if(!l.classList.contains('hidden')) renderFinder();
        }
    };

    // --- EDITOR APP LOGIC ---
    function openEditor(appId = null) {
        $('editor-app').classList.remove('hidden'); $('editor-app').classList.remove('minimized');
        WindowManager.zIndex++; $('editor-app').style.zIndex = WindowManager.zIndex;
        currentAppId = appId;
        if(appId) {
            const app = all.find(x => x.id === appId);
            if(app) {
                $('inName').value = app.name; $('inStack').value = app.stack || ''; $('inIcon').value = app.iconUrl || ''; 
                $('chkFav').checked = app.isFavorite || false; $('chkDesk').checked = app.onDesktop || false;
                editorCM.setValue(app.type==='html'?app.html:app.url); updatePreview(app);
            }
        } else {
            currentAppId = crypto.randomUUID();
            $('inName').value = "Untitled Project"; $('inStack').value = "General"; $('inIcon').value = "";
            $('chkFav').checked = false; $('chkDesk').checked = false;
            editorCM.setValue("<!-- New Project -->\n<h1>Hello World</h1>"); updatePreview({html: "<h1>Hello World</h1>", type:'html'});
        }
    }

    function closeApp(type) { if(type === 'editor') $('editor-app').classList.add('hidden'); }
    
    function deleteApp(id) {
        if(confirm("Delete this app?")) {
            dbOp('delete', id).then(async () => { all = await dbOp('get'); renderDesktopIcons(); renderFinder(); WindowManager.closeWindow(id); });
        }
    }

    function updatePreview(app) {
        const frame = $('editorPreviewFrame');
        if(app.type === 'html') {
             const script = `<script>
                window.onerror = function(msg, url, line) { window.parent.postMessage({type:'log', level:'error', message: msg}, '*'); };
                console.log = function(...args) { window.parent.postMessage({type:'log', level:'info', message: args.join(' ')}, '*'); };
             <\/script>`;
             const blob = new Blob([script + (app.html || editorCM.getValue())], {type: 'text/html'});
             frame.src = URL.createObjectURL(blob);
        } else { frame.src = app.url || editorCM.getValue(); }
    }
    
    // --- FINDER (DASHBOARD) ---
    function renderFinder() {
        const stacks = [...new Set(all.map(a => a.stack || 'General'))].sort();
        const sidebar = $('finderSidebar');
        sidebar.innerHTML = '<div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-2 mb-2 mt-2">Stacks</div>';
        
        const allBtn = document.createElement('div');
        allBtn.className = 'mono-list-item text-xs text-gray-300 py-1 cursor-pointer hover:text-white mb-2';
        allBtn.textContent = 'All Apps';
        allBtn.onclick = () => renderFinderFiles(all);
        sidebar.appendChild(allBtn);

        stacks.forEach(s => {
            const d = document.createElement('div');
            d.className = 'mono-list-item text-xs text-gray-400 py-1 cursor-pointer';
            d.textContent = s;
            d.onclick = () => renderFinderFiles(all.filter(a => (a.stack||'General') === s));
            sidebar.appendChild(d);
        });

    function renderFinderFiles(list) {
        const main = $('finderMain');
        main.innerHTML = '';
        $('finderStatus').textContent = `${list.length} items`;
        if(list.length === 0) { main.innerHTML = '<div class="text-gray-600 text-xs font-mono text-center mt-10">No items found</div>'; return; }
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-4 gap-4';
        list.forEach(app => {
            const item = document.createElement('div');
            item.className = 'flex flex-col items-center group cursor-pointer p-2 rounded hover:bg-white/5 transition';
            item.onclick = () => { WindowManager.openApp(app); WindowManager.toggleLauncher(); };
            item.oncontextmenu = (e) => showContext(e, app);
            
            let iconHtml;
            if (app.iconUrl) iconHtml = `<div class="w-12 h-12 bg-gray-800 rounded-lg flex items-center justify-center text-white shadow mb-2 group-hover:scale-105 transition">${renderIconHtml(app.iconUrl, "text-2xl")}</div>`;
            else if (sIcons.get(app.stack)) iconHtml = `<div class="w-12 h-12 bg-gray-800 rounded-lg flex items-center justify-center text-2xl shadow mb-2 group-hover:scale-105 transition">${sIcons.get(app.stack)}</div>`;
            else {
                const bg = app.type === 'html' ? 'linear-gradient(135deg, #3b82f6, #2563eb)' : 'linear-gradient(135deg, #4b5563, #374151)';
                const txt = app.type === 'html' ? '</>' : '🔗';
                iconHtml = `<div class="w-12 h-12 rounded-lg flex items-center justify-center text-xl text-white shadow mb-2 group-hover:scale-105 transition" style="background:${bg}">${txt}</div>`;
            }
            item.innerHTML = `${iconHtml}<div class="text-xs text-gray-300 font-mono text-center truncate w-full group-hover:text-white">${app.name}</div>`;
            grid.appendChild(item);
        });
        main.appendChild(grid);
    }

    // --- MAIN INIT ---
    async function init() {
        await initDB();
        try { 
            all = await dbOp('get'); 
            try{ sIcons=new Map(Object.entries(JSON.parse(localStorage.getItem('cs_icons'))||{})); }catch{ sIcons=new Map(); }
        } catch { all = []; }

        editorCM = CodeMirror($('editorContainer'), {
            mode: "htmlmixed", theme: "dracula", lineNumbers: true, viewportMargin: Infinity,
            value: "<!-- Select an app to edit -->"
        });
        editorCM.on('change', debounce(() => {
            if(currentAppId) updatePreview({ type: 'html', html: editorCM.getValue() });
        }, 1000));

        setupResizer();
        initBackground();
        renderDesktopIcons();
        initIconPicker();
        initContextMenu();
        
        // MISSING FEATURE 4: CLOCK
        setInterval(() => {
            const d = new Date();
            $('sys-clock').textContent = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        $('saveBtn').onclick = saveCurrentApp;
        $('createNewAppBtn').onclick = () => { WindowManager.toggleLauncher(); openEditor(); };
        $('refreshPreview').onclick = () => updatePreview({type: 'html', html: editorCM.getValue()});
        $('popOutPreview').onclick = () => { const w = window.open('','_blank'); w.document.write(editorCM.getValue()); w.document.close(); };
        $('toggleConsole').onclick = () => { $('editorConsole').classList.toggle('translate-y-full'); };
        $('finderSearch').oninput = (e) => { const term = e.target.value.toLowerCase(); renderFinderFiles(all.filter(a => a.name.toLowerCase().includes(term))); };
        $('libInj').onchange = (e) => { if(e.target.value) { editorCM.replaceRange(e.target.value + '\n', {line:0, ch:0}); e.target.value=''; } };
        
        // MISSING FEATURE 1 & 2: Local File Import & Clear
        $('editorFileImport').onchange = e => {
            const f = e.target.files[0];
            if(f){ const r=new FileReader(); r.onload=v=>{ editorCM.setValue(v.target.result); $('inName').value = f.name.replace(/\.[^/.]+$/, ""); }; r.readAsText(f); }
        };
        $('editorClearBtn').onclick = () => { if(confirm("Clear Code?")) editorCM.setValue(''); };

        $('btnExport').onclick = () => {
             const a = document.createElement('a');
             a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(all));
             a.download = 'Cloudstax_Backup.json';
             a.click();
        };
        $('btnImport').onclick = () => {
            const f = $('fileImport').files[0];
            if(f){
                const r = new FileReader();
                r.onload = async e => {
                    try {
                        const d = JSON.parse(e.target.result);
                        for(const i of d) { if(!all.find(x=>x.id===i.id)) await dbOp('put', i); }
                        all = await dbOp('get'); renderFinder(); notify("Import Successful");
                    } catch { notify("Invalid JSON", true); }
                };
                r.readAsText(f);
            }
        };
        $('btnTools').onclick = async () => {
             try {
                const r = await fetch('https://junkyardai.github.io/Cloudstax-Default-Tools/');
                const t = await r.text();
                const p = new DOMParser().parseFromString(t,'text/html');
                let count = 0;
                p.querySelectorAll('a').forEach(async a=>{
                    if(a.href.startsWith('http')){
                        await dbOp('put',{id:crypto.randomUUID(),name:a.innerText,url:a.href,stack:"Tools",iconUrl:'',createdAt:new Date().toISOString(),type:'link'});
                        count++;
                    }
                });
                setTimeout(async ()=>{ all = await dbOp('get'); notify(`Added ${count} tools`); renderDesktopIcons(); }, 1000);
            } catch { notify("Fetch Error", true); }
        };
        $('btnSaveIcons').onclick = () => {
            document.querySelectorAll('.stack-icon-input').forEach(s => sIcons.set(s.dataset.stack, s.value));
            localStorage.setItem('cs_icons', JSON.stringify(Object.fromEntries(sIcons)));
            notify("Icons Saved"); renderFinder();
        };
        
        window.addEventListener('message', e => {
            if(e.data?.type === 'log') {
                const ln = document.createElement('div');
                ln.className = e.data.level==='error'?'text-red-400 border-l-2 border-red-500 pl-1':'text-gray-400';
                ln.textContent = `> ${e.data.message}`;
                $('editorConsole').prepend(ln);
            }
        });
        
        // Desktop Right Click
        $('desktop').oncontextmenu = (e) => { e.preventDefault(); $('contextMenu').classList.add('hidden'); };
    }
    
    async function saveCurrentApp() {
        if(!currentAppId) return;
        const app = {
            id: currentAppId,
            name: $('inName').value || 'Untitled',
            stack: $('inStack').value || 'General',
            iconUrl: $('inIcon').value,
            isFavorite: $('chkFav').checked,
            onDesktop: $('chkDesk').checked,
            type: 'html',
            html: editorCM.getValue(),
            createdAt: new Date().toISOString()
        };
        await dbOp('put', app);
        all = await dbOp('get'); 
        notify('Saved Successfully');
        renderDesktopIcons();
        renderFinder();
        
        // Refresh Dock if it exists
        WindowManager.removeFromDock(app.id);
        const win = WindowManager.windows.get(app.id);
        if(win) WindowManager.addToDock(app);
    }

        d.innerHTML = `<div class="desktop-icon-img text-2xl bg-gray-800">${renderIconHtml(iconVal)}</div>
        <span class="text-[10px] font-medium mt-1 text-center leading-tight bg-black/50 px-1 rounded truncate w-full">${esc(label)}</span>`;
        return d;
    }

    function setupResizer() {
        const resizer = $('mainResizer');
        const left = $('editorLeft');
        let x = 0, w = 0, dragging = false;
        const onMove = e => { if(!dragging) return; left.style.width = `${w + e.clientX - x}px`; editorCM.refresh(); };
        const onUp = () => { dragging = false; resizer.classList.remove('resizing'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); $('editorPreviewFrame').style.pointerEvents = 'auto'; };
        resizer.addEventListener('mousedown', e => { x = e.clientX; w = left.getBoundingClientRect().width; dragging = true; resizer.classList.add('resizing'); $('editorPreviewFrame').style.pointerEvents = 'none'; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); });
    }

    function initBackground() {
        const cvs = $('bg-canvas'); if(!window.THREE) return;
        const scene = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({canvas:cvs, alpha:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry();
        const cnt = 200; const pos = new Float32Array(cnt * 3);
        for(let i=0; i<cnt*3; i++) pos[i] = (Math.random()-0.5) * 10;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({size: 0.05, color: 0x3b82f6});
        const mesh = new THREE.Points(geo, mat);
        scene.add(mesh);
        cam.position.z = 5;
        const animate = () => { requestAnimationFrame(animate); mesh.rotation.x += 0.001; mesh.rotation.y += 0.001; renderer.render(scene, cam); };
        animate();
        window.addEventListener('resize', () => { cam.aspect = window.innerWidth / window.innerHeight; cam.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    }
    
    function debounce(f,t){let h;return(...a)=>{clearTimeout(h);h=setTimeout(()=>f(...a),t)}}

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
