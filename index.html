<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudstax - Code Manager</title>
  <!-- Dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display.swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; overflow: hidden; }
    /* UI Utils */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    ::-webkit-scrollbar-track { background: #111827; }
    .glass { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.4); }
    .form-checkbox { appearance: none; background: #374151; border: 1px solid #4b5563; display: inline-block; vertical-align: middle; height: 1.1rem; width: 1.1rem; border-radius: 0.25rem; flex-shrink: 0; }
    .form-checkbox:checked { background-color: #3b82f6; border-color: #3b82f6; background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 0 1 0 1.414l-5 5a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L6.5 9.086l4.293-4.293a1 1 0 0 1 1.414 0z'/%3e%3c/svg%3e"); background-size: 100% 100%; background-position: center; background-repeat: no-repeat; }
    .active-tab { color: #60a5fa; border-bottom: 2px solid #60a5fa; background: rgba(59, 130, 246, 0.1); }
    .dragging { opacity: 0.5; background: #374151 !important; border: 1px dashed #60a5fa !important; }
    .drag-over { border-top: 2px solid #3b82f6 !important; }
    #logo-canvas { display: block; }
    /* Standby Overlay */
    #standbyOverlay { background: radial-gradient(circle at center, #1f2937 0%, #030712 100%); }
    /* Stack Creator */
    #stackCreatorList li { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #374151; font-size: 0.8rem; color: #d1d5db; }
    #stackCreatorList li:last-child { border-bottom: none; }
    .creator-actions button { margin-left: 4px; padding: 2px 6px; background: #4b5563; border-radius: 4px; font-size: 0.7rem; }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 flex overflow-hidden">

  <!-- LAYOUT -->
  <div id="appLayout" class="flex w-full h-full relative z-10">
    
    <!-- LEFT PANEL: Code Manager -->
    <div id="leftPanel" class="w-full lg:w-[500px] xl:w-[550px] flex flex-col h-full border-r border-gray-800 bg-gray-900 z-20 shadow-2xl relative">
      <!-- Header -->
      <header class="flex items-center gap-3 p-4 border-b border-gray-800 select-none bg-gray-900">
        <canvas id="logo-canvas" class="w-10 h-10 rounded-lg"></canvas>
        <div class="flex-1"><h1 class="text-base font-bold text-white">Cloudstax</h1><p class="text-xs text-gray-400">Code Manager</p></div>
        <button id="standbyBtn" class="p-2 text-gray-400 hover:text-blue-400 transition" title="Standby Mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
        </button>
      </header>
      
      <!-- App Creator Input -->
      <div class="p-4 border-b border-gray-800 bg-gray-800/30">
        <div class="space-y-3">
            <div class="flex justify-between items-center text-xs text-gray-500 font-mono">
                <span class="flex items-center gap-2">SOURCE: <input type="file" id="inFile" class="text-gray-400 file:bg-gray-800 file:text-blue-400 file:border-0 file:text-xs file:mr-2 file:cursor-pointer file:px-2 file:rounded"></span>
                <button id="clearCode" class="text-xs text-red-400 hover:text-red-300">CLEAR</button>
            </div>
            
            <textarea id="inCode" placeholder="<!-- Paste your HTML/CSS/JS App code here -->" class="w-full h-32 bg-gray-900 rounded p-3 font-mono text-xs border border-gray-700 outline-none resize-none focus:border-blue-500 text-gray-300"></textarea>
            
            <div class="flex gap-2">
                <input id="inName" placeholder="App Name" class="w-1/3 text-sm bg-gray-900 rounded px-3 py-2 border border-gray-700 focus:border-blue-500 outline-none text-white">
                <input id="inStack" placeholder="Stack" list="dlStacks" class="flex-1 text-sm bg-gray-900 rounded px-3 py-2 border border-gray-700 outline-none text-white">
                <datalist id="dlStacks"></datalist>
                <button id="btnAdd" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded text-sm font-medium text-white shadow-lg shadow-blue-900/20 whitespace-nowrap">+ Create App</button>
            </div>
            
            <div class="flex justify-end gap-4 text-xs text-gray-400">
                <label class="flex items-center cursor-pointer hover:text-white"><input id="chkFav" type="checkbox" class="form-checkbox mr-2"> Add to Favorites</label>
            </div>
        </div>
      </div>
      
      <!-- List Controls -->
      <div class="flex gap-2 p-3 bg-gray-900 border-b border-gray-800">
        <input id="inSearch" placeholder="Search apps..." class="flex-1 text-sm bg-gray-800 rounded px-3 py-1.5 border border-gray-700 outline-none focus:border-blue-500 text-white">
        <select id="selFilter" class="text-sm bg-gray-800 text-gray-300 rounded px-2 py-1.5 border border-gray-700 outline-none w-32"><option value="">All Stacks</option></select>
      </div>

      <!-- List -->
      <div id="bookmarksView" class="flex-1 overflow-y-auto p-2 bg-gray-900 space-y-2">
        <div id="listContainer" class="space-y-2 pb-10"></div>
      </div>

      <!-- Pagination -->
      <div id="pager" class="hidden p-2 justify-center bg-gray-900 border-t border-gray-800 gap-2"></div>
      
      <!-- Footer -->
      <div class="p-3 bg-gray-900 border-t border-gray-800 flex justify-between items-center text-xs relative">
         <button id="btnSettings" class="flex items-center gap-2 text-gray-400 hover:text-white px-3 py-1.5 rounded hover:bg-gray-800">⚙️ Settings <span id="badgeErr" class="hidden bg-red-500 text-white px-1 rounded-full text-[10px]">0</span></button>
         <button id="btnReorder" class="p-1.5 text-gray-400 hover:text-white rounded hover:bg-gray-800" title="Reorder (All Stacks)">⇅</button>
      </div>
      
      <!-- Multi Select Footer -->
      <div id="multiSelectFooter" class="absolute bottom-12 left-4 right-4 bg-blue-600 rounded-lg p-3 shadow-xl hidden flex justify-between items-center z-30">
         <span id="selectedCount" class="text-white text-sm font-medium">0 selected</span>
         <button id="launchSelectedBtn" class="bg-white text-blue-600 px-3 py-1 rounded text-xs font-bold uppercase tracking-wider hover:bg-gray-100">Launch</button>
      </div>
    </div>

    <!-- RIGHT PANEL: Dashboard (Preview Only) -->
    <div id="rightPanel" class="hidden lg:flex flex-1 flex-col bg-gray-950 relative overflow-hidden">
        
        <!-- Preview Console Header -->
        <div class="flex justify-between items-center p-2 border-b border-gray-800 bg-gray-900/95 backdrop-blur z-20">
            <span class="text-xs text-gray-500 pl-2 font-mono tracking-widest">APP PREVIEW CONSOLE</span>
            <div class="flex gap-2">
                <button id="reloadPreviewBtn" class="text-xs bg-gray-800 hover:text-white text-gray-400 px-2 py-1 rounded border border-gray-700">⟳ Reload</button>
                <button id="popOutBtn" class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-2 py-1 rounded">↗ Pop Out</button>
                <button id="clearPreviewBtn" class="text-xs bg-red-900/30 hover:bg-red-900/50 text-red-400 px-2 py-1 rounded border border-red-900/50">✕ Clear</button>
            </div>
        </div>

        <!-- Preview Area -->
        <div id="tab-preview" class="flex-1 relative flex-col bg-gray-900 h-full flex">
            <div id="previewPlaceholder" class="flex-1 flex flex-col items-center justify-center text-gray-600">
                <div class="w-16 h-16 border-2 border-gray-700 rounded-lg flex items-center justify-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                </div>
                <p class="text-sm">Select an app to execute</p>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full border-none hidden bg-white"></iframe>
        </div>
    </div>
  </div>

  <!-- Mobile Overlay for Preview -->
  <div id="previewContainer" class="hidden fixed inset-0 bg-gray-900 z-50 flex-col">
      <div class="flex justify-between items-center p-3 bg-gray-800 border-b border-gray-700">
          <span class="text-sm font-medium text-white pl-2">Mobile Preview</span>
          <button id="closePreviewBtn" class="text-gray-400 hover:text-white px-3 py-1 bg-gray-700 rounded text-xs">Close</button>
      </div>
      <iframe id="mobilePreviewFrame" class="flex-1 w-full border-none bg-white"></iframe>
  </div>

  <!-- STANDBY MODE OVERLAY -->
  <div id="standbyOverlay" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-gray-950 text-white">
      <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-blue-900/30 via-gray-950 to-gray-950 pointer-events-none"></div>
      <div class="absolute top-8 right-8 z-50">
          <button id="exitStandbyBtn" class="flex items-center gap-2 px-4 py-2 bg-gray-800/50 hover:bg-gray-700 rounded-full border border-gray-700 transition text-sm text-gray-300 backdrop-blur-sm">Exit</button>
      </div>
      <div class="relative z-10 flex flex-col items-center">
          <canvas id="standby-logo-canvas" class="w-64 h-64 mb-6"></canvas>
          <h1 class="text-4xl font-bold tracking-tight">Cloudstax</h1>
          <p class="text-blue-500 text-sm font-medium tracking-[0.2em] mt-2 uppercase">System Standby</p>
          <div class="mt-16 w-80">
              <div class="text-center mb-4 text-xs text-gray-600 font-mono uppercase">Recent Launches</div>
              <div id="recentLinksList" class="space-y-2"></div>
          </div>
      </div>
  </div>

  <!-- Generic Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-4">
    <div class="bg-gray-900 rounded-xl w-full max-w-lg border border-gray-700 shadow-2xl">
      <div class="p-4 border-b border-gray-800 flex justify-between"><h2 id="modalTitle" class="font-bold"></h2><button id="modalClose">✕</button></div>
      <div id="modalBody" class="p-6 overflow-y-auto max-h-[60vh] text-sm text-gray-300"></div>
      <div id="modalFooter" class="p-4 border-t border-gray-800 flex justify-end gap-2"></div>
    </div>
  </div>
  
  <!-- Notification -->
  <div id="notification" class="hidden fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-xl text-sm font-medium z-[300] text-white"></div>

  <!-- LOGIC -->
  <script>
    const DB_N='cloudstax_db', DB_V=1, ST='bookmarks';
    const ICONS=["","🚀","🛠️","✨","💡","📚","💼","🎵","🎮","🎨","📰","🛒","☁️","💰","🏠","❤️","⭐","🔗","📁","⚙️","📈"];
    let db, all=[], sel=new Set(), errs=[], reorder=false, page=1, dSrc=null, recent=[], sIcons=new Map(), isCompact=false, curPreview=null;
    const $=i=>document.getElementById(i);

    // HELPERS
    window.logError=(e,c)=>{ console.error(c,e); errs.push({t:new Date().toLocaleString(),m:e.message,c}); if($('badgeErr')){$('badgeErr').textContent=errs.length;$('badgeErr').classList.remove('hidden');} };
    window.notify=(m,err)=>{ const t=$('notification'); t.textContent=m; t.className=`fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-xl text-sm font-medium z-[300] text-white ${err?'bg-red-600':'bg-blue-600'}`; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000); };
    window.debounce=(f,d)=>{ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>f.apply(this,a),d); }; };
    window.showModal=(t,b,f)=>{ $('modalTitle').textContent=t; $('modalBody').innerHTML=b; $('modalFooter').innerHTML=f||''; $('modal').classList.remove('hidden'); };
    window.hideModal=()=>{ $('modal').classList.add('hidden'); $('modalBody').innerHTML=''; };
    
    const sanitize=s=>{const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;};
    const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const normUrl=s=>{s=(s||'').trim(); if(!s)throw new Error('Empty'); if(/^(about|chrome|file|data):/.test(s))return s; return /^https?:\/\//i.test(s)?s:'https://'+s;};
    const getFav=u=>u.startsWith('data:')||u==='app:local'?'':`https://www.google.com/s2/favicons?domain=${new URL(u).hostname}&sz=64`;

    // DB
    async function initDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB_N,DB_V);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(ST)){d.createObjectStore(ST,{keyPath:'id'}).createIndex('idx','idx',{unique:false});}};q.onsuccess=e=>{db=e.target.result;r(db);};q.onerror=j;});}
    async function dbOp(op,val){return new Promise((r,j)=>{const tx=db.transaction([ST],'readwrite'),s=tx.objectStore(ST),q=op==='get'?s.getAll():op==='add'?s.add(val):op==='put'?s.put(val):s.delete(val);q.onsuccess=e=>r(e.target.result);q.onerror=j;});}
    async function loadData(){try{all=await dbOp('get');all.sort((a,b)=>(a.idx||0)-(b.idx||0));refresh();}catch(e){logError(e,'Load');}}

    // UI
    function loadSettings(){
        try{sIcons=new Map(Object.entries(JSON.parse(localStorage.getItem('cs_icons'))||{}));}catch{sIcons=new Map();}
        isCompact=localStorage.getItem('cs_view')==='true';
        recent=JSON.parse(localStorage.getItem('cs_recent')||'[]');
    }

    // INIT
    async function init(){
        try {
            if($('modalClose')) $('modalClose').onclick=hideModal;
            await initDB(); loadSettings(); initConsole(); await loadData(); initThreeJS('logo-canvas',0.6);
            
            // Add Handler
            $('btnAdd').onclick=async()=>{
                const n=$('inName').value, st=$('inStack').value||"General", f=$('chkFav').checked;
                const c=$('inCode').value;
                if(!c) return notify("Code required", true);
                
                let b = { id: crypto.randomUUID(), name: n||"App", stack: st, isFavorite: f, idx: all.length, createdAt: new Date().toISOString(), type: 'html', html: c, url: "app:local" };
                
                await dbOp('add',b); 
                notify("App Created!"); 
                $('inName').value=''; $('inCode').value='';
                loadData();
                preview(b.id);
            };

            $('inFile').onchange=e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=v=>{ $('inCode').value=v.target.result; if(!$('#inName').value) $('#inName').value=f.name.replace(/\.[^/.]+$/, ""); }; r.readAsText(f);}};
            $('clearCode').onclick=()=>$('inCode').value='';
            
            $('inSearch').oninput=debounce(()=>refresh(),300); $('selFilter').onchange=refresh;
            $('btnSettings').onclick=showSettings;
            $('btnReorder').onclick=()=>{if($('selFilter').value!=="")return notify("Select 'All Stacks'",true); reorder=!reorder; refresh(); notify(reorder?"Drag ON":"Drag OFF");};
            
            $('standbyBtn').onclick=()=>{
                $('standbyOverlay').classList.remove('hidden'); initThreeJS('standby-logo-canvas',1);
                $('recentLinksList').innerHTML=recent.map(b=>`<button class="w-full text-left p-2 bg-gray-900 rounded mb-1 text-sm hover:bg-gray-800 transition border border-gray-800" onclick="$('standbyOverlay').classList.add('hidden');launch('${b.id}')"><span class="text-blue-500">●</span> ${esc(b.name)}</button>`).join('')||'<div class="text-gray-500 text-xs text-center">No recent apps</div>';
            };
            $('exitStandbyBtn').onclick=()=>$('standbyOverlay').classList.add('hidden');
            if($('closePreviewBtn')) $('closePreviewBtn').onclick=()=>$('previewContainer').classList.add('hidden');

            $('modalBody').addEventListener('change', e=>{ if(e.target.id==='sCmp'){isCompact=e.target.checked; localStorage.setItem('cs_view',isCompact); refresh();} });
            $('modalBody').addEventListener('click', handleModalClicks);

        }catch(e){logError(e,"Init");}
    }

    function initConsole(){
        $('reloadPreviewBtn').onclick=()=>{ if(curPreview) preview(curPreview); };
        $('popOutBtn').onclick=()=>{ if(curPreview){ const b=all.find(x=>x.id===curPreview); if(b){ const w=window.open('','_blank'); w.document.write(b.type==='html'?b.html:b.url); w.document.close(); } } };
        $('clearPreviewBtn').onclick=()=>{ $('previewFrame').src='about:blank'; $('previewPlaceholder').classList.remove('hidden'); $('previewFrame').classList.add('hidden'); curPreview=null; };
    }
    
    window.preview=id=>{
        const b=all.find(x=>x.id===id); if(!b)return; curPreview=id;
        const u=b.type==='html'?b.html:b.url;
        if(window.innerWidth>=1024){
            $('previewPlaceholder').classList.add('hidden'); $('previewFrame').classList.remove('hidden');
            const d=$('previewFrame').contentWindow.document; if(b.type==='html'){d.open();d.write(u);d.close();} else $('previewFrame').src=u;
        } else {
            $('previewContainer').classList.remove('hidden'); $('previewContainer').classList.add('flex');
            const d=$('mobilePreviewFrame').contentWindow.document; if(b.type==='html'){d.open();d.write(u);d.close();} else $('mobilePreviewFrame').src=u;
        }
    }

    function refresh(){
        const stacks=[...new Set(all.map(b=>b.stack||"General"))].sort(); $('dlStacks').innerHTML=stacks.map(s=>`<option value="${esc(s)}"></option>`).join('');
        const cur=$('selFilter').value; $('selFilter').innerHTML=`<option value="">All Stacks</option><option value="Fav">Favorites</option>`+stacks.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join(''); $('selFilter').value=cur;
        
        $('bookmarksView').className=`flex-1 overflow-y-auto p-2 bg-gray-900 space-y-2 custom-scrollbar ${isCompact?'compact':''}`;
        const t=$('inSearch').value.toLowerCase(), f=$('selFilter').value;
        let l=all.filter(b=>{const s=b.stack||"General"; return (b.name.toLowerCase().includes(t)||(b.url&&b.url.toLowerCase().includes(t))||s.toLowerCase().includes(t))&&(f===""||(f==="Fav"?b.isFavorite:s===f));});
        
        if(!reorder){ const pg=Math.ceil(l.length/8); if(pg>1){$('pager').innerHTML=`<button onclick="pg(${page-1})" ${page===1?'disabled':''} class="px-2 bg-gray-800 rounded text-xs">Prev</button><span class="text-gray-500 text-xs mx-2">${page}/${pg}</span><button onclick="pg(${page+1})" ${page===pg?'disabled':''} class="px-2 bg-gray-800 rounded text-xs">Next</button>`;$('pager').classList.remove('hidden');l=l.slice((page-1)*8,page*8);}else $('pager').classList.add('hidden');}else $('pager').classList.add('hidden');
        
        $('listContainer').innerHTML=l.length?'':`<div class="text-center text-gray-500 py-10 text-xs">No apps found</div>`;
        l.forEach(b=>{
            const div=document.createElement('div'); div.className=`bookmark-item flex items-center gap-3 p-3 bg-gray-800/50 hover:bg-gray-800 border border-gray-700/50 rounded-lg transition group ${sel.has(b.id)?'border-blue-500':''}`;
            div.dataset.id=b.id; div.dataset.bookmarkId=b.id; div.draggable=reorder;
            if(reorder){div.ondragstart=dStart;div.ondragover=dOver;div.ondrop=dDrop;}
            const ico=b.type==='html'?'<div class="w-8 h-8 bg-gray-800 rounded flex items-center justify-center text-blue-400 text-xs">&lt;/&gt;</div>':`<img src="${esc(b.icon)}" class="w-8 h-8 rounded bg-white" onerror="this.style.display='none'">`;
            div.innerHTML=`<div class="drag-handle ${reorder?'block':'hidden'} text-gray-500 cursor-move">⋮</div><input type="checkbox" class="form-checkbox ${reorder?'hidden':''}" ${sel.has(b.id)?'checked':''} onchange="togSel('${b.id}')">${ico}<div class="flex-1 min-w-0"><div class="text-sm font-medium text-gray-200 truncate">${esc(b.name)}</div><div class="text-xs text-gray-500 truncate">${esc(b.url==='app:local'?'Local App':b.url)}</div></div><span class="text-[10px] bg-gray-700 text-gray-300 px-2 py-0.5 rounded-full">${sIcons.get(b.stack)||''} ${esc(b.stack||'General')}</span><div class="flex gap-1 opacity-0 group-hover:opacity-100 transition ${reorder?'hidden':''}"><button class="p-1.5 text-gray-400 hover:text-blue-400" onclick="preview('${b.id}')">👁️</button><button class="p-1.5 ${b.isFavorite?'text-yellow-400':'text-gray-400'}" onclick="fav('${b.id}')">★</button><button class="p-1.5 text-gray-400 hover:text-green-400" onclick="launch('${b.id}')">▶</button><button class="p-1.5 text-gray-400 hover:text-blue-400" onclick="edt('${b.id}')">✎</button><button class="p-1.5 text-gray-400 hover:text-red-400" onclick="del('${b.id}')">✕</button></div>`;
            $('listContainer').appendChild(div);
        });
    }

    window.pg=p=>{page=p;refresh();}
    window.togSel=i=>{sel.has(i)?sel.delete(i):sel.add(i);const c=sel.size;$('multiSelectFooter').className=c?'absolute bottom-12 left-4 right-4 bg-blue-600 rounded-lg p-3 shadow-xl flex justify-between items-center z-30':'hidden';$('selectedCount').innerText=`${c} selected`;};
    window.fav=async i=>{const b=all.find(x=>x.id===i);if(b){b.isFavorite=!b.isFavorite;await dbOp('put',b);loadData();}};
    window.del=async i=>{if(confirm('Delete?')){await dbOp('delete',i);loadData();notify('Deleted');}};
    window.edt=i=>{
        const b=all.find(x=>x.id===i);if(!b)return; const s=[...new Set(all.map(x=>x.stack||"General"))].sort().map(o=>`<option value="${esc(o)}">`).join('');
        showModal("Edit App",`<div class="space-y-3"><input id="eN" value="${esc(b.name)}" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white"><textarea id="eC" class="w-full h-32 bg-gray-800 border border-gray-600 rounded p-2 text-white font-mono">${esc(b.type==='html'?b.html:b.url)}</textarea><input id="eS" value="${esc(b.stack)}" list="eSl" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white"><datalist id="eSl">${s}</datalist><div class="flex gap-4 text-gray-400"><label><input type="checkbox" id="eF" ${b.isFavorite?'checked':''}> Favorite</label></div></div>`,`<button id="eSv" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500">Save</button>`);
        $('eSv').onclick=async()=>{b.name=$('eN').value;b.stack=$('eS').value||"General";b.isFavorite=$('eF').checked;if(b.type==='html')b.html=$('eC').value; else b.url=$('eC').value; await dbOp('put',b);hideModal();loadData();notify("Updated");};
    }
    window.launch=i=>{const b=all.find(x=>x.id===i);if(b){recent=[b,...recent.filter(x=>x.id!==b.id)].slice(0,5);localStorage.setItem('cs_recent',JSON.stringify(recent));if(b.type==='html'){const w=window.open('','_blank');w.document.write(b.html);w.document.close();}else{window.open(b.url,'_blank');}}};

    function showSettings(){
        const s=[...new Set(all.map(b=>b.stack||"General"))].sort(); const ic=ICONS.map(i=>`<option value="${i}">${i||'None'}</option>`).join('');
        const h=s.map(x=>`<div class="flex justify-between items-center py-1"><label class="text-xs text-gray-400">${esc(x)}</label><select class="ic bg-gray-700 rounded text-xs p-1" data-s="${esc(x)}">${ic.replace(`"${sIcons.get(x)||''}"`,`"${sIcons.get(x)||''}" selected`)}</select></div>`).join('');
        const sysStats = `
            <div class="grid grid-cols-3 gap-2 mb-4 text-center">
                <div class="bg-gray-800 p-2 rounded"><div class="text-[10px] text-gray-500">APPS</div><div class="font-bold">${all.length}</div></div>
                <div class="bg-gray-800 p-2 rounded"><div class="text-[10px] text-gray-500">STACKS</div><div class="font-bold">${s.length}</div></div>
                <div class="bg-gray-800 p-2 rounded"><div class="text-[10px] text-gray-500">FAVS</div><div class="font-bold text-yellow-500">${all.filter(x=>x.isFavorite).length}</div></div>
            </div>
            <div class="text-center text-xs text-gray-500 mb-4 font-mono" id="sTime">${new Date().toLocaleString()}</div>
        `;
        
        showModal("Settings",`
            ${sysStats}
            <div class="space-y-4">
                <label class="flex items-center"><input id="sCmp" type="checkbox" class="form-checkbox" ${isCompact?'checked':''}> Compact View</label>
                <div class="border-t border-gray-700 pt-2"><h3 class="font-bold mb-2">Icons</h3><div class="max-h-32 overflow-y-auto pr-1">${h}</div><button id="sSvI" class="w-full mt-2 bg-blue-600 rounded py-1 text-xs">Save Icons</button></div><div class="flex gap-2"><button id="sExp" class="flex-1 bg-gray-700 py-1 rounded text-xs">Export</button><button id="sImp" class="flex-1 bg-gray-700 py-1 rounded text-xs">Import</button></div><button id="sTools" class="w-full bg-gray-700 py-1 rounded text-xs">Install Tools</button></div>`,`<button onclick="hideModal()" class="text-gray-400 text-xs">Close</button>`);
        
        $('sSvI').onclick=()=>{document.querySelectorAll('.ic').forEach(s=>sIcons.set(s.dataset.s,s.value));localStorage.setItem('cs_icons',JSON.stringify(Object.fromEntries(sIcons)));notify("Saved");refresh();};
        $('sExp').onclick=()=>{const a=document.createElement('a');a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(all));a.download='backup.json';a.click();};
        $('sImp').onclick=()=>{showModal("Import",`<input type="file" id="fImp" class="text-sm text-gray-400">`,`<button id="doImp" class="bg-blue-600 px-3 py-1 rounded text-xs">Load</button>`);$('doImp').onclick=()=>{const f=$('fImp').files[0];if(f){const r=new FileReader();r.onload=async e=>{try{const d=JSON.parse(e.target.result);for(const i of d){i.id=crypto.randomUUID();await dbOp('add',i);}loadData();hideModal();notify("Imported");}catch{notify("Error",true);}};r.readAsText(f);}}};
        $('sTools').onclick=async()=>{try{const r=await fetch('https://junkyardai.github.io/Cloudstax-Default-Tools/');const t=await r.text();const p=new DOMParser().parseFromString(t,'text/html');p.querySelectorAll('a').forEach(async a=>{if(a.href.startsWith('http')){await dbOp('add',{id:crypto.randomUUID(),name:a.innerText,url:a.href,stack:"Tools",icon:'',idx:all.length,type:'link'});}});loadData();notify("Tools Installed");hideModal();}catch{notify("Fetch Error",true);}};
    }
    
    function dStart(e){dSrc=this;e.dataTransfer.effectAllowed='move';this.classList.add('dragging');}
    function dOver(e){e.preventDefault();this.classList.add('drag-over');return false;}
    function dDrop(e){e.stopPropagation();if(dSrc!==this){$('listContainer').insertBefore(dSrc,this);saveOrder();}return false;}
    function dEnd(e){this.classList.remove('dragging');document.querySelectorAll('.bookmark-item').forEach(i=>i.classList.remove('drag-over'));}
    async function saveOrder(){const i=document.querySelectorAll('.bookmark-item');for(let x=0;x<i.length;x++){const b=all.find(z=>z.id===i[x].dataset.id);if(b){b.idx=x;await dbOp('put',b);}}notify("Reordered");}
    function handleModalClicks(e) { if(e.target.id==='closeSettings') hideModal(); if(e.target.id==='modalExportData') exportBookmarks(); if(e.target.id==='modalImportJson') handleImportJson(); }
    function initThreeJS(cid){const c=$(cid);if(!c||!window.THREE)return;const s=new THREE.Scene(),cm=new THREE.PerspectiveCamera(75,1,0.1,1000),r=new THREE.WebGLRenderer({canvas:c,alpha:true,antialias:true});cm.position.z=3;const g=new THREE.TorusKnotGeometry(cid==='logo-canvas'?0.6:1,0.2,100,16),m=new THREE.MeshStandardMaterial({color:0x3b82f6});const mesh=new THREE.Mesh(g,m);s.add(mesh);s.add(new THREE.AmbientLight(0xffffff,0.5));const l=new THREE.PointLight(0xffffff,1);l.position.set(2,3,4);s.add(l);const a=()=>{requestAnimationFrame(a);mesh.rotation.x+=0.01;mesh.rotation.y+=0.01;r.render(s,cm);};a();}

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
