<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudstax - Quick Access</title>
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <!-- Load Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display.swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Simple scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-thumb {
      background: #4b5563; /* gray-600 */
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280; /* gray-500 */
    }
    ::-webkit-scrollbar-track {
      background: #1f2937; /* gray-800 */
    }
    /* Custom checkbox style */
    .form-checkbox {
      appearance: none;
      background-color: #374151; /* gray-700 */
      border: 1px solid #4b5563; /* gray-600 */
      padding: 0;
      -webkit-print-color-adjust: exact;
      color-adjust: exact;
      display: inline-block;
      vertical-align: middle;
      background-origin: border-box;
      user-select: none;
      flex-shrink: 0;
      height: 1.25rem; /* h-5 */
      width: 1.25rem; /* w-5 */
      border-radius: 0.375rem; /* rounded */
    }
    .form-checkbox:checked {
      background-color: #3b82f6; /* blue-500 */
      border-color: #3b82f6;
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 0 1 0 1.414l-5 5a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L6.5 9.086l4.293-4.293a1 1 0 0 1 1.414 0z'/%3e%3c/svg%3e");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }
    .form-checkbox:focus {
      outline: 2px solid transparent;
      outline-offset: 2px;
      --tw-ring-color: #3b82f6; /* ring-blue-500 */
      --tw-ring-offset-shadow: 0 0 #0000;
      --tw-ring-shadow: 0 0 #0000;
      box-shadow: 0 0 0 2px var(--tw-ring-color);
    }
    /* Custom radio style */
    .form-radio {
      appearance: none;
      background-color: #374151; /* gray-700 */
      border: 1px solid #4b5563; /* gray-600 */
      padding: 0;
      -webkit-print-color-adjust: exact;
      color-adjust: exact;
      display: inline-block;
      vertical-align: middle;
      background-origin: border-box;
      user-select: none;
      flex-shrink: 0;
      border-radius: 100%;
      height: 1.25rem; /* h-5 */
      width: 1.25rem; /* w-5 */
    }
    .form-radio:checked {
      background-color: #3b82f6; /* blue-500 */
      border-color: #3b82f6;
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }
    .form-radio:focus {
      outline: 2px solid transparent;
      outline-offset: 2px;
      --tw-ring-color: #3b82f6; /* ring-blue-500 */
      --tw-ring-offset-shadow: 0 0 #0000;
      --tw-ring-shadow: 0 0 #0000;
      box-shadow: 0 0 0 2px var(--tw-ring-color);
    }
    /* Styles for log viewer */
     #logContainer {
        max-height: 40vh;
        overflow-y: auto;
        background-color: #1f2937; /* gray-800 */
        border-radius: 0.375rem; /* rounded-md */
        padding: 0.75rem; /* p-3 */
     }
     .log-entry {
        font-family: monospace;
        font-size: 0.75rem; /* text-xs */
        color: #d1d5db; /* gray-300 */
        border-bottom: 1px solid #374151; /* gray-700 */
        padding-bottom: 0.5rem; /* pb-2 */
        margin-bottom: 0.5rem; /* mb-2 */
     }
     .log-entry:last-child {
        border-bottom: none;
        margin-bottom: 0;
     }
     .log-time {
        color: #6b7280; /* gray-500 */
        margin-right: 0.5rem; /* mr-2 */
     }
     .log-context {
        color: #60a5fa; /* blue-400 */
        font-weight: bold;
     }
     .log-message {
        color: #f87171; /* red-400 */
        display: block;
        white-space: pre-wrap; /* Wrap long error messages */
     }
     /* Styles for drag and drop */
     .bookmark-item[draggable="true"] {
        cursor: move;
     }
     .drag-handle {
        cursor: move;
        color: #6b7280; /* gray-500 */
     }
     .drag-handle:hover {
        color: #9ca3af; /* gray-400 */
     }
     .dragging {
        opacity: 0.5;
        background: #374151; /* gray-700 */
     }
     .drag-over {
        border-top: 2px solid #3b82f6; /* blue-500 */
     }
     /* Styles for pagination */
     #paginationControls {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0.75rem; /* p-3 */
        border-top: 1px solid #374151; /* gray-700 */
     }
     .page-btn {
        background-color: #374151; /* gray-700 */
        color: #d1d5db; /* gray-300 */
        padding: 0.25rem 0.75rem;
        margin: 0 0.25rem;
        border-radius: 0.375rem; /* rounded-md */
        font-size: 0.875rem; /* text-sm */
        font-weight: 500;
        transition: background-color: 0.15s;
     }
     .page-btn:hover:not(:disabled) {
        background-color: #4b5563; /* gray-600 */
     }
     .page-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
     }
     .page-btn.active {
        background-color: #3b82f6; /* blue-500 */
        color: #ffffff;
     }
     #pageInfo {
        font-size: 0.875rem; /* text-sm */
        color: #9ca3af; /* gray-400 */
        margin: 0 0.75rem;
     }
     #logo-canvas {
         display: block;
     }
     /* Settings Modal Section */
    .settings-section-title {
        font-weight: 600;
        color: #d1d5db; /* gray-300 */
        margin-bottom: 0.75rem;
        width: 100%;
        text-align: left;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 1rem;
        border-top: 1px solid #4b5563; /* gray-600 */
        cursor: pointer;
    }
    .settings-section:first-child .settings-section-title {
        border-top: none;
        padding-top: 0;
    }
    .settings-section-title:hover {
        color: #fff;
    }
    .settings-chevron {
        transition: transform 0.2s;
    }
    .settings-section-content {
        padding-bottom: 0.5rem;
    }
    .settings-chevron.rotated {
        transform: rotate(90deg);
    }
    .settings-section-desc {
        font-size: 0.875rem; /* text-sm */
        color: #9ca3af; /* gray-400 */
        margin-bottom: 0.75rem;
    }
    #stackIconList {
        max-height: 20vh;
        overflow-y: auto;
    }
    .stack-icon-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.5rem;
    }
    .stack-icon-item label {
        color: #d1d5db; /* gray-300 */
        font-size: 0.875rem; /* text-sm */
    }
    .stack-icon-select {
        width: 6rem; /* w-24 */
        font-size: 1rem; /* text-lg */
        background: #374151; /* gray-700 */
        border: 1px solid #4b5563; /* gray-600 */
        color: #f3f4f6; /* gray-100 */
        border-radius: 0.375rem; /* rounded-md */
        padding: 0.25rem 0.5rem;
    }
    /* Stack Creator Modal Styles */
    #stackCreatorInput {
        width: 100%;
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #4b5563; /* gray-600 */
        background: #1f2937; /* gray-800 */
        color: #f3f4f6; /* gray-100 */
        font-size: 0.875rem; /* text-sm */
    }
    #stackCreatorList {
        margin: 12px 0 0 0;
        padding: 0;
        list-style: none;
        max-height: 25vh;
        overflow-y: auto;
        border: 1px solid #374151; /* gray-700 */
        border-radius: 8px;
        padding: 0.5rem;
    }
    #stackCreatorList li {
        padding: 8px;
        border-radius: 8px;
        background: #374151; /* gray-700 */
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
    }
    #stackCreatorList li:last-child {
        margin-bottom: 0;
    }
    #stackCreatorList .creator-anchor {
        color: #f3f4f6; /* gray-100 */
        text-decoration: none;
        font-size: 0.875rem; /* text-sm */
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    #stackCreatorList .creator-meta {
        color: #9ca3af; /* gray-400 */
        font-size: 0.75rem; /* text-xs */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
    }
    #stackCreatorList .creator-actions button {
        padding: 4px 6px;
        border-radius: 6px;
        border: none;
        background: #4b5563; /* gray-600 */
        color: white;
        cursor: pointer;
        font-size: 0.75rem; /* text-xs */
    }
    #stackCreatorList .creator-actions button:hover {
        background: #6b7280; /* gray-500 */
    }
    #stackCreatorList .creator-actions .creator-delete {
        background: #ef4444; /* red-500 */
    }
    #stackCreatorList .creator-actions .creator-delete:hover {
        background: #dc2626; /* red-600 */
    }
    
    /* Compact View Styles */
    #bookmarksView.compact-mode .bookmark-item {
        padding: 0.5rem 0.75rem; /* p-2 px-3 */
        gap: 0.5rem; /* gap-2 */
    }
    #bookmarksView.compact-mode .bookmark-item img {
        width: 1.75rem; /* w-7 */
        height: 1.75rem; /* h-7 */
    }
    #bookmarksView.compact-mode .drag-handle {
        margin-top: 0;
    }
    #bookmarksView.compact-mode .bookmark-checkbox {
        margin-top: 0.125rem; /* mt-0.5 */
    }
    #bookmarksView.compact-mode .text-sm {
        font-weight: 400; /* normal */
    }
    #bookmarksView.compact-mode .text-xs {
        /* Keep text-xs */
    }

    /* Active Mode Tab Styles */
    .mode-tab-active {
        color: #60a5fa; /* blue-400 */
        border-bottom-width: 2px;
        border-color: #60a5fa; /* blue-400 */
    }
    .mode-tab-inactive {
        color: #9ca3af; /* gray-400 */
    }
    .mode-tab-inactive:hover {
        color: #e5e7eb; /* gray-200 */
    }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 md:flex md:items-center md:justify-center md:p-4">

  <!-- Wrapper for window control -->
  <div class="w-full h-full">

    <!-- Main Application Panel -->
    <div id="mainAppPanel" class="w-full h-full md:w-full md:max-w-2xl md:h-[750px] md:max-h-[90vh] bg-gray-900 md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden md:border md:border-gray-800">
      
      <!-- Header -->
      <header class="flex items-center gap-3 p-4 border-b border-gray-800 select-none flex-shrink-0">
        <!-- Icon -->
        <canvas id="logo-canvas" class="w-10 h-10 rounded-lg"></canvas>
        <div class="flex-1">
          <h1 class="text-base font-semibold">Cloudstax</h1>
          <p class="text-xs text-gray-400">Create Your Own Sites Stacks!</p>
        </div>
        <!-- Link Mode Toggle Button -->
        <button id="linkModeBtn" class="p-2 text-gray-400 hover:text-white transition" title="Set Link Behavior">
            <!-- Icon will be set by JS -->
        </button>
        <!-- Standby Button -->
        <button id="standbyBtn" class="p-2 text-gray-400 hover:text-white transition" title="Enter Standby Mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-minimize-2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/></svg>
        </button>
      </header>

      <!-- Add Bookmark Form -->
      <div class="p-4 border-b border-gray-800 flex-shrink-0">
        
        <!-- Mode Tabs -->
        <div class="flex gap-4 mb-3">
            <button id="modeLinkBtn" class="text-xs font-medium pb-1 transition mode-tab-active">Link / File</button>
            <button id="modeCodeBtn" class="text-xs font-medium pb-1 transition mode-tab-inactive">Raw HTML Code</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <input id="nameIn" placeholder="Name (e.g., Google or My App)" class="md:col-span-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          
          <!-- URL Input (Default) -->
          <input id="urlIn" placeholder="URL (e.g., google.com)" class="md:col-span-2 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          
          <!-- Code Input Wrapper (Hidden by default) -->
          <div id="codeInputWrapper" class="hidden md:col-span-2 flex flex-col gap-2">
             <div class="flex justify-between items-center">
                <span class="text-xs text-gray-500">Paste code below or import file:</span>
                <input type="file" id="codeFileInput" accept=".html,.htm,.txt" class="text-xs text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-medium file:bg-gray-800 file:text-blue-400 hover:file:bg-gray-700 cursor-pointer">
             </div>
             <textarea id="codeIn" placeholder="<!DOCTYPE html>..." class="w-full text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono h-24 resize-none"></textarea>
          </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
          <input id="stackIn" placeholder="Stack (e.g., Tools)" list="mainStackDatalist" class="md:col-span-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <datalist id="mainStackDatalist">
            <!-- Options will be populated by JS -->
          </datalist>
          
          <div class="md:col-span-1 flex items-center justify-center md:justify-start gap-4 pl-1">
             <div class="flex items-center" id="openExternalContainer">
                <input id="openExternalIn" type="checkbox" class="form-checkbox">
                <label for="openExternalIn" class="ml-2 text-sm text-gray-300 select-none">External</label>
             </div>
             <div class="flex items-center">
                <input id="isFavoriteIn" type="checkbox" class="form-checkbox">
                <label for="isFavoriteIn" class="ml-2 text-sm text-gray-300 select-none">Favorite</label>
             </div>
          </div>
          <button id="addBtn" class="md:col-span-1 w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Add
          </button>
        </div>
      </div>

      <!-- Search & Filter -->
      <div class="flex gap-3 p-4 border-b border-gray-800 flex-shrink-0">
        <div class="relative flex-1">
          <input id="searchIn" placeholder="Search..." class="w-full text-sm bg-gray-800 rounded-md pl-10 pr-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <select id="stackFilter" class="text-sm bg-gray-800 text-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">All Stacks</option>
          <!-- Stacks will be populated by JS -->
        </select>
      </div>

      <!-- Bookmarks List -->
      <div id="bookmarksView" class="flex-1 overflow-y-auto p-3">
        <div id="bookmarksList" class="space-y-2">
          <!-- Bookmarks will be populated by JS -->
          <p id="loadingIndicator" class="text-center text-gray-400 p-4">Loading bookmarks...</p>
        </div>
      </div>
      
      <!-- Pagination Controls -->
      <div id="paginationControls" class="flex-shrink-0 hidden">
          <!-- Pagination will be populated by JS -->
      </div>

      <!-- Multi-select Footer -->
      <div id="multiSelectFooter" class="hidden p-3 bg-gray-800 border-t border-gray-700 flex justify-between items-center flex-shrink-0">
        <span id="selectedCount" class="text-sm text-gray-300">0 selected</span>
        <button id="launchSelectedBtn" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-md text-sm font-medium transition flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rocket"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.3.09-3.21l-1.07-1.07a3 3 0 0 0-3.21.09z"/><path d="M12 15.5 3.5 7.3c-.07-.1-.1-.23-.1-.34a.5.5 0 0 1 .5-.5h.34c.11 0 .24.03.34.1l8.2 8.2"/><path d="M15.5 12 7.3 3.5c-.1-.07-.23-.1-.34-.1a.5.5 0 0 0-.5.5v.34c0 .11.03.24.1.34l8.2 8.2"/><path d="M7 21a6.5 6.5 0 0 0 6.5-6.5.5.5 0 0 0-.5-.5H12c-.28 0-.5.22-.5.5A6.5 6.5 0 0 0 21 7"/><path d="M21 3v4h-4"/></svg>
          Launch Selected
        </button>
      </div>
      
      <!-- Footer Buttons -->
      <div id="footerButtons" class="p-3 bg-gray-900 border-t border-gray-800 flex gap-3 justify-end flex-wrap flex-shrink-0">
        <button id="settingsBtn" class="relative px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l-.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Settings
            <span id="errorCountBadge" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full px-1.5 py-0.5 leading-none">0</span>
        </button>
        
        <button id="reorderBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2" title="Toggle Drag-and-Drop Reordering (All Stacks Only)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-move-vertical"><polyline points="8 18 12 22 16 18"/><polyline points="8 6 12 2 16 6"/><line x1="12" x2="12" y1="2" y2="22"/></svg>
          Reorder
        </button>
        
        <button id="quickGrabBtn" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-md text-sm font-medium transition flex items-center gap-2" title="Grab first link from clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hand"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 9V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M18 11a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2v0a2 2 0 0 1-2-2v-4"/><path d="M14 10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2v0a2 2 0 0 1-2-2v-6"/><path d="M10 9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2v0a2 2 0 0 1-2-2v-8"/></svg>
          Quick Grab
        </button>
      </div>
    </div>
    
    <!-- Standby Panel -->
    <div id="standbyPanel" class="hidden w-full h-full md:w-full md:max-w-xs md:h-auto md:max-h-[450px] bg-gray-900 md:rounded-2xl md:shadow-2xl flex flex-col overflow-hidden md:border md:border-gray-800 p-6">
        <div class="flex flex-col items-center">
            <canvas id="standby-logo-canvas" class="w-48 h-48 rounded-lg"></canvas>
            <h2 class="text-lg font-semibold text-white mt-4">Cloudstax</h2>
            <p class="text-sm text-gray-400">Standby Mode</p>
            
            <div class="w-full mt-6">
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Recent Links</h3>
                <div id="recentLinksList" class="space-y-2">

  <!-- App Logic -->
  <script type"module">
    // --- IndexedDB Configuration ---

    // --- Global State ---

    const elements = {
      nameIn: $('nameIn'),

      openExternalIn: $('openExternalIn'),

    // --- Error Logging ---
    function logError(error, context) {
        try {
            console.error(context, error); // Keep console logging
            const newError = {
                time: new Date().toLocaleString(),
                message: error.message || 'Unknown error',
                context: context,
                stack: error.stack
            };
            errorLog.push(newError);
            elements.errorCountBadge.textContent = errorLog.length;
            elements.errorCountBadge.classList.remove('hidden');
        } catch (e) {
            console.error("CRITICAL: Failed to log error:", e);
        }
    }

    // --- Animations ---
    function initThreeJSAnimation() {
        try {
            const logoCanvas = document.getElementById('logo-canvas');
            if (!logoCanvas || !window.THREE) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000); 
            camera.position.z = 3; 
            const renderer = new THREE.WebGLRenderer({ canvas: logoCanvas, alpha: true });
            renderer.setSize(40, 40); 
            renderer.setPixelRatio(window.devicePixelRatio);
            const geometry = new THREE.TorusKnotGeometry(0.8, 0.25, 100, 16); 
            const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: 0.3, roughness: 0.4 });
            const knot = new THREE.Mesh(geometry, material);
            scene.add(knot);
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(2, 3, 4);
            scene.add(pointLight);
            function animate() { requestAnimationFrame(animate); knot.rotation.x += 0.01; knot.rotation.y += 0.01; renderer.render(scene, camera); }
            animate();
        } catch (error) { logError(error, 'initThreeJSAnimation'); }
    }
    
    function initStandbyAnimation() {
        try {
            const logoCanvas = document.getElementById('standby-logo-canvas');
            if (!logoCanvas || !window.THREE) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000); 
            camera.position.z = 3; 
            const renderer = new THREE.WebGLRenderer({ canvas: logoCanvas, alpha: true });
            renderer.setSize(192, 192); // w-48 h-48
            renderer.setPixelRatio(window.devicePixelRatio);
            const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16); 
            const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: 0.3, roughness: 0.4 });
            const knot = new THREE.Mesh(geometry, material);
            scene.add(knot);
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(2, 3, 4);
            scene.add(pointLight);
            function animate() { requestAnimationFrame(animate); knot.rotation.x += 0.01; knot.rotation.y += 0.01; renderer.render(scene, camera); }
            animate();
            hasStandbyBeenInitialized = true; 
        } catch (error) { logError(error, 'initStandbyAnimation'); }
    }

    // --- Utility Functions ---
    function debounce(func, delay) {
        return function(...args) {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => { func.apply(this, args); }, delay);
        };
    }

    function normalizeUrl(input) {
      let s = String(input || '').trim();
      if (!s) throw new Error('URL cannot be empty.');
      if (s.startsWith('about:') || s.startsWith('chrome:') || s.startsWith('file:') || s.startsWith('data:')) return s;
      if (/^localhost(:\d+)?$/.test(s) || /^\d{1,3}(\.\d{1,3}){3}(:\d+)?$/.test(s)) {
        if (!/^http(s)?:\/\//.test(s)) s = 'http://' + s;
      } else if (!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(s)) {
        if (s.includes('.') || s.includes('/')) s = 'https://' + s;
        else s = 'https://www.google.com/search?q=' + encodeURIComponent(s);
      }
      try { new URL(s); return s; } 
      catch (e) { return 'https://www.google.com/search?q=' + encodeURIComponent(input); }
    }

    function extractNameFromUrl(url, name) {
      if (name?.trim()) return name.trim();
      try {
        if (url.startsWith('data:')) return "Data App";
        if (url === "app:local") return "Data App";
        const host = new URL(url).hostname.replace(/^www\./i, '');
        const candidate = host.split('.')[0];
        if(candidate.length > 0) return candidate.charAt(0).toUpperCase() + candidate.slice(1);
        const urlParams = new URLSearchParams(new URL(url).search);
        if(urlParams.has('q')) return `Search: ${urlParams.get('q')}`;
      } catch {
        if(url.includes('search?q=')) return `Search: ${url.split('search?q=')[1].split('&')[0]}`;
      }
      return "Untitled";
    }
    
    function openLinkExternally(url) {
      try {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } catch (error) { logError(error, 'openLinkExternally'); }
    }

    function getFavicon(url) {
      if (url === "app:local" || url.startsWith('data:')) return ''; // Special handling for local apps
      try {
        const host = new URL(url).hostname;
        return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
      } catch {
        return 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-globe%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><path d=%22M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20%22/><path d=%22M2 12h20%22/></svg>';
      }
    }

    function sanitize(str) {
      if (str === null || str === undefined) return '';
      const temp = document.createElement('div');
      temp.textContent = str;
      return temp.innerHTML;
    }
    
    function escapeHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function escapeAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

    function showNotification(message, isError = false) {
      elements.notification.textContent = message;
      elements.notification.classList.remove('hidden', 'bg-green-600', 'bg-red-600');
      elements.notification.classList.add(isError ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => { elements.notification.classList.add('hidden'); }, 3000);
    }

    // --- Modal Functions ---
    function showModal(title, bodyHtml, footerHtml) {
      elements.modalTitle.textContent = title;
      elements.modalBody.innerHTML = bodyHtml;
      elements.modalFooter.innerHTML = footerHtml;
      elements.modal.classList.remove('hidden');
    }
    function hideModal() {
      elements.modal.classList.add('hidden');
      elements.modalTitle.textContent = '';
      elements.modalBody.innerHTML = '';
      elements.modalFooter.innerHTML = '';
    }
    elements.modalClose.addEventListener('click', hideModal);

    // --- IndexedDB Functions ---
    function initDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
            store.createIndex('orderIndex', 'orderIndex', { unique: false });
          }
        };
        request.onsuccess = (event) => { db = event.target.result; resolve(db); };
        request.onerror = (event) => { logError(event.target.error, 'initDB: onerror'); reject(event.target.error); };
      });
    }
    function getObjectStore(mode) { return db.transaction([STORE_NAME], mode).objectStore(STORE_NAME); }
    function getAllBookmarksFromDB() {
      return new Promise((resolve, reject) => {
        const request = getObjectStore('readonly').getAll();
        request.onsuccess = (event) => { resolve(event.target.result); };
        request.onerror = (event) => { logError(event.target.error, 'getAllBookmarksFromDB'); reject(event.target.error); };
      });
    }
    function addBookmarkToDB(bookmark) {
      return new Promise((resolve, reject) => {
        const request = getObjectStore('readwrite').add(bookmark);
        request.onsuccess = resolve;
        request.onerror = (event) => { logError(event.target.error, 'addBookmarkToDB'); reject(event.target.error); };
      });
    }
    function updateBookmarkInDB(bookmark) {
      return new Promise((resolve, reject) => {
        const request = getObjectStore('readwrite').put(bookmark);
        request.onsuccess = resolve;
        request.onerror = (event) => { logError(event.target.error, 'updateBookmarkInDB'); reject(event.target.error); };
      });
    }
    function deleteBookmarkFromDB(id) {
      return new Promise((resolve, reject) => {
        const request = getObjectStore('readwrite').delete(id);
        request.onsuccess = resolve;
        request.onerror = (event) => { logError(event.target.error, 'deleteBookmarkFromDB'); reject(event.target.error); };
      });
    }
    function batchImportToDB(bookmarks) {
      return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const currentCount = allBookmarks.length;
        let importCount = 0;
        bookmarks.forEach(bookmark => {
          if (!bookmark.id) bookmark.id = crypto.randomUUID();
          if (bookmark.orderIndex === undefined) bookmark.orderIndex = currentCount + importCount;
          store.add(bookmark);
          importCount++;
        });
        transaction.oncomplete = () => { resolve(importCount); };
        transaction.onerror = (event) => { logError(event.target.error, 'batchImportToDB'); reject(event.target.error); };
      });
    }

    // --- State Management ---
    function loadStackIcons() {
        try {
            const data = JSON.parse(localStorage.getItem(STACK_ICONS_KEY)) || {};
            stackIcons = new Map(Object.entries(data));
        } catch (error) { logError(error, 'loadStackIcons'); stackIcons = new Map(); }
    }
    function saveStackIcons(newIconMap) {
        try {
            localStorage.setItem(STACK_ICONS_KEY, JSON.stringify(Object.fromEntries(newIconMap)));
            stackIcons = newIconMap; 
        } catch (error) { logError(error, 'saveStackIcons'); }
    }
    function loadOpenMode() {
        try {
            const mode = localStorage.getItem(CLOUDSTAX_OPEN_MODE_KEY) || 'default';
            globalOpenMode = ['default', 'force-external', 'force-internal'].includes(mode) ? mode : 'default';
        } catch (error) { logError(error, 'loadOpenMode'); globalOpenMode = 'default'; }
    }
    function saveOpenMode(mode) {
        try {
            if (['default', 'force-external', 'force-internal'].includes(mode)) {
                globalOpenMode = mode;
                localStorage.setItem(CLOUDSTAX_OPEN_MODE_KEY, mode);
                showNotification("Link behavior saved!");
                updateLinkModeBtnIcon(); 
            }
        } catch (error) { logError(error, 'saveOpenMode'); }
    }
    function toggleLinkMode() {
        let newMode = globalOpenMode === 'default' ? 'force-external' : (globalOpenMode === 'force-external' ? 'force-internal' : 'default');
        saveOpenMode(newMode); 
        const openRadio = document.querySelector(`input[name="link-behavior"][value="${newMode}"]`);
        if (openRadio) openRadio.checked = true;
    }
    function updateLinkModeBtnIcon() {
        let iconHtml = '', title = '';
        const baseSvg = (paths) => `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
        if (globalOpenMode === 'default') {
            iconHtml = baseSvg(`<path d="M8 3H2v15h7c1.7 0 3 1.3 3 3V7c0-2.2-1.8-4-4-4Z"/><path d="m16 12 2 2 4-4"/><path d="M22 6V3h-6c-2.2 0-4 1.8-4 4v14c0-1.7 1.3-3 3-3h7V6Z"/>`);
            title = 'Link Behavior: Default (Per-link setting)';
        } else if (globalOpenMode === 'force-external') {
            iconHtml = baseSvg(`<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>`);
            title = 'Link Behavior: Force All External';
        } else { 
            iconHtml = baseSvg(`<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>`);
            title = 'Link Behavior: Force All Internal (New Tab)';
        }
        elements.linkModeBtn.innerHTML = iconHtml;
        elements.linkModeBtn.title = title;
    }
    function loadCompactView() {
        try { isCompactView = localStorage.getItem(CLOUDSTAX_COMPACT_VIEW_KEY) === 'true'; } 
        catch (error) { logError(error, 'loadCompactView'); isCompactView = false; }
    }
    function saveCompactView(isCompact) {
        try {
            isCompactView = !!isCompact; 
            localStorage.setItem(CLOUDSTAX_COMPACT_VIEW_KEY, isCompactView);
            showNotification("View mode saved!");
            renderBookmarks(); 
        } catch (error) { logError(error, 'saveCompactView'); }
    }

    // --- UI Logic: Add Mode Toggle ---
    function setAddMode(mode) {
        addInputMode = mode;
        if (mode === 'link') {
            elements.urlIn.classList.remove('hidden');
            elements.codeInputWrapper.classList.add('hidden'); // Use wrapper
            elements.openExternalContainer.classList.remove('invisible');
            
            elements.modeLinkBtn.classList.add('mode-tab-active');
            elements.modeLinkBtn.classList.remove('mode-tab-inactive');
            elements.modeCodeBtn.classList.remove('mode-tab-active');
            elements.modeCodeBtn.classList.add('mode-tab-inactive');
            
            elements.urlIn.focus();
        } else {
            elements.urlIn.classList.add('hidden');
            elements.codeInputWrapper.classList.remove('hidden'); // Use wrapper
            // External toggle doesn't make sense for raw code
            elements.openExternalContainer.classList.add('invisible');
            
            elements.modeLinkBtn.classList.remove('mode-tab-active');
            elements.modeLinkBtn.classList.add('mode-tab-inactive');
            elements.modeCodeBtn.classList.add('mode-tab-active');
            elements.modeCodeBtn.classList.remove('mode-tab-inactive');
            
            elements.codeIn.focus();
        }
    }

    // --- Rendering ---
    function refreshUI() {
        renderStacks();
        renderBookmarks();
        updateMainStackDatalist();
    }

    function renderBookmarks() {
      try {
        if (isCompactView) elements.bookmarksView.classList.add('compact-mode');
        else elements.bookmarksView.classList.remove('compact-mode');
      
        const searchTerm = elements.searchIn.value.toLowerCase();
        const stackFilter = elements.stackFilter.value;

        if (stackFilter === "" && !isReorderMode) {
            elements.reorderBtn.disabled = false;
            elements.reorderBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        } else if (stackFilter !== "" && !isReorderMode) {
            elements.reorderBtn.disabled = true;
            elements.reorderBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }

        const filteredBookmarks = allBookmarks.filter(bookmark => {
          const stack = bookmark.stack || bookmark.category || "General";
          const matchesSearch = 
            bookmark.name.toLowerCase().includes(searchTerm) ||
            (bookmark.url && bookmark.url.toLowerCase().includes(searchTerm)) ||
            stack.toLowerCase().includes(searchTerm);
          
          let matchesStack;
          if (stackFilter === "Favorites") matchesStack = bookmark.isFavorite;
          else matchesStack = !stackFilter || stack === stackFilter;
          return matchesSearch && matchesStack;
        });
        
        let bookmarksToRender = [];
        const totalItems = filteredBookmarks.length;

        if (isReorderMode) {
            bookmarksToRender = filteredBookmarks;
            elements.paginationControls.classList.add('hidden');
        } else {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            bookmarksToRender = filteredBookmarks.slice(startIndex, endIndex);
            renderPagination(totalItems);
        }

        elements.bookmarksList.innerHTML = '';

        if (bookmarksToRender.length === 0 && allBookmarks.length > 0) {
          elements.loadingIndicator.textContent = 'No bookmarks found. Try adjusting your search.';
          elements.bookmarksList.appendChild(elements.loadingIndicator);
        } else if (allBookmarks.length === 0) {
          elements.loadingIndicator.textContent = 'No bookmarks yet. Add one above!';
          elements.bookmarksList.appendChild(elements.loadingIndicator);
        }

        bookmarksToRender.forEach(bookmark => {
          const stack = bookmark.stack || bookmark.category || "General";
          const isChecked = selectedBookmarks.has(bookmark.id) ? 'checked' : '';
          const isFavorite = bookmark.isFavorite || false;
          const stackIcon = stackIcons.get(stack) || '';
          
          // Determine Icon and Style based on Type
          const isHtmlApp = bookmark.type === 'html';
          
          // Default Icon Logic
          let iconHtml = '';
          if (isHtmlApp) {
             // Code Icon for HTML Apps
             iconHtml = `<div class="w-8 h-8 rounded-md flex-shrink-0 bg-gray-700 flex items-center justify-center text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-code-2"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
             </div>`;
          } else {
             // Image for Links
             iconHtml = `<img src="${sanitize(bookmark.icon)}" class="w-8 h-8 rounded-md flex-shrink-0" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239ca3af%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 class=%22lucide lucide-globe%22><circle cx=%2212%22 cy=%2212%22 r=%2210%22/><path d=%22M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20%22/><path d=%22M2 12h20%22/></svg>'">`;
          }
          
          const item = document.createElement('div');
          item.className = 'bookmark-item flex items-start gap-3 p-3 bg-gray-800 rounded-lg hover:bg-gray-700 transition';
          item.dataset.bookmarkId = bookmark.id; 
          item.setAttribute('draggable', isReorderMode); 
          
          item.innerHTML = `
            <div class="drag-handle ${isReorderMode ? 'flex' : 'hidden'} items-center justify-center h-8 mt-1" title="Drag to reorder">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-grip-vertical"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
            </div>

    function renderPagination(totalItems) {
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        elements.paginationControls.innerHTML = '';
        if (totalPages <= 1) {
            elements.paginationControls.classList.add('hidden');
            return;
        }
        elements.paginationControls.classList.remove('hidden');
        const prevBtn = document.createElement('button'); prevBtn.textContent = 'Prev'; prevBtn.className = 'page-btn'; prevBtn.disabled = currentPage === 1;
        prevBtn.addEventListener('click', () => { currentPage--; renderBookmarks(); });
        elements.paginationControls.appendChild(prevBtn);
        const pageInfo = document.createElement('span'); pageInfo.id = 'pageInfo'; pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
        elements.paginationControls.appendChild(pageInfo);
        const nextBtn = document.createElement('button'); nextBtn.textContent = 'Next'; nextBtn.className = 'page-btn'; nextBtn.disabled = currentPage === totalPages;
        nextBtn.addEventListener('click', () => { currentPage++; renderBookmarks(); });
        elements.paginationControls.appendChild(nextBtn);
    }

    // Main Launch Handler
    function handleLaunch(bookmark) {
        updateRecentLaunches(bookmark);
        
        // CODE RUNNER LOGIC
        if (bookmark.type === 'html') {
             const win = window.open('', '_blank');
             if (win) {
                 win.document.open();
                 win.document.write(bookmark.html || '<h1>Error: No content found</h1>');
                 win.document.close();
             } else {
                 showNotification("Popup blocked. Allow popups to run code.", true);
             }
             return;
        }
        
        // Standard Link Logic
        if (globalOpenMode === 'force-external') {
            openLinkExternally(bookmark.url);
        } else if (globalOpenMode === 'force-internal') {
            window.open(bookmark.url, '_blank', 'noopener');
        } else { 
            if (bookmark.openExternal) openLinkExternally(bookmark.url);
            else window.open(bookmark.url, '_blank', 'noopener');
        }
    }

    async function addBookmark() {
      elements.addBtn.disabled = true;
      elements.addBtn.textContent = 'Adding...';
      try {
        const rawName = elements.nameIn.value;
        const rawUrl = elements.urlIn.value;
        const rawCode = elements.codeIn.value;
        let rawStack = elements.stackIn.value.trim();
        const openExternal = elements.openExternalIn.checked;
        const isFavorite = elements.isFavoriteIn.checked;

        let newBookmark = {
            id: crypto.randomUUID(), 
            stack: rawStack.length > 0 ? (rawStack.charAt(0).toUpperCase() + rawStack.slice(1)) : "General",
            isFavorite: isFavorite,
            createdAt: new Date().toISOString(), 
            orderIndex: allBookmarks.length 
        };

        if (addInputMode === 'link') {
            if (!rawUrl) { showNotification("URL is required.", true); return; }
            let normalizedUrl;
            try { normalizedUrl = normalizeUrl(rawUrl); } catch (e) { showNotification(e.message, true); return; }
            
            newBookmark.type = 'link';
            newBookmark.name = extractNameFromUrl(normalizedUrl, rawName);
            newBookmark.url = normalizedUrl;
            newBookmark.icon = getFavicon(normalizedUrl);
            newBookmark.openExternal = openExternal;
        } else {
            // CODE MODE
            if (!rawCode.trim()) { showNotification("HTML code is required.", true); return; }
            
            newBookmark.type = 'html';
            newBookmark.name = rawName || "Local Data App";
            newBookmark.html = rawCode;
            newBookmark.url = "app:local"; // Placeholder for UI
            newBookmark.icon = ""; // Rendered as code icon manually
            newBookmark.openExternal = false;
        }
      
        await addBookmarkToDB(newBookmark);
        showNotification("Entry added!");
        
        elements.nameIn.value = '';
        elements.urlIn.value = '';
        elements.codeIn.value = '';
        elements.stackIn.value = '';
        elements.openExternalIn.checked = false;
        elements.isFavoriteIn.checked = false;
        
        // Switch back to link mode for convenience? No, let user stay in mode.
        
        allBookmarks.push(newBookmark);
        refreshUI();
      } catch (error) { logError(error, "addBookmark"); }

        elements.addBtn.disabled = false;

    async function updateBookmark(id) {

        const rawName = $('editNameIn').value;

    async function saveNewOrder() {
        try {
            const items = elements.bookmarksList.querySelectorAll('.bookmark-item');
            const updatePromises = [];
            items.forEach((item, index) => {
                const bookmarkId = item.dataset.bookmarkId;
                const bookmark = allBookmarks.find(b => b.id === bookmarkId);
                if (bookmark && bookmark.orderIndex !== index) {
                    bookmark.orderIndex = index;
                    updatePromises.push(updateBookmarkInDB(bookmark));
                }
            });
            if (updatePromises.length > 0) { await Promise.all(updatePromises); showNotification("Order saved!"); }

    // Drag & Drop Handlers
    function handleDragStart(e) { dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', this.innerHTML); this.classList.add('dragging'); }
    function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); this.classList.add('drag-over'); e.dataTransfer.dropEffect = 'move'; return false; }
    function handleDragLeave(e) { this.classList.remove('drag-over'); }
    function handleDrop(e) { if (e.stopPropagation) e.stopPropagation(); if (dragSrcEl !== this) elements.bookmarksList.insertBefore(dragSrcEl, this); this.classList.remove('drag-over'); return false; }
    function handleDragEnd(e) { this.classList.remove('dragging'); elements.bookmarksList.querySelectorAll('.bookmark-item').forEach(item => item.classList.remove('drag-over')); dragSrcEl = null; }
    function updateDragDropListeners() {
        const items = elements.bookmarksList.querySelectorAll('.bookmark-item');
        items.forEach(item => {
            if (isReorderMode) {
                item.addEventListener('dragstart', handleDragStart, false); item.addEventListener('dragover', handleDragOver, false);
                item.addEventListener('dragleave', handleDragLeave, false); item.addEventListener('drop', handleDrop, false);
                item.addEventListener('dragend', handleDragEnd, false);
            } else {
                item.removeEventListener('dragstart', handleDragStart); item.removeEventListener('dragover', handleDragOver);
                item.removeEventListener('dragleave', handleDragLeave); item.removeEventListener('drop', handleDrop);
                item.removeEventListener('dragend', handleDragEnd);
            }
        });
    }

    // --- Helper for HTML Parsing ---
    function parseLinksFromHtml(htmlString, stackName, baseUrl) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlString, 'text/html');
      const links = doc.querySelectorAll('a');
      const bookmarks = [];
      const base = baseUrl; 
      const currentCount = allBookmarks.length;
      
      links.forEach((link, index) => {
        const url = link.getAttribute('href');
        const name = link.textContent.trim();
        
        if (url && url !== '#' && !url.startsWith('javascript:')) {
          try {
            const absoluteUrl = base ? new URL(url, base).href : url;
            const normalizedUrl = normalizeUrl(absoluteUrl);
            
            bookmarks.push({
              name: extractNameFromUrl(normalizedUrl, name || absoluteUrl),
              url: normalizedUrl,
              stack: stackName,
              icon: getFavicon(normalizedUrl),
              openExternal: false,
              isFavorite: false,
              createdAt: new Date().toISOString(),
              id: crypto.randomUUID(),
              orderIndex: currentCount + index 
            });
          } catch (e) {
            logError(e, `parseLinksFromHtml (Skipped URL: ${url})`);
          }
        }
      });
      return bookmarks;
    }

    }
    function handleImportJson() {
        showModal("Import JSON", `<p class="text-sm text-gray-300">Choose import method:</p><div class="mt-3"><label class="flex items-center"><input type="radio" name="import-mode" value="append" class="form-radio" checked><span class="ml-2 text-sm text-gray-300">Append</span></label><label class="flex items-center"><input type="radio" name="import-mode" value="merge" class="form-radio"><span class="ml-2 text-sm text-gray-300">Merge (Skip duplicates)</span></label></div>`, `<button id="importFile" class="px-4 py-2 bg-blue-600 rounded-md text-sm">Choose File</button>`);
        $('importFile').onclick = () => {
            const mode = document.querySelector('input[name="import-mode"]:checked').value;
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = async event => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(!Array.isArray(data)) throw new Error("Invalid format");
                        const existing = new Set(allBookmarks.map(b => b.url));
                        const toImport = [];
                        data.forEach(item => {
                            if(mode === 'merge' && item.url && existing.has(item.url)) return;
                            toImport.push({
                                ...item, id: crypto.randomUUID(), 
                                orderIndex: allBookmarks.length + toImport.length
                            });
                        });
                        if(toImport.length > 0) { await batchImportToDB(toImport); await loadAllBookmarks(); showNotification(`Imported ${toImport.length} items.`); }
                        else showNotification("No new items.");
                        hideModal();
                    } catch(err) { showNotification("Import failed.", true); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }
    }
    
    // --- Install Tools Logic ---
    async function handleInstallTools() {
      const toolsUrl = 'https://junkyardai.github.io/Cloudstax-Default-Tools/';
      const body = `<p class="text-sm text-gray-300">This will install the default Cloudstax tools from:</p><p class="text-sm text-blue-400 truncate my-2">${sanitize(toolsUrl)}</p><p class="text-sm text-gray-300">They will be added to a new stack called "Cloudstax Tools".</p>`;
      const footer = `<button id="cancelInstall" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Cancel</button><button id="confirmInstall" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">Confirm Install</button>`;
      showModal("Install Cloudstax Tools", body, footer);
      $('cancelInstall').onclick = hideModal;
      $('confirmInstall').onclick = async () => {
        try {
          const confirmBtn = $('confirmInstall'); confirmBtn.disabled = true; confirmBtn.textContent = 'Installing...';
          const response = await fetch(toolsUrl);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const htmlText = await response.text();
          const bookmarksToImport = parseLinksFromHtml(htmlText, "Cloudstax Tools", toolsUrl);
          if (bookmarksToImport.length > 0) { await batchImportToDB(bookmarksToImport); showNotification(`Successfully installed ${bookmarksToImport.length} tools.`); await loadAllBookmarks(); } 
          else showNotification('No tools found.', true);
        } catch (error) { logError(error, 'handleInstallTools'); } finally { hideModal(); }
      };
    }

    // --- Quick Grab Logic ---
    function handleQuickGrabModal() {
      const allStacks = [...new Set(allBookmarks.map(b => b.stack || b.category || "General"))].sort();
      const datalistHtml = allStacks.map(s => `<option value="${sanitize(s)}"></option>`).join('');
      const body = `<p class="text-sm text-gray-300 mb-2">Paste your link below and press Enter.</p><input id="quickGrabInput" class="w-full text-sm bg-gray-900 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://..."><label class="text-xs text-gray-400 mt-3 mb-1 block">Stack (optional)</label><input id="quickGrabStackInput" class="w-full text-sm bg-gray-900 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Quick Stack" list="quickGrabStacks"><datalist id="quickGrabStacks">${datalistHtml}</datalist>`;
      const footer = `<button id="cancelQuickGrab" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Cancel</button><button id="confirmQuickGrab" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">Grab Link</button>`;
      showModal("Quick Grab", body, footer);
      const input = $('quickGrabInput'); const stackInput = $('quickGrabStackInput'); input.focus(); 
      const grabFunc = async () => {
        const text = input.value;
        const stackName = stackInput.value.trim().length > 0 ? (stackInput.value.trim().charAt(0).toUpperCase() + stackInput.value.trim().slice(1)) : "Quick Stack";
        if (await processQuickGrabPaste(text, stackName)) hideModal(); else { showNotification("No valid link found.", true); input.focus(); input.select(); }
      };
      $('cancelQuickGrab').onclick = hideModal; $('confirmQuickGrab').onclick = grabFunc;
      input.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); grabFunc(); } };
      stackInput.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); grabFunc(); } };
    }
    async function processQuickGrabPaste(text, stackName = "Quick Stack") {
        if (!text || !text.trim()) return false;
        const lines = text.split('\n').filter(line => line.trim().length > 0);
        if (lines.length === 0) return false;
        let addedCount = 0;
        let lineToProcess = lines[0];
        try {
            let normalizedUrl = normalizeUrl(lineToProcess);
            let name = extractNameFromUrl(normalizedUrl, '');
            await addBookmarkToDB({ id: crypto.randomUUID(), name, url: normalizedUrl, stack: stackName, icon: getFavicon(normalizedUrl), openExternal: false, isFavorite: false, createdAt: new Date().toISOString(), orderIndex: allBookmarks.length });
            addedCount++;
        } catch (e) { logError(e, `processQuickGrab`); }
        if (addedCount > 0) { showNotification(`Added 1 bookmark to ${stackName}.`); await loadAllBookmarks(); }
        return addedCount > 0;
    }
    
    // --- Stack Creator Logic ---
    function stackCreator_load() { try { return JSON.parse(localStorage.getItem(CREATOR_KEY)) || []; } catch(e) { return []; } }
    function stackCreator_save(arr) { localStorage.setItem(CREATOR_KEY, JSON.stringify(arr)); stackCreator_render(); }
    function stackCreator_inferName(url) { try { const u = new URL(url); return u.hostname.replace(/^www\./,''); } catch(e) { return url; } }
    function stackCreator_parseInput(text) {
        text = (text||'').trim(); if(!text) return null;
        const parts = text.split(/\s*-\s*/);
        if(parts.length === 1){ const maybeUrl = parts[0]; const url = maybeUrl.match(/^https?:\/\//i) ? maybeUrl : 'https://' + maybeUrl; return {name: stackCreator_inferName(url), href: url}; } 
        else { const name = parts.slice(0, -1).join(' - ') || parts[0]; let href = parts[parts.length-1]; href = href.match(/^https?:\/\//i) ? href : 'https://' + href; return {name: name.trim() || stackCreator_inferName(href), href: href.trim()}; }
    }
    function stackCreator_addFromInput(str) { const entry = stackCreator_parseInput(str); if(!entry) return; const arr = stackCreator_load(); arr.push(entry); stackCreator_save(arr); }
    function stackCreator_removeIndex(i) { const arr = stackCreator_load(); arr.splice(i,1); stackCreator_save(arr); }
    function stackCreator_moveUp(i) { if(i<=0) return; const arr = stackCreator_load(); const a = arr.splice(i,1)[0]; arr.splice(i-1,0,a); stackCreator_save(arr); }
    function stackCreator_moveDown(i) { const arr = stackCreator_load(); if(i>=arr.length-1) return; const a = arr.splice(i,1)[0]; arr.splice(i+1,0,a); stackCreator_save(arr); }
    function stackCreator_render() {
        const listEl = $('stackCreatorList'); if (!listEl) return; 
        const arr = stackCreator_load(); listEl.innerHTML = '';
        arr.forEach((it, idx) => {
            const li = document.createElement('li');
            li.innerHTML = `<div style="min-width:0"><div class="creator-anchor" title="${escapeAttr(it.name)}">${escapeHtml(it.name)}</div> <div class="creator-meta" title="${escapeAttr(it.href)}">${escapeHtml(it.href)}</div></div><div class="creator-actions" style="display:flex;gap:6px;flex-shrink:0"><button onclick="stackCreator_moveUp(${idx})">↑</button><button onclick="stackCreator_moveDown(${idx})">↓</button><button class="creator-delete" onclick="stackCreator_removeIndex(${idx})">✕</button></div>`;
            // Note: Inline onclicks used here for brevity within dynamic HTML generation, relying on global scope exposure or re-binding. 
            // Better practice: bind events. For simplicity in single file, we'll bind via delegation or expose functions globally.
            // Exposing globally for inline handlers:
            window.stackCreator_moveUp = stackCreator_moveUp; window.stackCreator_moveDown = stackCreator_moveDown; window.stackCreator_removeIndex = stackCreator_removeIndex;
            listEl.appendChild(li);
        });
        if(arr.length===0) listEl.innerHTML = '<li class="creator-meta" style="background:transparent;">No links yet. Paste a link and press Enter.</li>';
    }
    function stackCreator_handleExport() {
        const arr = stackCreator_load();
        const html = ['<!doctype html>','<html>','  <head>','    <meta charset="utf-8" />','    <title>Cloudstax-Links</title>','  </head>','  <body>'].concat(arr.map(it => `    <a href="${escapeAttr(it.href)}">${escapeHtml(it.name)}</a>`)).concat(['  </body>','</html>']).join('\n');
        const blob = new Blob([html], {type:'text/html'}); const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'Cloudstax-Links.html'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }
    function stackCreator_handleClear() {
        if (stackCreator_load().length === 0) { showNotification("List is already empty."); return; }
        // Simple confirmation
        if(confirm("Delete all links from creator list?")) { localStorage.removeItem(CREATOR_KEY); showNotification("Cleared."); stackCreator_render(); }
    }
    function handleShowStackCreator() {
        const body = `<p class="text-sm text-gray-300 mb-2">Add links to create a shareable HTML preset file.</p><p class="text-xs text-gray-400 mb-3">You can paste <code>https://site.com</code> or <code>Name - https://site.com</code>.</p><div class="flex gap-2"><input id="stackCreatorInput" type="text" placeholder="Paste URL and press Enter"></div><ul id="stackCreatorList"></ul>`;
        const footer = `<button id="creatorExport" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">Export HTML</button><button id="creatorClear" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-md text-sm font-medium transition">Clear List</button><button id="creatorClose" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Close</button>`;
        showModal("Create Stack Preset", body, footer);
        stackCreator_render();
        $('stackCreatorInput').onkeydown = e => { if(e.key==='Enter'){ e.preventDefault(); const v=e.target.value.trim(); if(v) { stackCreator_addFromInput(v); e.target.value=''; } } };
        $('creatorExport').onclick = stackCreator_handleExport; $('creatorClear').onclick = stackCreator_handleClear; $('creatorClose').onclick = hideModal;
    }
    function handleImportStackPreset() {
        const body = `<p class="text-sm text-gray-300 mb-2">Please enter a name for this new stack.</p><input id="importStackName" class="w-full text-sm bg-gray-900 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="New Stack Name">`;
        const footer = `<button id="cancelImport" class="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded-md text-sm font-medium transition">Cancel</button><button id="nextImport" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">Next</button>`;
        showModal("Import Stack Preset", body, footer); $('importStackName').focus();
        $('cancelImport').onclick = hideModal;
        $('nextImport').onclick = () => {
            const name = $('importStackName').value.trim(); if(!name) return showNotification("Name required.", true);
            hideModal();
            const input = document.createElement('input'); input.type='file'; input.accept='.html';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = async ev => {
                    const bookmarks = parseLinksFromHtml(ev.target.result, name.charAt(0).toUpperCase()+name.slice(1));
                    if(bookmarks.length>0) { await batchImportToDB(bookmarks); showNotification(`Imported ${bookmarks.length} links.`); await loadAllBookmarks(); }
                    else showNotification("No links found.", true);
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        };
    }
    
    // --- Initialization ---
    async function initialize() {
      try {
        initThreeJSAnimation();
        await initDB();
        recentLaunches = JSON.parse(localStorage.getItem('cloudstax_recent')) || [];
        loadStackIcons();
        loadOpenMode();
        loadCompactView();
        updateLinkModeBtnIcon();
        await loadAllBookmarks();
        
        // Initial Tab State
        setAddMode('link');
      } catch (error) { logError(error, "initialize"); }

      // Event Listeners
      elements.addBtn.addEventListener('click', addBookmark);
      elements.urlIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.nameIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.stackIn.addEventListener('keydown', e => e.key === 'Enter' && addBookmark());
      elements.codeIn.addEventListener('keydown', e => {
          if (e.key === 'Enter' && e.ctrlKey) addBookmark(); // Ctrl+Enter to submit code
      });
      
      // File Import Listener
      elements.codeFileInput.addEventListener('change', e => {
          const file = e.target.files[0];
          if(!file) return;
          const reader = new FileReader();
          reader.onload = event => {
              elements.codeIn.value = event.target.result;
              // Auto-fill name if empty
              if(!elements.nameIn.value) {
                  elements.nameIn.value = file.name.replace(/\.[^/.]+$/, "");
              }
          };
          reader.readAsText(file);
      });
      
      elements.searchIn.addEventListener('input', debounce(() => { currentPage = 1; renderBookmarks(); }, 250));
      elements.stackFilter.addEventListener('change', () => { currentPage = 1; isReorderMode ? handleReorderToggle() : renderBookmarks(); });
      elements.launchSelectedBtn.addEventListener('click', launchSelected);
      elements.settingsBtn.addEventListener('click', handleShowSettings);
      elements.reorderBtn.addEventListener('click', handleReorderToggle); 
      elements.linkModeBtn.addEventListener('click', toggleLinkMode);
      elements.standbyBtn.addEventListener('click', () => toggleStandbyMode(true));
      elements.openAppBtn.addEventListener('click', () => toggleStandbyMode(false));
      elements.quickGrabBtn.addEventListener('click', handleQuickGrabModal);
      
      // Tabs
      elements.modeLinkBtn.addEventListener('click', () => setAddMode('link'));
      elements.modeCodeBtn.addEventListener('click', () => setAddMode('code'));

      // Modal delegation
      elements.modalBody.addEventListener('click', handleModalClicks); 
      elements.modalBody.addEventListener('change', handleModalChanges);
      elements.modalFooter.addEventListener('click', handleModalClicks);
    }
    
    // Settings Modal Logic (Simplified for brevity)
    function handleShowSettings() {
        const body = `
        <div class="space-y-4">
            <h3 class="font-bold border-b border-gray-700 pb-2">Appearance</h3>
            <label class="flex items-center"><input id="modalCompactView" type="checkbox" class="form-checkbox" ${isCompactView?'checked':''}><span class="ml-2 text-sm text-gray-300">Compact View</span></label>
            
            <h3 class="font-bold border-b border-gray-700 pb-2 pt-2">Data</h3>
            <div class="flex gap-2">
                <button id="modalImportJson" class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm">Import JSON</button>
                <button id="modalExportData" class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm">Export JSON</button>
            </div>
            
             <h3 class="font-bold border-b border-gray-700 pb-2 pt-2">Stack Tools</h3>
            <div class="flex gap-2">
                <button id="modalCreateStack" class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm">Create Stack Preset</button>
                <button id="modalImportStack" class="flex-1 bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm">Import Stack Preset</button>
            </div>
            <button id="modalInstallTools" class="w-full bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm mt-2 text-left">Install Default Tools</button>

            <h3 class="font-bold border-b border-gray-700 pb-2 pt-2">Diagnostics</h3>
            <button id="modalViewLog" class="w-full bg-gray-700 hover:bg-gray-600 p-2 rounded text-sm text-left">View Error Log</button>
        </div>`;
        showModal("Settings", body, `<button id="closeSettings" class="bg-gray-600 px-4 py-2 rounded text-sm">Close</button>`);
    }
    function handleModalClicks(e) {
        if(e.target.id === 'closeSettings') hideModal();
        if(e.target.id === 'modalExportData') exportBookmarks();
        if(e.target.id === 'modalImportJson') { hideModal(); handleImportJson(); }
        if(e.target.id === 'modalCreateStack') { hideModal(); handleShowStackCreator(); }
        if(e.target.id === 'modalImportStack') { hideModal(); handleImportStackPreset(); }
        if(e.target.id === 'modalInstallTools') { hideModal(); handleInstallTools(); }
        if(e.target.id === 'modalViewLog') {
             hideModal(); 
             showModal("Error Log", `<div class="max-h-60 overflow-auto bg-gray-900 p-2 font-mono text-xs text-red-400">${errorLog.map(e=>`<div>${e.time}: ${e.message}</div>`).join('') || 'No errors.'}</div>`, `<button id="clearLog" class="bg-red-600 px-3 py-1 rounded text-xs mr-2">Clear</button><button id="closeLog" class="bg-gray-600 px-3 py-1 rounded text-xs">Close</button>`);
             $('clearLog').onclick = () => { errorLog=[]; elements.errorCountBadge.classList.add('hidden'); hideModal(); };
             $('closeLog').onclick = hideModal;
        }
    }
    function handleModalChanges(e) {
        if(e.target.id === 'modalCompactView') saveCompactView(e.target.checked);
    }

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
