<!DOCTYPE html>
<html lang="en" class="h-full antialiased">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LENS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/three@0.153.0/build/three.min.js"></script>
  <style>
    :root { --accent: #3b82f6; }
    body { font-family: 'Inter', sans-serif; }
    .octa { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; cursor: pointer; }
    .resizer { cursor: se-resize; }
    .row-hover { @apply bg-blue-500/5 transition-colors; }
    .ctx-menu { @apply min-w-40; }
    .ctx-menu div:hover { @apply bg-white/10; }
    .stack-drop { @apply border-2 border-dashed border-blue-500/50 rounded-lg; }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100 overflow-hidden">

<!-- Main Panel -->
<div id="panel" class="absolute inset-0 bg-gray-900/90 backdrop-blur-xl rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-800" 
     style="width: 460px; height: 620px; resize: both; min-width: 380px; min-height: 500px;">
  
  <!-- Header -->
  <header class="flex items-center gap-3 p-4 border-b border-gray-800 select-none" data-drag>
    <div id="octaContainer" class="octa"></div>
    <div>
      <h1 class="text-sm font-semibold">Free Bounce</h1>
      <p class="text-xs text-gray-400">v5.0 · Offline-First</p>
    </div>
    <div class="ml-auto flex gap-1.5">
      <select id="loadoutSelect" class="text-xs bg-gray-800 text-gray-200 rounded-md px-2.5 py-1.5 focus:ring-2 focus:ring-blue-500"></select>
      <button id="saveLoadout" class="text-xs px-2.5 py-1.5 bg-green-600 hover:bg-green-500 rounded-md transition font-medium">Save</button>
      <button id="expandBtn" class="text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-md transition">Expand</button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="flex border-b border-gray-800">
    <button id="tabBookmarks" class="flex-1 px-4 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400">Bookmarks</button>
    <button id="tabStacks" class="flex-1 px-4 py-2 text-sm font-medium text-gray-400">Stacks</button>
  </div>

  <!-- Search & Filter -->
  <div class="flex gap-2 p-3">
    <input id="searchIn" placeholder="Search..." class="flex-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <select id="catFilter" class="text-sm bg-gray-800 text-gray-200 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500"></select>
  </div>

  <!-- Bookmarks View -->
  <div id="bookmarksView" class="flex-1 overflow-y-auto px-3 pb-2">
    <table class="w-full text-sm">
      <thead class="text-xs text-gray-500 border-b border-gray-800 sticky top-0 bg-gray-900/90 backdrop-blur">
        <tr>
          <th class="text-left p-2 font-medium cursor-pointer hover:text-gray-300" data-sort="name">Name</th>
          <th class="text-center p-2 w-20" data-sort="category">Cat</th>
          <th class="text-left p-2" data-sort="path">Path</th>
        </tr>
      </thead>
      <tbody id="tableBody" class="divide-y divide-gray-800"></tbody>
    </table>
  </div>

  <!-- Stacks View -->
  <div id="stacksView" class="hidden flex-1 overflow-y-auto p-3 space-y-3">
    <div id="stackList"></div>
    <button id="newStack" class="w-full px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-md text-sm">+ New Stack</button>
  </div>

  <!-- Add Row -->
  <div class="flex gap-2 p-3 border-t border-gray-800">
    <input id="nameIn" placeholder="Name (optional)" class="flex-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200">
    <select id="catIn" class="text-sm bg-gray-800 text-gray-200 rounded-md px-3 py-2"></select>
    <input id="pathIn" placeholder="google.com" class="flex-1 text-sm bg-gray-800 rounded-md px-3 py-2 text-gray-200">
    <button id="addBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-md text-sm font-medium transition">Add</button>
  </div>

  <!-- Resizer -->
  <div class="absolute right-1 bottom-1 w-5 h-5 resizer opacity-40 hover:opacity-80">
    <svg class="w-full h-full text-gray-500" fill="currentColor" viewBox="0 0 16 16">
      <path d="M5.5 0v5.5H0V0h5.5zM16 10.5V16H10.5v-5.5H16zM5.5 10.5V16H0v-5.5h5.5z"/>
    </svg>
  </div>
</div>

<!-- Context Menu -->
<div id="ctxMenu" class="ctx-menu hidden fixed bg-gray-800 border border-gray-700 rounded-lg shadow-2xl py-1 z-50 text-sm"></div>

<!-- Full Sheet -->
<div id="fullsheet" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-900 rounded-2xl shadow-2xl w-full max-w-5xl max-h-full overflow-hidden flex flex-col border border-gray-800">
    <div class="p-5 border-b border-gray-800 flex justify-between items-center">
      <h2 class="text-lg font-semibold">Full Manager</h2>
      <button id="fsClose" class="text-gray-400 hover:text-white">Close</button>
    </div>
    <div id="fsBody" class="flex-1 overflow-auto p-4"></div>
    <div class="p-4 border-t border-gray-800 flex gap-3 justify-end">
      <button id="fsImport" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-md">Import</button>
      <button id="fsExport" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-md">Export</button>
    </div>
  </div>
</div>

<script>
/* ========================================
   Free Bounce v5.0 — FULL PRD
   - Smart URL parsing
   - Stacks + Loadouts
   - Import/Export .json + .md
   - Offline-first with sync queue
   - Tray-ready
   ======================================== */

const DB_NAME = 'freebounce_v5';
let db, items = [], stacks = {}, loadouts = {}, categories = ['Social', 'Tools', 'Design', 'Dev', 'Media', 'Other'];
let sortBy = 'name', sortAsc = true, search = '', filter = '', currentView = 'bookmarks';
let syncQueue = [], isOnline = navigator.onLine;
let ctxCleanup = null, renderer, animId;

/* ——————— IndexedDB ——————— */
async function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 2);
    req.onupgradeneeded = e => {
      db = e.target.result;
      ['items', 'stacks', 'loadouts', 'categories', 'settings'].forEach(store => {
        if (!db.objectStoreNames.contains(store)) {
          db.createObjectStore(store, store === 'items' ? { keyPath: 'id' } : {});
        }
      });
    };
    req.onsuccess = e => { db = e.target.result; loadAll().then(resolve); };
    req.onerror = reject;
  });
}

async function loadAll() {
  items = await getAll('items') || [];
  stacks = await getAll('stacks') || {};
  loadouts = await getAll('loadouts') || {};
  const cats = await getAll('categories');
  if (cats?.length) categories = cats;
  const settings = await get('settings', 'config');
  if (settings?.encrypt) enableEncryption();
  renderCategories(); renderLoadouts(); renderView();
  setupSync();
}

/* ——————— Sync & Offline ——————— */
function setupSync() {
  window.addEventListener('online', () => { isOnline = true; flushSyncQueue(); });
  window.addEventListener('offline', () => isOnline = false);
}
async function queueOp(op) {
  syncQueue.push(op);
  if (isOnline) await flushSyncQueue();
}
async function flushSyncQueue() {
  while (syncQueue.length && isOnline) {
    const op = syncQueue.shift();
    try { await op(); } catch (e) { syncQueue.unshift(op); break; }
  }
}

/* ——————— Data Ops ——————— */
function tx(store, mode = 'readonly') { return db.transaction(store, mode).objectStore(store); }
async function getAll(store) { return new Promise(r => tx(store).getAll().onsuccess = e => r(e.target.result)); }
async function get(store, key) { return new Promise(r => tx(store).get(key).onsuccess = e => r(e.target.result)); }
async function save(store, data) {
  const t = tx(store, 'readwrite');
  await new Promise(r => t.clear().onsuccess = r);
  if (Array.isArray(data)) for (const d of data) await new Promise(r => t.add(d).onsuccess = r);
  else for (const [k, v] of Object.entries(data)) await new Promise(r => t.put(v, k).onsuccess = r);
  return new Promise(r => t.transaction.oncomplete = r);
}

/* ——————— URL & Bookmark Logic ——————— */
function normalizeUrl(input) {
  let s = String(input || '').trim();
  if (!s) throw new Error('empty');
  if (!/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(s)) {
    s = s.replace(/\s+/g, '');
    s = s.includes('.') ? 'https://' + s : 'https://' + s + '.com';
  }
  const u = new URL(s);
  if ((u.protocol === 'http:' && u.port === '80') || (u.protocol === 'https:' && u.port === '443')) u.port = '';
  if (u.pathname === '/') u.pathname = '';
  return u.toString();
}
function extractNameFromUrl(url, name) {
  if (name?.trim()) return name.trim();
  const host = new URL(url).hostname.replace(/^www\./i, '');
  const candidate = host.split('.')[0];
  return candidate.charAt(0).toUpperCase() + candidate.slice(1);
}
function getFavicon(url) {
  const host = new URL(url).hostname;
  return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
}

/* ——————— Rendering ——————— */
function $(id) { return document.getElementById(id); }
function esc(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderCategories() {
  ['catIn', 'catFilter'].forEach(id => {
    const sel = $(id);
    sel.innerHTML = id === 'catFilter' ? '<option value="">All</option>' : '';
    categories.forEach(c => sel.add(new Option(c, c)));
    if (id === 'catIn') sel.add(new Option('+ New', 'new'));
  });
}

function renderLoadouts() {
  const sel = $('loadoutSelect');
  sel.innerHTML = '<option value="">(Current)</option>';
  Object.keys(loadouts).sort().forEach(k => sel.add(new Option(k, k)));
}

function renderView() {
  if (currentView === 'bookmarks') renderBookmarks();
  else renderStacks();
}

function renderBookmarks() {
  let list = items.filter(i =>
    (!filter || i.category === filter) &&
    (!search || i.name.toLowerCase().includes(search) || i.path.toLowerCase().includes(search))
  );
  list.sort((a, b) => sortAsc ? a[sortBy].localeCompare(b[sortBy]) : b[sortBy].localeCompare(a[sortBy]));
  
  const tbody = $('tableBody');
  tbody.innerHTML = '';
  list.forEach(item => {
    const tr = document.createElement('tr');
    tr.draggable = true;
    tr.dataset.id = item.id;
    tr.className = 'cursor-pointer hover:bg-gray-800/50 row-hover transition';
    tr.innerHTML = `
      <td class="p-3 flex items-center gap-2">
        <img src="${item.icon}" class="w-5 h-5 rounded" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%236b7280%22 viewBox=%220 0 16 16%22><circle cx=%228%22 cy=%228%22 r=%228%22/></svg>'">
        <span class="font-medium truncate">${esc(item.name)}</span>
      </td>
      <td class="p-3 text-center text-xs text-gray-400">${esc(item.category)}</td>
      <td class="p-3 text-xs text-gray-400 truncate max-w-xs" title="${esc(item.path)}">${esc(item.path)}</td>
    `;
    tr.ondblclick = () => openItem(item);
    tr.oncontextmenu = e => { e.preventDefault(); showContextMenu(e, item); };
    tr.ondragstart = e => e.dataTransfer.setData('text/plain', item.id);
    tbody.appendChild(tr);
  });
}

function renderStacks() {
  const container = $('stackList');
  container.innerHTML = '';
  Object.entries(stacks).forEach(([name, stack]) => {
    const div = document.createElement('div');
    div.className = 'bg-gray-800 rounded-lg p-3 space-y-2';
    div.innerHTML = `
      <div class="flex justify-between items-center">
        <h3 class="font-medium">${esc(name)} <span class="text-xs text-gray-400">(${stack.length})</span></h3>
        <button onclick="loadStack('${name}')" class="text-xs text-blue-400">Load</button>
      </div>
      <div class="text-xs text-gray-400 space-y-1">
        ${stack.map(id => {
          const item = items.find(i => i.id === id);
          return item ? `<div>${esc(item.name)}</div>` : '';
        }).join('')}
      </div>
    `;
    container.appendChild(div);
  });
}

/* ——————— Actions ——————— */
async function addItem() {
  const rawPath = $('pathIn').value.trim();
  const rawName = $('nameIn').value.trim();
  if (!rawPath) return alert('Enter a URL');
  let normalized;
  try { normalized = normalizeUrl(rawPath); } catch { return alert('Invalid URL'); }
  const name = extractNameFromUrl(normalized, rawName);
  const cat = $('catIn').value === 'new' ? prompt('New category:')?.trim() || 'Other' : $('catIn').value;
  if (cat && !categories.includes(cat)) {
    categories.push(cat);
    await save('categories', categories);
    renderCategories();
  }
  const item = {
    id: crypto.randomUUID(),
    name, category: cat || 'Other', path: normalized, icon: getFavicon(normalized),
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  items.unshift(item);
  await save('items', items);
  renderView();
  $('pathIn').value = $('nameIn').value = '';
}

async function openItem(item) {
  window.open(item.path, '_blank', 'noopener');
}

async function loadStack(name) {
  const stack = stacks[name];
  if (!stack) return;
  items = stack.map(id => items.find(i => i.id === id)).filter(Boolean);
  await save('items', items);
  switchView('bookmarks');
  renderView();
}

/* ——————— Loadouts ——————— */
$('saveLoadout').onclick = async () => {
  const name = prompt('Loadout name:');
  if (!name?.trim()) return;
  loadouts[name] = { items: [...items], timestamp: new Date().toISOString(), version: 1 };
  await save('loadouts', loadouts);
  renderLoadouts();
};
$('loadoutSelect').onchange = async e => {
  const name = e.target.value;
  if (!name || !loadouts[name]) return;
  if (confirm(`Load "${name}"?`)) {
    items = loadouts[name].items;
    await save('items', items);
    renderView();
  }
};

/* ——————— Tabs ——————— */
function switchView(view) {
  currentView = view;
  $('bookmarksView').classList.toggle('hidden', view !== 'bookmarks');
  $('stacksView').classList.toggle('hidden', view !== 'stacks');
  $('tabBookmarks').className = view === 'bookmarks' ? 'flex-1 px-4 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400' : 'flex-1 px-4 py-2 text-sm font-medium text-gray-400';
  $('tabStacks').className = view === 'stacks' ? 'flex-1 px-4 py-2 text-sm font-medium text-blue-400 border-b-2 border-blue-400' : 'flex-1 px-4 py-2 text-sm font-medium text-gray-400';
  renderView();
}
$('tabBookmarks').onclick = () => switchView('bookmarks');
$('tabStacks').onclick = () => switchView('stacks');

/* ——————— Import/Export ——————— */
$('fsExport').onclick = () => {
  const data = { schema: 2, timestamp: new Date().toISOString(), items, stacks, loadouts, categories };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'freebounce.json' });
  a.click();
};
$('fsImport').onclick = () => {
  const input = Object.assign(document.createElement('input'), { type: 'file', accept: '.json' });
  input.onchange = async e => {
    const file = e.target.files[0];
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.schema !== 2) return alert('Invalid schema');
    items = data.items; stacks = data.stacks; loadouts = data.loadouts; categories = data.categories;
    await Promise.all([save('items', items), save('stacks', stacks), save('loadouts', loadouts), save('categories', categories)]);
    renderView(); renderLoadouts(); renderCategories();
  };
  input.click();
};

/* ——————— Events ——————— */
$('addBtn').onclick = addItem;
$('pathIn').onkeydown = e => e.key === 'Enter' && addItem();
$('searchIn').oninput = e => { search = e.target.value.toLowerCase(); renderView(); };
$('catFilter').onchange = e => { filter = e.target.value; renderView(); };
$('expandBtn').onclick = () => { $('fullsheet').classList.remove('hidden'); };
$('fsClose').onclick = () => $('fullsheet').classList.add('hidden');

/* ——————— Three.js ——————— */
function initThree() {
  const container = $('octaContainer');
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.z = 3;

  const geo = new THREE.OctahedronGeometry(0.8, 1);
  const mat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, emissive: 0x3b82f6, metalness: 0.3, roughness: 0.2 });
  const octa = new THREE.Mesh(geo, mat);
  scene.add(octa);

  new ResizeObserver(() => {
    renderer.setSize(container.clientWidth, container.clientHeight);
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
  }).observe(container);

  function animate() {
    octa.rotation.y += 0.01;
    renderer.render(scene, camera);
    animId = requestAnimationFrame(animate);
  }
  animate();

  // Pause on minimize
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && animId) cancelAnimationFrame(animId);
    else if (!document.hidden) animate();
  });
}

/* ——————— Init ——————— */
document.addEventListener('DOMContentLoaded', () => {
  initDB().then(() => {
    initThree();
    if (window.electronAPI) {
      const trayBtn = document.createElement('button');
      trayBtn.textContent = 'Tray';
      trayBtn.className = 'text-xs px-2.5 py-1.5 bg-gray-800 hover:bg-gray-700 rounded-md ml-1.5';
      trayBtn.onclick = () => window.electronAPI.showTray();
      document.querySelector('[data-drag]').appendChild(trayBtn);
    }
  });
});
document.querySelectorAll('[data-drag]').forEach(el => el.style.webkitAppRegion = 'drag');
</script>
</body>
</html>
